<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urbanex Admin - Revisiones</title>
<link rel="icon" type="image/png" href="../imagenes/log.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="preconnect" href="https://esm.sh" crossorigin><link rel="modulepreload" href="https://esm.sh/@supabase/supabase-js@2">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e5c158;--line:rgba(229,193,88,.25);--panel:rgba(8,8,8,.84);--muted:#d5d5d5;--green:#2ed573;--red:#ff5b68;--font-serif:'Cinzel',serif;--font-sans:'Montserrat',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#030303;color:#fff;font-family:var(--font-sans);padding-bottom:32px}.header{min-height:68px;display:flex;align-items:center;justify-content:space-between;padding:8px 22px;background:#050505;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}.logo img{height:58px}.nav{display:flex;gap:10px;flex-wrap:wrap}.pill,.btn{border:1px solid var(--line);background:rgba(0,0,0,.45);border-radius:999px;padding:9px 14px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.7px;color:#fff;text-decoration:none;cursor:pointer}.wrap{width:min(1100px,calc(100% - 28px));margin:24px auto}.hero,.panel{border:1px solid var(--line);border-radius:22px;background:var(--panel);padding:22px;margin-bottom:16px}.hero h1,.panel h2{font-family:var(--font-serif);color:var(--gold);text-transform:uppercase;letter-spacing:1.5px}.hero p{color:var(--muted);font-size:12px;line-height:1.6;margin-top:8px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:14px}.card{border:1px solid rgba(255,255,255,.12);border-radius:18px;background:rgba(0,0,0,.42);padding:14px}.card h3{font-size:14px;margin-bottom:6px}.card p{font-size:12px;color:var(--muted);line-height:1.5;margin:8px 0}.stars{color:var(--gold)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btn.ok{background:rgba(46,213,115,.15);border-color:rgba(46,213,115,.35)}.btn.danger{background:rgba(255,91,104,.14);border-color:rgba(255,91,104,.35)}input{width:100%;height:42px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.55);color:#fff;border-radius:13px;padding:0 12px}.notice{border-radius:14px;padding:12px;font-size:12px;margin:12px 0;display:none}.notice.ok{display:block;color:#dfffe9;border:1px solid rgba(46,213,115,.34);background:rgba(46,213,115,.10)}.notice.error{display:block;color:#ffe1e4;border:1px solid rgba(255,91,104,.34);background:rgba(255,91,104,.10)}.hidden{display:none!important}@media(max-width:760px){.header{flex-direction:column}.btn,.pill{width:100%;text-align:center}.nav{width:100%}}
</style>
</head>
<body>
<header class="header"><a class="logo" href="index.html"><img src="../imagenes/logo.png" alt="Urbanex"></a><nav class="nav"><a class="pill" href="index.html">Admin</a><a class="pill" href="../index.html">Inicio</a><button id="logoutBtn" class="pill hidden" type="button">Cerrar sesión</button></nav></header>
<main class="wrap"><section class="hero"><h1>Revisión administrativa</h1><p>Apruebe o rechace reseñas y solicitudes de autorización adicional enviadas por propietarios de negocios.</p></section>
<section id="loginPanel" class="panel"><h2>Acceso administrador</h2><div id="loginMessage" class="notice"></div><div class="toolbar"><input id="adminEmail" type="email" placeholder="correo administrador"><button id="loginBtn" class="btn" type="button">Enviar enlace</button></div></section>
<section id="adminPanel" class="hidden"><section class="panel"><h2>Reseñas pendientes</h2><div id="reviewMessage" class="notice"></div><div id="pendingReviews" class="grid"></div></section><section class="panel"><h2>Solicitudes de autorización adicional</h2><div id="requestMessage" class="notice"></div><div id="editRequests" class="grid"></div></section></section></main>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL='https://mlkynawsjqmawgxeuvks.supabase.co';const SUPABASE_ANON_KEY='sb_publishable_UyYcTuSIaLDbaD73wvwOfA_TbyFlRNv';const supabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);const $=id=>document.getElementById(id);let user=null;
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}function show(id,text,type='ok'){const box=$(id);box.className='notice '+type;box.textContent=text;}
async function init(){const {data}=await supabase.auth.getSession();user=data.session?.user||null;supabase.auth.onAuthStateChange((_e,session)=>{user=session?.user||null;render();});render();}
async function render(){if(!user){$('loginPanel').classList.remove('hidden');$('adminPanel').classList.add('hidden');$('logoutBtn').classList.add('hidden');return;}$('loginPanel').classList.add('hidden');$('adminPanel').classList.remove('hidden');$('logoutBtn').classList.remove('hidden');await Promise.all([loadReviews(),loadRequests()]);}
async function login(){const email=$('adminEmail').value.trim().toLowerCase();if(!email)return show('loginMessage','Ingrese el correo administrador.','error');const {error}=await supabase.auth.signInWithOtp({email,options:{emailRedirectTo:window.location.href.split('#')[0]}});if(error)return show('loginMessage',error.message,'error');show('loginMessage','Revise su correo y abra el enlace de acceso.','ok');}
async function logout(){await supabase.auth.signOut();}
async function loadReviews(){const {data,error}=await supabase.from('reviews').select('*,businesses(name)').eq('is_approved',false).order('created_at',{ascending:false}).limit(50);if(error){$('pendingReviews').innerHTML='';return show('reviewMessage',error.message,'error');}if(!data?.length){$('pendingReviews').innerHTML='<p style="color:#d5d5d5;font-size:12px;">No hay reseñas pendientes.</p>';return;}$('pendingReviews').innerHTML=data.map(r=>`<article class="card"><h3>${esc(r.businesses?.name||'Negocio')}</h3><div class="stars">${'★'.repeat(Number(r.rating||0))}</div><p><b>${esc(r.author_name||'Cliente')}</b></p><p>${esc(r.comment||'')}</p><div class="toolbar"><button class="btn ok" data-approve="${esc(r.id)}">Aprobar</button><button class="btn danger" data-reject="${esc(r.id)}">Rechazar</button></div></article>`).join('');}
async function loadRequests(){const {data,error}=await supabase.from('business_edit_requests').select('*').eq('status','pending').order('created_at',{ascending:false}).limit(50);if(error){$('editRequests').innerHTML='';return show('requestMessage',error.message,'error');}if(!data?.length){$('editRequests').innerHTML='<p style="color:#d5d5d5;font-size:12px;">No hay solicitudes pendientes.</p>';return;}$('editRequests').innerHTML=data.map(r=>`<article class="card"><h3>${esc(r.owner_email||'Propietario')}</h3><p>${esc(r.reason||'Sin detalle.')}</p><div class="toolbar"><button class="btn ok" data-unlock="${esc(r.id)}" data-business="${esc(r.business_id)}">Autorizar 3 cambios más</button><button class="btn danger" data-close="${esc(r.id)}">Cerrar</button></div></article>`).join('');}
async function approveReview(id,approved){const {error}=approved?await supabase.from('reviews').update({is_approved:true,approved_at:new Date().toISOString()}).eq('id',id):await supabase.from('reviews').delete().eq('id',id);if(error)return show('reviewMessage',error.message,'error');show('reviewMessage',approved?'Reseña aprobada.':'Reseña rechazada.','ok');await loadReviews();}
async function unlockBusiness(requestId,businessId){const {error:err1}=await supabase.from('businesses').update({edit_count:0,edit_limit:3}).eq('id',businessId);if(err1)return show('requestMessage',err1.message,'error');const {error:err2}=await supabase.from('business_edit_requests').update({status:'approved',resolved_at:new Date().toISOString()}).eq('id',requestId);if(err2)return show('requestMessage',err2.message,'error');show('requestMessage','Autorización registrada. El propietario puede realizar 3 cambios más.','ok');await loadRequests();}
async function closeRequest(id){const {error}=await supabase.from('business_edit_requests').update({status:'closed',resolved_at:new Date().toISOString()}).eq('id',id);if(error)return show('requestMessage',error.message,'error');show('requestMessage','Solicitud cerrada.','ok');await loadRequests();}
$('loginBtn').addEventListener('click',login);$('logoutBtn').addEventListener('click',logout);$('pendingReviews').addEventListener('click',e=>{const approve=e.target.getAttribute('data-approve');const reject=e.target.getAttribute('data-reject');if(approve)approveReview(approve,true);if(reject)approveReview(reject,false);});$('editRequests').addEventListener('click',e=>{const unlock=e.target.getAttribute('data-unlock');const business=e.target.getAttribute('data-business');const close=e.target.getAttribute('data-close');if(unlock)unlockBusiness(unlock,business);if(close)closeRequest(close);});init();
</script>
</body>
</html>
