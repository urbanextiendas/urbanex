<!DOCTYPE html>
<html lang="es">
<head>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="preconnect" href="https://esm.sh" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#020202;--panel:rgba(7,7,7,.72);--card:rgba(13,13,13,.84);--gold:#e5c158;--gold2:#f4d775;--line:rgba(229,193,88,.22);--text:#fff;--muted:#d7d7d7;--soft:#9b9b9b;--green:#2ed573;--red:#ff5b68;--font-serif:'Cinzel',serif;--font-sans:'Montserrat',sans-serif;--blur:blur(18px)}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:linear-gradient(135deg,rgba(0,0,0,.74),rgba(0,0,0,.45)),url("../imagenes/Boulevard.png") center bottom/cover fixed no-repeat;color:var(--text);font-family:var(--font-sans);padding-bottom:28px}a{color:inherit;text-decoration:none}button,input,select{font-family:var(--font-sans)}
.header-top{height:60px;background:rgba(4,4,4,.76);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:30}.brand-box img{height:58px;display:block}.back-link{border:1px solid var(--line);background:rgba(0,0,0,.48);border-radius:999px;padding:8px 14px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px}.back-link:hover{border-color:var(--gold);background:rgba(229,193,88,.12)}
.page-wrap{width:min(1120px,calc(100% - 28px));margin:18px auto 42px}.hero{border:1px solid var(--line);border-radius:22px;background:radial-gradient(circle at 16% 0%,rgba(229,193,88,.18),transparent 28%),rgba(6,6,6,.70);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);padding:22px 24px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;box-shadow:0 22px 56px rgba(0,0,0,.44)}.eyebrow{color:var(--gold);font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}.hero h1{font-family:var(--font-serif);font-size:clamp(28px,4vw,44px);letter-spacing:3px;text-transform:uppercase;line-height:1;margin-bottom:10px}.hero p{color:var(--muted);font-size:12px;line-height:1.6;max-width:760px}.total-card{min-width:126px;border:1px solid rgba(229,193,88,.34);background:rgba(0,0,0,.46);border-radius:18px;padding:13px 16px;text-align:center}.total-card strong{display:block;color:var(--gold);font-family:var(--font-serif);font-size:30px;line-height:1}.total-card span{color:var(--soft);font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1px}
.toolbar{margin:14px 0;display:grid;grid-template-columns:1fr auto;gap:10px}.search-input,.category-select{height:36px;background:rgba(0,0,0,.58);border:1px solid rgba(255,255,255,.13);border-radius:999px;color:#fff;font-size:11px;outline:none}.search-input{padding:0 15px}.category-select{padding:0 12px;min-width:220px;cursor:pointer}.category-select option{background:#080808;color:#fff}
.category-section{margin-top:14px;border:1px solid rgba(229,193,88,.18);border-radius:20px;background:rgba(5,5,5,.58);overflow:hidden;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}.category-header{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;gap:12px}.category-header h2{color:var(--gold);font-family:var(--font-serif);font-size:13px;letter-spacing:1.4px;text-transform:uppercase}.category-header span{color:#000;background:var(--gold);border-radius:999px;padding:4px 9px;font-size:9px;font-weight:900;white-space:nowrap}
.offer-grid{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:12px}.offer-card{border:1px solid rgba(255,255,255,.10);background:linear-gradient(145deg,rgba(20,20,20,.90),rgba(4,4,4,.86));border-radius:18px;overflow:hidden;min-height:0;transition:all .25s ease;box-shadow:0 14px 35px rgba(0,0,0,.26)}.offer-card:hover{border-color:rgba(229,193,88,.55);transform:translateY(-2px);background:linear-gradient(145deg,rgba(30,25,10,.95),rgba(5,5,5,.90))}.offer-image{height:132px;background:radial-gradient(circle at 30% 20%,rgba(229,193,88,.18),transparent 38%),rgba(0,0,0,.54);display:flex;align-items:center;justify-content:center;overflow:hidden}.offer-image img{width:100%;height:100%;object-fit:cover;display:block}.offer-placeholder{font-size:34px;color:var(--gold)}.offer-body{padding:13px}.offer-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}.offer-badge{display:inline-flex;align-items:center;border:1px solid rgba(46,213,115,.34);background:rgba(46,213,115,.12);color:var(--green);border-radius:999px;padding:4px 8px;font-size:8px;font-weight:900;text-transform:uppercase;white-space:nowrap}.product-title{font-size:14px;font-weight:900;line-height:1.22;color:#fff}.business-name{font-size:11px;font-weight:800;color:var(--gold);margin:3px 0 5px}.category-name{font-size:9px;color:var(--soft);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}.offer-description{font-size:10.5px;color:var(--muted);line-height:1.45;min-height:30px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.price-row{margin:10px 0 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}.old-price{font-size:10px;color:var(--soft);text-decoration:line-through}.sale-price{font-size:18px;color:var(--gold2);font-weight:900}.profile-link{display:inline-flex;align-items:center;justify-content:center;width:100%;height:34px;border:1px solid rgba(229,193,88,.35);border-radius:999px;background:rgba(0,0,0,.38);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.4px}.profile-link:hover{background:var(--gold);color:#000}.empty-state,.loading-state{margin-top:14px;border:1px dashed rgba(229,193,88,.34);border-radius:18px;padding:24px;text-align:center;background:rgba(0,0,0,.44);color:var(--muted);font-size:12px}.loading-state{border:0;background:transparent}.footer{position:fixed;left:0;right:0;bottom:0;height:24px;background:#000;color:#8c8c8c;font-size:11px;display:flex;align-items:center;justify-content:center;border-top:1px solid #1a1a1a;font-family:Arial,Helvetica,sans-serif;z-index:50}.hidden{display:none!important}
@media(max-width:720px){.header-top{height:auto;padding:10px 12px;gap:8px;flex-direction:column}.hero{grid-template-columns:1fr;padding:20px}.total-card{width:100%}.toolbar{grid-template-columns:1fr}.category-select{width:100%}.offer-grid{grid-template-columns:1fr}.page-wrap{width:min(100% - 20px,1120px)}}
</style>
</head>
<body>
<header class="header-top"><a href="../boulevard.html" class="brand-box" title="Volver al Boulevard"><img src="../imagenes/logo.png" alt="Logo Urbanex"></a><a class="back-link" href="../boulevard.html">Volver al Boulevard</a></header>
<main class="page-wrap"><section class="hero"><div><div class="eyebrow">Filtro global</div><h1>Ofertas</h1><p>Productos en oferta publicados por negocios aprobados en Urbanex.</p></div><div class="total-card"><strong id="totalResults">0</strong><span>Ofertas</span></div></section><section class="toolbar"><input type="search" id="globalSearch" class="search-input" placeholder="Buscar producto o negocio..." autocomplete="off"><select id="categoryFilter" class="category-select"><option value="todas">Todas las categorías</option></select></section><div id="loadingState" class="loading-state">Cargando ofertas...</div><div id="resultsContainer"></div><div id="emptyState" class="empty-state hidden"></div></main>
<footer class="footer"><p>&copy; 2026 Urbanex. Desarrollado por NeoDat Consultores.</p></footer>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL='https://mlkynawsjqmawgxeuvks.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_UyYcTuSIaLDbaD73wvwOfA_TbyFlRNv';
const supabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const resultsContainer=document.getElementById('resultsContainer');
const emptyState=document.getElementById('emptyState');
const loadingState=document.getElementById('loadingState');
const totalCounter=document.getElementById('totalResults');
const searchInput=document.getElementById('globalSearch');
const categoryFilter=document.getElementById('categoryFilter');
let offers=[];
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function norm(v){return String(v??'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9ñ\s./:_-]/gi,' ').replace(/\s+/g,' ').trim();}
function relation(v){return Array.isArray(v)?(v[0]||null):(v||null);}
function money(v){const n=Number(v||0);return Number.isFinite(n)&&n>0?'$'+n.toFixed(2):'Consultar';}
function imageOf(p){return p.image_1_url||p.image_2_url||p.image_3_url||p.cover_image||'';}
function categoryName(b){const cat=relation(b.categories);const sub=relation(b.subcategories);return sub?.name||cat?.name||b.category_name||'Sin categoría';}
function rootCategory(b){const cat=relation(b.categories);return cat?.name||categoryName(b);}
function profileUrl(b){const base=b.slug?`../business/?slug=${encodeURIComponent(b.slug)}`:`../business/?id=${encodeURIComponent(b.id)}`;return `${base}&return=${encodeURIComponent('../informativos/ofertas.html')}`;}
function offerSearchText(item){return norm([item.name,item.description,item.business?.name,categoryName(item.business||{}),item.offer_label].join(' '));}
function populateCategoryFilter(list){const categories=[...new Set(list.map(item=>rootCategory(item.business||{})))].sort((a,b)=>a.localeCompare(b,'es'));categoryFilter.innerHTML='<option value="todas">Todas las categorías</option>'+categories.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');}
function filteredOffers(){const q=norm(searchInput.value);const cat=categoryFilter.value;return offers.filter(item=>{const okSearch=!q||item._search.includes(q);const okCat=cat==='todas'||rootCategory(item.business||{})===cat;return okSearch&&okCat;});}
function render(){const list=filteredOffers();totalCounter.textContent=list.length;if(!list.length){resultsContainer.innerHTML='';emptyState.textContent='No hay productos en oferta registrados en Supabase.';emptyState.classList.remove('hidden');return;}emptyState.classList.add('hidden');const grouped=list.reduce((acc,item)=>{const c=rootCategory(item.business||{});(acc[c] ||= []).push(item);return acc;},{});resultsContainer.innerHTML=Object.keys(grouped).sort((a,b)=>a.localeCompare(b,'es')).map(category=>`<section class="category-section"><div class="category-header"><h2>${esc(category)}</h2><span>${grouped[category].length} resultado${grouped[category].length===1?'':'s'}</span></div><div class="offer-grid">${grouped[category].map(productCard).join('')}</div></section>`).join('');}
function productCard(item){const b=item.business||{};const img=imageOf(item);const label=item.offer_label||'Oferta Urbanex';const sale=Number(item.sale_price||0)>0?money(item.sale_price):money(item.price);const normal=Number(item.price||0)>0&&Number(item.sale_price||0)>0?`<span class="old-price">Antes ${money(item.price)}</span>`:'';return `<article class="offer-card"><div class="offer-image">${img?`<img src="${esc(img)}" alt="${esc(item.name||'Producto en oferta')}" loading="lazy">`:'<span class="offer-placeholder">🏷️</span>'}</div><div class="offer-body"><div class="offer-top"><div><h3 class="product-title">${esc(item.name||'Producto en oferta')}</h3><div class="business-name">${esc(b.name||'Negocio')}</div></div><span class="offer-badge">${esc(label)}</span></div><div class="category-name">${esc(categoryName(b))}</div><p class="offer-description">${esc(item.description||'Producto en oferta publicado en Urbanex.')}</p><div class="price-row">${normal}<span class="sale-price">${sale}</span></div><a class="profile-link" href="${esc(profileUrl(b))}">Ver oferta en el negocio</a></div></article>`;}
async function init(){try{const [businessesResult,productsResult]=await Promise.all([supabase.from('businesses').select('*,categories!category_id(id,name,icon,parent_id),subcategories:categories!subcategory_id(id,name,icon,parent_id)').eq('is_active',true),supabase.from('business_products').select('*').eq('is_active',true).eq('is_on_sale',true).order('created_at',{ascending:false})]);if(businessesResult.error)throw businessesResult.error;if(productsResult.error)throw productsResult.error;const businesses=new Map((businessesResult.data||[]).map(b=>[String(b.id),b]));offers=(productsResult.data||[]).map(p=>({...p,business:businesses.get(String(p.business_id))})).filter(p=>p.business).map(p=>({...p,_search:offerSearchText(p)}));populateCategoryFilter(offers);loadingState.classList.add('hidden');render();}catch(error){console.error(error);loadingState.classList.add('hidden');emptyState.textContent='No se pudieron cargar las ofertas desde Supabase: '+(error.message||'revise la conexión.');emptyState.classList.remove('hidden');}}
searchInput.addEventListener('input',render);categoryFilter.addEventListener('change',render);init();
</script>
</body>
</html>
