<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbanex - Ofertas</title>
    <link rel="icon" type="image/png" href="../imagenes/log.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --bg-main:#020202;
            --bg-card:rgba(18,18,18,.76);
            --gold:#e5c158;
            --border-color:rgba(229,193,88,.22);
            --text-main:#fff;
            --text-muted:#d7d7d7;
            --text-soft:#9c9c9c;
            --success:#2ed573;
            --danger:#ff7675;
            --font-serif:'Cinzel',serif;
            --font-sans:'Montserrat',sans-serif;
            --transition:all .25s ease;
            --blur:blur(18px);
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            background:
                linear-gradient(135deg,rgba(0,0,0,.66),rgba(0,0,0,.34)),
                url("../imagenes/Boulevard.png") center bottom/cover fixed no-repeat;
            color:var(--text-main);
            font-family:var(--font-sans);
            padding-bottom:24px;
        }

        a{
            color:inherit;
            text-decoration:none;
        }

        .header-top{
            height:60px;
            background:rgba(6,6,6,.45);
            backdrop-filter:var(--blur);
            -webkit-backdrop-filter:var(--blur);
            border-bottom:1px solid var(--border-color);
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 20px;
            position:sticky;
            top:0;
            z-index:20;
        }

        .brand-box img{
            height:60px;
            width:auto;
            display:block;
        }

        .back-link{
            border:1px solid var(--border-color);
            background:rgba(0,0,0,.42);
            color:#fff;
            border-radius:999px;
            padding:8px 14px;
            font-size:11px;
            font-weight:700;
            transition:var(--transition);
        }

        .back-link:hover{
            border-color:var(--gold);
            background:rgba(229,193,88,.10);
        }

        .page-wrap{
            width:min(1180px,calc(100% - 28px));
            margin:22px auto 36px;
        }

        .hero{
            border:1px solid var(--border-color);
            border-radius:22px;
            background:
                radial-gradient(circle at 16% 0%,rgba(229,193,88,.18),transparent 28%),
                rgba(6,6,6,.68);
            backdrop-filter:var(--blur);
            -webkit-backdrop-filter:var(--blur);
            padding:26px 28px;
            display:grid;
            grid-template-columns:1fr auto;
            gap:18px;
            align-items:center;
            box-shadow:0 24px 60px rgba(0,0,0,.42);
        }

        .eyebrow{
            color:var(--gold);
            font-size:10px;
            font-weight:800;
            letter-spacing:2px;
            text-transform:uppercase;
            margin-bottom:8px;
        }

        .hero h1{
            font-family:var(--font-serif);
            font-size:clamp(24px,4vw,42px);
            letter-spacing:3px;
            text-transform:uppercase;
            line-height:1;
            margin-bottom:10px;
        }

        .hero p{
            color:var(--text-muted);
            font-size:12px;
            line-height:1.6;
            max-width:760px;
        }

        .total-card{
            min-width:132px;
            border:1px solid rgba(229,193,88,.32);
            background:rgba(0,0,0,.44);
            border-radius:18px;
            padding:14px 16px;
            text-align:center;
        }

        .total-card strong{
            display:block;
            color:var(--gold);
            font-family:var(--font-serif);
            font-size:30px;
            line-height:1;
        }

        .total-card span{
            color:var(--text-soft);
            font-size:9px;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:1px;
        }

        .toolbar{
            margin:14px 0;
            display:grid;
            grid-template-columns:1fr auto auto;
            gap:10px;
        }

        .search-input,
        .category-select{
            height:36px;
            background:rgba(0,0,0,.56);
            border:1px solid rgba(255,255,255,.12);
            border-radius:999px;
            color:#fff;
            font-family:var(--font-sans);
            font-size:11px;
            outline:none;
        }

        .search-input{
            padding:0 15px;
        }

        .category-select{
            padding:0 12px;
            min-width:210px;
            cursor:pointer;
        }

        .location-button{
            height:36px;
            border:1px solid var(--border-color);
            background:rgba(229,193,88,.12);
            color:#fff;
            border-radius:999px;
            padding:0 14px;
            font-size:11px;
            font-weight:800;
            cursor:pointer;
            font-family:var(--font-sans);
            display:none;
        }

        body[data-page="cerca"] .location-button{
            display:block;
        }

        .category-section{
            margin-top:14px;
            border:1px solid rgba(229,193,88,.16);
            border-radius:18px;
            background:rgba(5,5,5,.52);
            overflow:hidden;
            backdrop-filter:var(--blur);
            -webkit-backdrop-filter:var(--blur);
        }

        .category-header{
            padding:12px 14px;
            border-bottom:1px solid rgba(255,255,255,.07);
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
        }

        .category-header h2{
            color:var(--gold);
            font-family:var(--font-serif);
            font-size:13px;
            letter-spacing:1.4px;
            text-transform:uppercase;
        }

        .category-header span{
            color:#000;
            background:var(--gold);
            border-radius:999px;
            padding:4px 9px;
            font-size:9px;
            font-weight:800;
            white-space:nowrap;
        }

        .business-grid{
            padding:12px;
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
            gap:10px;
        }

        .business-card{
            border:1px solid rgba(255,255,255,.09);
            background:var(--bg-card);
            border-radius:14px;
            padding:10px;
            min-height:112px;
            transition:var(--transition);
        }

        .business-card:hover{
            border-color:rgba(229,193,88,.50);
            background:rgba(229,193,88,.08);
            transform:translateY(-2px);
        }

        .business-top{
            display:flex;
            align-items:flex-start;
            justify-content:space-between;
            gap:8px;
            margin-bottom:6px;
        }

        .business-title{
            font-size:12px;
            font-weight:800;
            color:#fff;
            line-height:1.2;
        }

        .business-status{
            color:var(--success);
            border:1px solid rgba(46,213,115,.34);
            background:rgba(46,213,115,.10);
            border-radius:999px;
            padding:3px 7px;
            font-size:7.5px;
            font-weight:800;
            text-transform:uppercase;
            white-space:nowrap;
        }

        .business-segment{
            color:var(--gold);
            font-size:9px;
            font-weight:700;
            margin-bottom:6px;
        }

        .business-description{
            color:var(--text-muted);
            font-size:9px;
            line-height:1.45;
            display:-webkit-box;
            -webkit-line-clamp:3;
            -webkit-box-orient:vertical;
            overflow:hidden;
        }

        .extra-info{
            margin-top:8px;
            color:#fff;
            font-size:8.7px;
            line-height:1.5;
        }

        .extra-info strong,
        .offer-list,
        .distance-info{
            color:var(--gold);
        }

        .offer-list{
            margin-top:8px;
            padding-left:14px;
            font-size:8.7px;
            line-height:1.5;
        }

        .distance-info{
            margin-top:8px;
            font-size:8.7px;
            font-weight:800;
        }

        .business-footer{
            margin-top:9px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:8px;
        }

        .rating{
            color:var(--gold);
            font-size:9px;
            font-weight:800;
        }

        .profile-link{
            border:1px solid rgba(229,193,88,.28);
            border-radius:999px;
            padding:4px 8px;
            font-size:8px;
            font-weight:800;
            color:#fff;
        }

        .empty-state{
            margin-top:14px;
            border:1px dashed rgba(229,193,88,.34);
            border-radius:18px;
            padding:24px;
            text-align:center;
            background:rgba(0,0,0,.44);
            color:var(--text-muted);
            font-size:12px;
            display:none;
        }

        .loading-state{
            margin-top:14px;
            color:var(--text-muted);
            font-size:12px;
            text-align:center;
        }

        .footer{
            position:fixed;
            left:0;
            bottom:0;
            width:100%;
            height:24px;
            background-color:#000;
            color:#8c8c8c;
            font-size:11px;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            border-top:1px solid #1a1a1a;
            z-index:50;
            font-family:Arial,Helvetica,sans-serif;
        }

        @media(max-width:720px){
            .header-top{
                height:auto;
                padding:12px;
                gap:10px;
                flex-direction:column;
            }

            .hero{
                grid-template-columns:1fr;
                padding:22px;
            }

            .total-card{
                width:100%;
            }

            .toolbar{
                grid-template-columns:1fr;
            }

            .category-select,
            .location-button{
                width:100%;
            }
        }

    </style>
</head>

<body data-page="ofertas">

<header class="header-top">
    <a href="../boulevard.html" class="brand-box" title="Volver al Boulevard">
        <img src="../imagenes/logo.png" alt="Logo Urbanex">
    </a>

    <a class="back-link" href="../boulevard.html">Volver al Boulevard</a>
</header>

<main class="page-wrap">
    <section class="hero">
        <div>
            <div class="eyebrow">Filtro global</div>
            <h1>Ofertas</h1>
            <p>Ofertas activas alimentadas desde los HTML finales de cada negocio registrado en Urbanex.</p>
        </div>

        <div class="total-card">
            <strong id="totalBusinesses">0</strong>
            <span>Ofertas activas</span>
        </div>
    </section>

    <section class="toolbar">
        <input type="search" id="globalSearch" class="search-input" placeholder="Buscar oferta..." autocomplete="off">

        <select id="categoryFilter" class="category-select">
            <option value="todas">Todas las categorías</option>
        </select>

        <button id="locationButton" class="location-button" type="button">Usar mi ubicación</button>
    </section>

    <div id="loadingState" class="loading-state">Cargando ofertas desde los HTML finales...</div>
    <div id="resultsContainer"></div>
    <div id="emptyState" class="empty-state">No hay ofertas registradas en los HTML finales.</div>
</main>

<footer class="footer">
    <p>&copy; 2026 Urbanex. Desarrollado por Neodat Consultores.</p>
</footer>

<script>
window.URBANEX_INFO_CONFIG = {
    pageType: "ofertas",
    singleLabel: "oferta",
    pluralLabel: "ofertas"
};
</script>

<script>
(function(){
    const CONFIG = window.URBANEX_INFO_CONFIG;

    const DISCOVERY_SOURCES = [
        "../categorias/hogar/electrodomesticos.html",
        "../categorias/hogar.html",
        "../categorias/gastronomia.html",
        "../categorias/comercio.html",
        "../categorias/salud.html",
        "../categorias/turismo.html",
        "../categorias/movilidad.html",
        "../categorias/finanzas.html"
    ];

    const FINAL_BUSINESS_SOURCES = [
        "../empresas/hogar/electrodomesticos/electromas.html",
        "../empresas/hogar/electrodomesticos/E0001.html",
        "../categorias/hogar/electrodomesticos/E0001.html"
    ];

    const searchInput = document.getElementById("globalSearch");
    const categoryFilter = document.getElementById("categoryFilter");
    const locationButton = document.getElementById("locationButton");
    const resultsContainer = document.getElementById("resultsContainer");
    const emptyState = document.getElementById("emptyState");
    const loadingState = document.getElementById("loadingState");
    const totalBusinesses = document.getElementById("totalBusinesses");

    let allBusinesses = [];
    let userLocation = null;

    function escapeHtml(value){
        return String(value ?? "").replace(/[&<>"']/g,function(char){
            return {
                "&":"&amp;",
                "<":"&lt;",
                ">":"&gt;",
                '"':"&quot;",
                "'":"&#039;"
            }[char];
        });
    }

    function normalizeText(value){
        return String(value ?? "")
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g,"")
            .replace(/[^a-z0-9ñ\s./_-]/gi," ")
            .replace(/\s+/g," ")
            .trim();
    }

    function titleFromPath(path){
        try{
            const pathname = new URL(path, window.location.href).pathname;
            const file = pathname.split("/").pop() || "Negocio";
            return file.replace(/\.html?$/i,"").replace(/[-_]/g," ").trim() || "Negocio";
        }catch(error){
            const file = String(path || "").split("/").pop() || "Negocio";
            return file.replace(/\.html?$/i,"").replace(/[-_]/g," ").trim() || "Negocio";
        }
    }

    function absoluteUrl(path, base){
        try{
            return new URL(path, base || window.location.href).href;
        }catch(error){
            return String(path || "");
        }
    }

    function sameOrigin(url){
        try{
            return new URL(url, window.location.href).origin === window.location.origin;
        }catch(error){
            return false;
        }
    }

    function toBoolean(value){
        if(typeof value === "boolean") return value;
        if(typeof value === "number") return value === 1;
        if(typeof value === "string"){
            const normalized = normalizeText(value);
            return ["si","sí","true","1","activo","activa","disponible","abierto","open","delivery","domicilio","envio","envío","oferta","promo","promocion","promoción"].includes(normalized);
        }
        return Boolean(value);
    }

    function safeArray(value){
        if(Array.isArray(value)) return value.map(item => String(item).trim()).filter(Boolean);
        if(typeof value === "string" && value.trim()){
            return value.split("|").map(item => item.trim()).filter(Boolean);
        }
        return [];
    }

    function parseNumber(value){
        const number = Number(String(value ?? "").replace(",",".").replace(/[^\d.-]/g,""));
        return Number.isFinite(number) ? number : null;
    }

    function getMeta(doc,name){
        return doc.querySelector(`meta[name="${name}"]`)?.getAttribute("content")?.trim() || "";
    }

    function getFirstText(doc,selectors){
        for(const selector of selectors){
            const node = doc.querySelector(selector);
            const text = node?.textContent?.trim();
            if(text) return text;
        }
        return "";
    }

    function getFirstAttr(doc,selectors,attribute){
        for(const selector of selectors){
            const node = doc.querySelector(selector);
            const value = node?.getAttribute(attribute)?.trim();
            if(value) return value;
        }
        return "";
    }

    function extractBalancedStructure(source,startIndex){
        if(startIndex < 0) return "";

        const opener = source[startIndex];
        const closer = opener === "{" ? "}" : "]";
        let depth = 0;
        let quote = null;
        let escaped = false;

        for(let index = startIndex; index < source.length; index++){
            const char = source[index];

            if(quote){
                if(escaped){
                    escaped = false;
                    continue;
                }

                if(char === "\\"){
                    escaped = true;
                    continue;
                }

                if(char === quote){
                    quote = null;
                }

                continue;
            }

            if(char === "\"" || char === "'" || char === "`"){
                quote = char;
                continue;
            }

            if(char === opener) depth++;
            if(char === closer) depth--;

            if(depth === 0){
                return source.slice(startIndex,index + 1);
            }
        }

        return "";
    }

    function extractAssignedStructures(source,names){
        const found = [];

        names.forEach(function(name){
            const pattern = new RegExp("(?:const|let|var)\\s+" + name + "\\s*=|window\\." + name + "\\s*=","g");
            let match;

            while((match = pattern.exec(source)) !== null){
                const objectStart = source.indexOf("{",match.index);
                const arrayStart = source.indexOf("[",match.index);
                const candidates = [objectStart,arrayStart].filter(index => index >= 0);
                const startIndex = Math.min.apply(null,candidates);

                if(!Number.isFinite(startIndex)) continue;

                const raw = extractBalancedStructure(source,startIndex);
                if(!raw) continue;

                try{
                    found.push((new Function("return (" + raw + ");"))());
                }catch(error){
                    console.warn("No se pudo interpretar " + name,error);
                }
            }
        });

        return found;
    }

    function getScriptText(doc){
        return Array.from(doc.querySelectorAll("script"))
            .map(script => script.textContent || "")
            .join("\n");
    }

    async function fetchHtml(url){
        const response = await fetch(url,{cache:"no-store"});
        if(!response.ok) throw new Error("No se pudo cargar " + url);
        return await response.text();
    }

    function looksLikeFinalBusinessUrl(url){
        try{
            const parsed = new URL(url,window.location.href);
            const pathname = parsed.pathname.toLowerCase();

            if(pathname.includes("/informativos/")) return false;
            if(pathname.endsWith("/index.html")) return false;
            if(pathname.endsWith("/boulevard.html")) return false;
            if(pathname === "/" || pathname.endsWith("/")) return false;

            return pathname.includes("/empresas/") || /\/e\d+\.html$/i.test(pathname) || pathname.includes("/negocios/") || pathname.includes("/locales/");
        }catch(error){
            return false;
        }
    }

    async function discoverFinalBusinessSources(){
        const sources = new Set();

        FINAL_BUSINESS_SOURCES.forEach(function(source){
            const resolved = absoluteUrl(source,window.location.href);
            if(sameOrigin(resolved)) sources.add(resolved);
        });

        for(const discoverySource of DISCOVERY_SOURCES){
            const discoveryUrl = absoluteUrl(discoverySource,window.location.href);

            try{
                const htmlText = await fetchHtml(discoveryUrl);
                const doc = new DOMParser().parseFromString(htmlText,"text/html");
                const scriptText = getScriptText(doc);

                const assignedSources = extractAssignedStructures(scriptText,[
                    "EMPRESAS_DATA_SOURCES",
                    "BUSINESS_DATA_SOURCES",
                    "FINAL_BUSINESS_SOURCES",
                    "EMPRESAS_FINAL_SOURCES",
                    "URBANEX_BUSINESS_SOURCES"
                ]);

                assignedSources.forEach(function(value){
                    const items = Array.isArray(value) ? value : [value];

                    items.forEach(function(item){
                        if(typeof item === "string"){
                            const resolved = absoluteUrl(item,discoveryUrl);
                            if(sameOrigin(resolved)) sources.add(resolved);
                        }
                    });
                });

                Array.from(doc.querySelectorAll("a[href]")).forEach(function(anchor){
                    const href = anchor.getAttribute("href");
                    if(!href) return;

                    const resolved = absoluteUrl(href,discoveryUrl);
                    if(sameOrigin(resolved) && looksLikeFinalBusinessUrl(resolved)){
                        sources.add(resolved);
                    }
                });
            }catch(error){
                console.warn(error);
            }
        }

        return Array.from(sources);
    }

    function parseJsonBusiness(doc,sourcePath){
        const jsonNode = doc.querySelector(
            "#urbanex-empresa-data, #urbanex-empresas-data, #businessData, #empresa-data, script[type='application/json'][data-urbanex='empresa'], script[type='application/json'][data-urbanex='empresas']"
        );

        if(!jsonNode || !jsonNode.textContent.trim()) return null;

        try{
            const parsed = JSON.parse(jsonNode.textContent.trim());
            return Array.isArray(parsed) ? parsed : [parsed];
        }catch(error){
            console.warn("JSON inválido en " + sourcePath,error);
            return null;
        }
    }

    function parseAssignedBusiness(doc){
        const scriptText = getScriptText(doc);
        const assignedData = extractAssignedStructures(scriptText,[
            "EMPRESA",
            "URBANEX_EMPRESA",
            "EMPRESA_DATA",
            "BUSINESS_DATA",
            "NEGOCIO_DATA",
            "EMPRESAS",
            "URBANEX_EMPRESAS",
            "EMPRESAS_ELECTRODOMESTICOS"
        ]);

        for(const value of assignedData){
            if(!value) continue;
            if(Array.isArray(value)) return value;
            if(typeof value === "object") return [value];
        }

        return null;
    }

    function isGenericBusiness(rawBusiness){
        const name = normalizeText(rawBusiness.nombre || rawBusiness.name || rawBusiness.titulo || "");
        const description = normalizeText(rawBusiness.descripcion || rawBusiness.description || rawBusiness.detalle || "");
        const genericNames = [
            "urbanex",
            "urbanex ofertas",
            "urbanex abiertos ahora",
            "urbanex a domicilio",
            "urbanex cerca de mi",
            "hogar y tecnologia",
            "turismo y hospedaje",
            "comercio y educacion",
            "salud y bienestar",
            "gastronomica",
            "finanzas",
            "movilidad"
        ];

        return genericNames.includes(name) && !description;
    }

    function fallbackBusiness(doc,sourcePath){
        const explicitOffers = Array.from(doc.querySelectorAll("[data-urbanex-oferta], [data-oferta], .business-offer, .offer-item, .oferta-item, .promo-item, .discount-item"))
            .map(node => node.textContent.trim())
            .filter(Boolean);

        const explicitDelivery = getMeta(doc,"urbanex:domicilio") || getMeta(doc,"urbanex:delivery") || getFirstText(doc,["[data-urbanex-domicilio]","[data-delivery]",".delivery-info",".domicilio-info"]);
        const explicitOpen = getMeta(doc,"urbanex:abierto") || getMeta(doc,"urbanex:estado") || getFirstText(doc,["[data-urbanex-estado]",".business-status",".estado"]);

        const raw = {
            codigo:getMeta(doc,"urbanex:codigo") || titleFromPath(sourcePath),
            nombre:getMeta(doc,"urbanex:nombre") || getFirstText(doc,[".company-name",".business-name",".profile-title","h1"]) || doc.title || titleFromPath(sourcePath),
            categoria:getMeta(doc,"urbanex:categoria") || getFirstText(doc,[".business-category",".category-pill",".categoria"]),
            segmento:getMeta(doc,"urbanex:segmento") || getFirstText(doc,[".business-segment",".segmento"]),
            descripcion:getMeta(doc,"description") || getMeta(doc,"urbanex:descripcion") || getFirstText(doc,[".business-description",".company-description",".descripcion",".profile-description"]),
            rating:getFirstText(doc,[".rating",".business-rating",".calificacion"]).replace(/[^\d.]/g,"") || getMeta(doc,"urbanex:rating"),
            estado:explicitOpen,
            abierto:toBoolean(explicitOpen),
            ofertas:explicitOffers,
            tieneOferta:toBoolean(getMeta(doc,"urbanex:tieneOferta") || getMeta(doc,"urbanex:oferta")) || explicitOffers.length > 0,
            domicilio:toBoolean(explicitDelivery),
            costoDomicilio:getMeta(doc,"urbanex:costoDomicilio") || getFirstText(doc,[".delivery-cost",".costo-domicilio"]),
            cobertura:getMeta(doc,"urbanex:cobertura") || getFirstText(doc,[".delivery-area",".cobertura"]),
            direccion:getMeta(doc,"urbanex:direccion") || getFirstText(doc,[".address",".direccion"]),
            latitud:getMeta(doc,"urbanex:latitud") || getFirstAttr(doc,["[data-lat]"],"data-lat"),
            longitud:getMeta(doc,"urbanex:longitud") || getFirstAttr(doc,["[data-lng]","[data-lon]"],"data-lng") || getFirstAttr(doc,["[data-lon]"],"data-lon"),
            telefono:getMeta(doc,"urbanex:telefono") || getFirstText(doc,[".telefono",".phone"]),
            whatsapp:getMeta(doc,"urbanex:whatsapp") || getFirstText(doc,[".whatsapp"]),
            perfil:sourcePath
        };

        if(isGenericBusiness(raw)) return [];
        return [raw];
    }

    function parseBusinessDataFromFinalHtml(htmlText,sourcePath){
        const doc = new DOMParser().parseFromString(htmlText,"text/html");
        const parsed = parseJsonBusiness(doc,sourcePath) || parseAssignedBusiness(doc) || fallbackBusiness(doc,sourcePath);

        return parsed.filter(function(rawBusiness){
            return rawBusiness && !isGenericBusiness(rawBusiness);
        });
    }

    function normalizeBusiness(rawBusiness,sourcePath,index){
        const ofertas = safeArray(rawBusiness.ofertas || rawBusiness.promociones || rawBusiness.promos || rawBusiness.descuentos || rawBusiness.offers);
        const perfilRaw = rawBusiness.perfil || rawBusiness.url || rawBusiness.href || rawBusiness.link || sourcePath;
        const perfil = absoluteUrl(perfilRaw,sourcePath);

        const business = {
            codigo:rawBusiness.codigo || rawBusiness.code || titleFromPath(sourcePath),
            nombre:rawBusiness.nombre || rawBusiness.name || rawBusiness.titulo || rawBusiness.title || titleFromPath(sourcePath),
            categoria:rawBusiness.categoria || rawBusiness.category || "Sin categoría",
            segmento:rawBusiness.segmento || rawBusiness.tipo || rawBusiness.category || rawBusiness.categoria || "Negocio",
            descripcion:rawBusiness.descripcion || rawBusiness.description || rawBusiness.detalle || "",
            rating:Number(rawBusiness.rating || rawBusiness.calificacion || rawBusiness.valoracion || rawBusiness.estrellas || 0),
            estado:rawBusiness.estado || rawBusiness.status || "",
            abierto:rawBusiness.abierto ?? rawBusiness.open ?? rawBusiness.isOpen ?? rawBusiness.estaAbierto ?? false,
            horario:rawBusiness.horario || rawBusiness.schedule || null,
            ofertas:ofertas,
            tieneOferta:toBoolean(rawBusiness.tieneOferta || rawBusiness.enOferta || rawBusiness.oferta || rawBusiness.promo || rawBusiness.promocion || rawBusiness.promoción) || ofertas.length > 0,
            domicilio:toBoolean(rawBusiness.domicilio || rawBusiness.aDomicilio || rawBusiness.delivery || rawBusiness.envio || rawBusiness.envío || rawBusiness.envios),
            costoDomicilio:rawBusiness.costoDomicilio || rawBusiness.deliveryCost || rawBusiness.costoEnvio || "",
            cobertura:rawBusiness.cobertura || rawBusiness.deliveryArea || rawBusiness.zonaDomicilio || "",
            direccion:rawBusiness.direccion || rawBusiness.address || "",
            latitud:parseNumber(rawBusiness.latitud || rawBusiness.lat || rawBusiness.latitude),
            longitud:parseNumber(rawBusiness.longitud || rawBusiness.lng || rawBusiness.lon || rawBusiness.longitude),
            telefono:rawBusiness.telefono || rawBusiness.phone || "",
            whatsapp:rawBusiness.whatsapp || rawBusiness.celular || rawBusiness.telefono || "",
            perfil:perfil,
            fuente:sourcePath,
            orden:index,
            distancia:null,
            searchable:""
        };

        if(!Number.isFinite(business.rating)) business.rating = 0;

        business.searchable = normalizeText([
            business.codigo,
            business.nombre,
            business.categoria,
            business.segmento,
            business.descripcion,
            business.estado,
            business.ofertas.join(" "),
            business.costoDomicilio,
            business.cobertura,
            business.direccion
        ].join(" "));

        return business;
    }

    async function loadBusinessesFromFinalPages(){
        const finalSources = await discoverFinalBusinessSources();
        const loaded = [];
        const seenKeys = new Set();

        for(const sourcePath of finalSources){
            try{
                const htmlText = await fetchHtml(sourcePath);
                const parsedBusinesses = parseBusinessDataFromFinalHtml(htmlText,sourcePath);

                parsedBusinesses.forEach(function(rawBusiness,index){
                    const business = normalizeBusiness(rawBusiness,sourcePath,index);
                    const key = normalizeText(business.codigo + "|" + business.nombre + "|" + business.perfil);

                    if(!business.nombre || seenKeys.has(key) || normalizeText(business.nombre) === "urbanex") return;

                    seenKeys.add(key);
                    loaded.push(business);
                });
            }catch(error){
                console.warn(error);
            }
        }

        return loaded;
    }

    function getDayKey(date){
        const days = ["domingo","lunes","martes","miercoles","jueves","viernes","sabado"];
        return days[date.getDay()];
    }

    function minutesFromTime(value){
        const match = String(value || "").trim().match(/^(\d{1,2}):(\d{2})$/);
        if(!match) return null;
        return Number(match[1]) * 60 + Number(match[2]);
    }

    function isOpenBySchedule(horario){
        if(!horario || typeof horario !== "object") return false;

        const now = new Date();
        const dayKey = getDayKey(now);
        const rawRange = horario[dayKey];

        if(!rawRange || normalizeText(rawRange) === "cerrado") return false;

        const parts = String(rawRange).split("-");
        if(parts.length !== 2) return false;

        const openMinutes = minutesFromTime(parts[0]);
        const closeMinutes = minutesFromTime(parts[1]);
        const currentMinutes = now.getHours() * 60 + now.getMinutes();

        if(openMinutes === null || closeMinutes === null) return false;

        if(closeMinutes < openMinutes){
            return currentMinutes >= openMinutes || currentMinutes <= closeMinutes;
        }

        return currentMinutes >= openMinutes && currentMinutes <= closeMinutes;
    }

    function isBusinessOpen(business){
        const estado = normalizeText(business.estado);

        if(estado.includes("abierto")) return true;
        if(estado.includes("cerrado")) return false;
        if(toBoolean(business.abierto)) return true;

        return isOpenBySchedule(business.horario);
    }

    function calculateDistanceKm(lat1,lng1,lat2,lng2){
        if(lat1 === null || lng1 === null || lat2 === null || lng2 === null) return null;

        const earthRadius = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;

        const a =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) *
            Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLng / 2) *
            Math.sin(dLng / 2);

        const c = 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1 - a));

        return earthRadius * c;
    }

    function updateDistances(){
        allBusinesses.forEach(function(business){
            if(userLocation && business.latitud !== null && business.longitud !== null){
                business.distancia = calculateDistanceKm(userLocation.latitud,userLocation.longitud,business.latitud,business.longitud);
            }else{
                business.distancia = null;
            }
        });
    }

    function businessMatchesPageFilter(business){
        if(CONFIG.pageType === "ofertas") return business.tieneOferta === true || business.ofertas.length > 0;
        if(CONFIG.pageType === "abiertos") return isBusinessOpen(business);
        if(CONFIG.pageType === "domicilio") return business.domicilio === true;
        return true;
    }

    function badgeText(){
        if(CONFIG.pageType === "ofertas") return "Oferta";
        if(CONFIG.pageType === "abiertos") return "Abierto";
        if(CONFIG.pageType === "domicilio") return "Domicilio";
        return "Cerca";
    }

    function createExtraHtml(business){
        if(CONFIG.pageType === "ofertas"){
            return business.ofertas.length
                ? `<ul class="offer-list">${business.ofertas.map(offer => `<li>${escapeHtml(offer)}</li>`).join("")}</ul>`
                : "";
        }

        if(CONFIG.pageType === "domicilio"){
            const lines = [];
            if(business.cobertura) lines.push(`<div><strong>Cobertura:</strong> ${escapeHtml(business.cobertura)}</div>`);
            if(business.costoDomicilio) lines.push(`<div><strong>Costo:</strong> ${escapeHtml(business.costoDomicilio)}</div>`);
            return lines.length ? `<div class="extra-info">${lines.join("")}</div>` : "";
        }

        if(CONFIG.pageType === "cerca"){
            const distanceText = business.distancia !== null
                ? `${business.distancia.toFixed(2)} km de usted`
                : business.direccion
                    ? escapeHtml(business.direccion)
                    : "Ubicación registrada en el perfil";
            return `<div class="distance-info">${distanceText}</div>`;
        }

        return "";
    }

    function createBusinessCard(business){
        const article = document.createElement("article");
        article.className = "business-card";

        article.innerHTML = `
            <div class="business-top">
                <h3 class="business-title">${escapeHtml(business.nombre)}</h3>
                <span class="business-status">${escapeHtml(badgeText())}</span>
            </div>

            <div class="business-segment">${escapeHtml(business.segmento)}</div>
            <p class="business-description">${escapeHtml(business.descripcion || "Sin descripción registrada.")}</p>
            ${createExtraHtml(business)}

            <div class="business-footer">
                <span class="rating">${business.rating > 0 ? "★ " + business.rating.toFixed(1) : "★"}</span>
                <a class="profile-link" href="${escapeHtml(business.perfil)}">Ver perfil</a>
            </div>
        `;

        return article;
    }

    function groupByCategory(businesses){
        return businesses.reduce(function(groups,business){
            const category = business.categoria || "Sin categoría";
            if(!groups[category]) groups[category] = [];
            groups[category].push(business);
            return groups;
        },{});
    }

    function updateCategoryFilter(businesses){
        const categories = [...new Set(businesses.map(business => business.categoria || "Sin categoría"))].sort();

        categories.forEach(function(category){
            const option = document.createElement("option");
            option.value = category;
            option.textContent = category;
            categoryFilter.appendChild(option);
        });
    }

    function renderBusinesses(){
        const query = normalizeText(searchInput.value);
        const selectedCategory = categoryFilter.value;

        let filtered = allBusinesses.filter(function(business){
            const categoryMatches = selectedCategory === "todas" || business.categoria === selectedCategory;
            const searchMatches = !query || business.searchable.includes(query);
            return businessMatchesPageFilter(business) && categoryMatches && searchMatches;
        });

        if(CONFIG.pageType === "cerca"){
            filtered = filtered.sort(function(a,b){
                if(a.distancia !== null && b.distancia !== null) return a.distancia - b.distancia;
                if(a.distancia !== null) return -1;
                if(b.distancia !== null) return 1;
                return a.nombre.localeCompare(b.nombre);
            });
        }else{
            filtered = filtered.sort(function(a,b){
                return a.nombre.localeCompare(b.nombre);
            });
        }

        resultsContainer.innerHTML = "";
        totalBusinesses.textContent = filtered.length;
        emptyState.style.display = filtered.length ? "none" : "block";

        const groups = groupByCategory(filtered);

        Object.keys(groups).sort().forEach(function(category){
            const section = document.createElement("section");
            section.className = "category-section";

            section.innerHTML = `
                <div class="category-header">
                    <h2>${escapeHtml(category)}</h2>
                    <span>${groups[category].length} ${groups[category].length === 1 ? CONFIG.singleLabel : CONFIG.pluralLabel}</span>
                </div>
                <div class="business-grid"></div>
            `;

            const grid = section.querySelector(".business-grid");
            groups[category].forEach(function(business){
                grid.appendChild(createBusinessCard(business));
            });

            resultsContainer.appendChild(section);
        });
    }

    function requestLocation(){
        if(!navigator.geolocation){
            renderBusinesses();
            return;
        }

        locationButton.textContent = "Obteniendo ubicación...";

        navigator.geolocation.getCurrentPosition(
            function(position){
                userLocation = {
                    latitud:position.coords.latitude,
                    longitud:position.coords.longitude
                };

                updateDistances();
                locationButton.textContent = "Ubicación aplicada";
                renderBusinesses();
            },
            function(){
                locationButton.textContent = "Usar mi ubicación";
                renderBusinesses();
            },
            {
                enableHighAccuracy:true,
                timeout:8000,
                maximumAge:300000
            }
        );
    }

    async function init(){
        allBusinesses = await loadBusinessesFromFinalPages();
        updateDistances();
        updateCategoryFilter(allBusinesses.filter(businessMatchesPageFilter));
        loadingState.style.display = "none";
        renderBusinesses();
    }

    searchInput.addEventListener("input",renderBusinesses);
    categoryFilter.addEventListener("change",renderBusinesses);

    if(locationButton){
        locationButton.addEventListener("click",requestLocation);
    }

    init();
})();

</script>
