<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbanex - Cerca de mí</title>
    <link rel="icon" type="image/png" href="../imagenes/log.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #020202;
            --bg-card: rgba(18, 18, 18, 0.76);
            --gold: #e5c158;
            --border-color: rgba(229, 193, 88, 0.22);
            --text-main: #ffffff;
            --text-muted: #d7d7d7;
            --text-soft: #9c9c9c;
            --success: #2ed573;
            --font-serif: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
            --transition: all 0.25s ease;
            --blur: blur(18px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(135deg, rgba(0,0,0,0.66), rgba(0,0,0,0.34)),
                url("../imagenes/Boulevard.png") center bottom / cover fixed no-repeat;
            color: var(--text-main);
            font-family: var(--font-sans);
            padding-bottom: 24px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .header-top {
            height: 60px;
            background: rgba(6, 6, 6, 0.45);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .brand-box img {
            height: 60px;
            width: auto;
            display: block;
        }

        .back-link {
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.42);
            color: #ffffff;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 700;
            transition: var(--transition);
        }

        .back-link:hover {
            border-color: var(--gold);
            background: rgba(229, 193, 88, 0.10);
        }

        .page-wrap {
            width: min(1180px, calc(100% - 28px));
            margin: 22px auto 36px;
        }

        .hero {
            border: 1px solid var(--border-color);
            border-radius: 22px;
            background:
                radial-gradient(circle at 16% 0%, rgba(229, 193, 88, 0.18), transparent 28%),
                rgba(6, 6, 6, 0.68);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            padding: 26px 28px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
            box-shadow: 0 24px 60px rgba(0,0,0,0.42);
        }

        .eyebrow {
            color: var(--gold);
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .hero h1 {
            font-family: var(--font-serif);
            font-size: clamp(24px, 4vw, 42px);
            letter-spacing: 3px;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 10px;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.6;
            max-width: 760px;
        }

        .total-card {
            min-width: 132px;
            border: 1px solid rgba(229,193,88,0.32);
            background: rgba(0,0,0,0.44);
            border-radius: 18px;
            padding: 14px 16px;
            text-align: center;
        }

        .total-card strong {
            display: block;
            color: var(--gold);
            font-family: var(--font-serif);
            font-size: 30px;
            line-height: 1;
        }

        .total-card span {
            color: var(--text-soft);
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toolbar {
            margin: 14px 0;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }

        .search-input,
        .category-select {
            height: 36px;
            background: rgba(0,0,0,0.56);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            color: #ffffff;
            font-family: var(--font-sans);
            font-size: 11px;
            outline: none;
        }

        .search-input {
            padding: 0 15px;
        }

        .category-select {
            padding: 0 12px;
            min-width: 210px;
            cursor: pointer;
        }

        .category-section {
            margin-top: 14px;
            border: 1px solid rgba(229,193,88,0.16);
            border-radius: 18px;
            background: rgba(5,5,5,0.52);
            overflow: hidden;
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
        }

        .category-header {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .category-header h2 {
            color: var(--gold);
            font-family: var(--font-serif);
            font-size: 13px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
        }

        .category-header span {
            color: #000000;
            background: var(--gold);
            border-radius: 999px;
            padding: 4px 9px;
            font-size: 9px;
            font-weight: 800;
            white-space: nowrap;
        }

        .business-grid {
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 10px;
        }

        .business-card {
            border: 1px solid rgba(255,255,255,0.09);
            background: var(--bg-card);
            border-radius: 14px;
            padding: 10px;
            min-height: 112px;
            transition: var(--transition);
        }

        .business-card:hover {
            border-color: rgba(229,193,88,0.50);
            background: rgba(229,193,88,0.08);
            transform: translateY(-2px);
        }

        .business-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
        }

        .business-title {
            font-size: 12px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
        }

        .business-status {
            color: var(--success);
            border: 1px solid rgba(46,213,115,0.34);
            background: rgba(46,213,115,0.10);
            border-radius: 999px;
            padding: 3px 7px;
            font-size: 7.5px;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .business-segment {
            color: var(--gold);
            font-size: 9px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .business-description {
            color: var(--text-muted);
            font-size: 9px;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .business-footer {
            margin-top: 9px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .rating {
            color: var(--gold);
            font-size: 9px;
            font-weight: 800;
        }

        .profile-link {
            border: 1px solid rgba(229,193,88,0.28);
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 8px;
            font-weight: 800;
            color: #ffffff;
        }

        .empty-state {
            margin-top: 14px;
            border: 1px dashed rgba(229,193,88,0.34);
            border-radius: 18px;
            padding: 24px;
            text-align: center;
            background: rgba(0,0,0,0.44);
            color: var(--text-muted);
            font-size: 12px;
            display: none;
        }

        .loading-state {
            margin-top: 14px;
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
        }

        .footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 24px;
            background-color: #000000;
            color: #8c8c8c;
            font-size: 11px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-top: 1px solid #1a1a1a;
            z-index: 50;
            font-family: Arial, Helvetica, sans-serif;
        }

        @media (max-width: 720px) {
            .header-top {
                height: auto;
                padding: 12px;
                gap: 10px;
                flex-direction: column;
            }

            .hero {
                grid-template-columns: 1fr;
                padding: 22px;
            }

            .total-card {
                width: 100%;
            }

            .toolbar {
                grid-template-columns: 1fr;
            }

            .category-select {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<header class="header-top">
    <a href="../boulevard.html" class="brand-box" title="Volver al Boulevard">
        <img src="../imagenes/logo.png" alt="Logo Urbanex">
    </a>

    <a class="back-link" href="../boulevard.html">Volver al Boulevard</a>
</header>

<main class="page-wrap">
    <section class="hero">
        <div>
            <div class="eyebrow">Filtro global</div>
            <h1>Cerca de mí</h1>
            <p>Locales cercanos o marcados por zona, distancia o ubicación dentro de las categorías activas de Urbanex.</p>
        </div>

        <div class="total-card">
            <strong id="totalResults">0</strong>
            <span>Locales cercanos</span>
        </div>
    </section>

    <section class="toolbar">
        <input type="search" id="globalSearch" class="search-input" placeholder="Buscar resultado..." autocomplete="off">

        <select id="categoryFilter" class="category-select">
            <option value="todas">Todas las categorías</option>
        </select>
    </section>

    <div id="loadingState" class="loading-state">Cargando resultados...</div>
    <div id="resultsContainer"></div>
    <div id="emptyState" class="empty-state"></div>
</main>

<footer class="footer">
    <p>&copy; 2026 Urbanex. Desarrollado por Neodat Consultores.</p>
</footer>

<script>
(function () {
    const FILTER_TYPE = "cerca";
    const STATUS_LABEL = "Cerca";

    const resultsContainer = document.getElementById("resultsContainer");
    const emptyState = document.getElementById("emptyState");
    const loadingState = document.getElementById("loadingState");
    const totalCounter = document.getElementById("totalResults") || document.getElementById("totalOpenNow") || document.getElementById("totalBusinesses");
    const searchInput = document.getElementById("globalSearch");
    const categoryFilter = document.getElementById("categoryFilter");


    const CATEGORY_SOURCES = [
        {
            nombre: "Hogar y Tecnología",
            archivo: "../categorias/hogar.html",
            hijos: ["../categorias/hogar/electrodomesticos.html"]
        },
        { nombre: "Gastronomía", archivo: "../categorias/gastronomia.html", hijos: [] },
        { nombre: "Salud y Bienestar", archivo: "../categorias/salud.html", hijos: [] },
        { nombre: "Movilidad", archivo: "../categorias/movilidad.html", hijos: [] },
        { nombre: "Turismo y Hospedaje", archivo: "../categorias/turismo.html", hijos: [] },
        { nombre: "Finanzas", archivo: "../categorias/finanzas.html", hijos: [] },
        { nombre: "Comercio y Educación", archivo: "../categorias/comercio.html", hijos: [] }
    ];

    const cache = new Map();

    function escapeHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function escapeRegExp(value) {
        return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function normalizeText(value) {
        return String(value ?? "")
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/[^a-z0-9ñ\s./:_-]/gi, " ")
            .replace(/\s+/g, " ")
            .trim();
    }

    function resolveProjectUrl(src, baseUrl) {
        if (!src) return "";
        return new URL(String(src), baseUrl || window.location.href).href;
    }

    async function fetchHtml(src, baseUrl) {
        const normalizedUrl = resolveProjectUrl(src, baseUrl);
        if (cache.has(normalizedUrl)) return cache.get(normalizedUrl);

        const requestUrl = new URL(normalizedUrl);
        requestUrl.searchParams.set("_urbanex", Date.now().toString());

        const response = await fetch(requestUrl.href, { cache: "no-store" });
        if (!response.ok) throw new Error("No se pudo cargar " + normalizedUrl);

        const htmlText = await response.text();
        cache.set(normalizedUrl, htmlText);
        return htmlText;
    }

    function getBalancedText(sourceText, startIndex, openChar, closeChar) {
        const firstOpen = String(sourceText || "").indexOf(openChar, startIndex);
        if (firstOpen === -1) return "";

        let depth = 0;
        let quote = "";
        let escaped = false;

        for (let i = firstOpen; i < sourceText.length; i++) {
            const char = sourceText[i];

            if (escaped) {
                escaped = false;
                continue;
            }

            if (char === "\\") {
                escaped = true;
                continue;
            }

            if (quote) {
                if (char === quote) quote = "";
                continue;
            }

            if (char === "'" || char === '"' || char === "`") {
                quote = char;
                continue;
            }

            if (char === openChar) depth++;
            if (char === closeChar) depth--;

            if (depth === 0) return sourceText.slice(firstOpen, i + 1);
        }

        return "";
    }

    function extractAssignedData(sourceText, variableNames) {
        const source = String(sourceText || "");

        for (const name of variableNames) {
            const patterns = [
                new RegExp("(?:const|let|var)\\s+" + escapeRegExp(name) + "\\s*=\\s*", "i"),
                new RegExp("window\\." + escapeRegExp(name) + "\\s*=\\s*", "i"),
                new RegExp("\\b" + escapeRegExp(name) + "\\s*=\\s*", "i")
            ];

            for (const pattern of patterns) {
                const match = pattern.exec(source);
                if (!match) continue;

                let valueStart = match.index + match[0].length;
                while (/\s/.test(source[valueStart] || "")) valueStart++;

                const firstChar = source[valueStart];
                let raw = "";

                if (firstChar === "[") raw = getBalancedText(source, valueStart, "[", "]");
                else if (firstChar === "{") raw = getBalancedText(source, valueStart, "{", "}");
                else {
                    const semicolon = source.indexOf(";", valueStart);
                    raw = source.slice(valueStart, semicolon === -1 ? source.length : semicolon).trim();
                }

                if (!raw) continue;

                try {
                    return (new Function("return (" + raw + ");"))();
                } catch (error) {
                    console.warn("No se pudo interpretar " + name, error);
                }
            }
        }

        return null;
    }

    function parseJsonData(doc) {
        const jsonNode = doc.querySelector(
            "#urbanex-empresa-data, #urbanex-empresas-data, #empresa-data, #businessData, script[type='application/json'][data-urbanex='empresa'], script[type='application/json'][data-urbanex='empresas']"
        );

        if (!jsonNode || !jsonNode.textContent.trim()) return null;

        try {
            const parsed = JSON.parse(jsonNode.textContent.trim());
            return Array.isArray(parsed) ? parsed : [parsed];
        } catch (error) {
            console.warn("El bloque JSON del último eslabón no es válido.", error);
            return null;
        }
    }

    function scriptTextFromDoc(doc) {
        return Array.from(doc.querySelectorAll("script"))
            .map(function (script) { return script.textContent || ""; })
            .join("\n");
    }

    function cleanPathTitle(path) {
        const fileName = String(path || "").split("/").pop() || "Negocio";
        return fileName.replace(/\.html?$/i, "").replace(/[-_]/g, " ").trim() || "Negocio";
    }

    function getMeta(doc, name) {
        return doc.querySelector(`meta[name="${name}"]`)?.getAttribute("content")?.trim() || "";
    }

    function toBoolean(value) {
        if (typeof value === "boolean") return value;
        if (typeof value === "number") return value === 1;
        if (typeof value === "string") {
            const normalized = normalizeText(value);
            if (["si", "sí", "true", "1", "activo", "activa", "abierto", "disponible", "publicado", "habilitado"].includes(normalized)) return true;
            if (["no", "false", "0", "inactivo", "inactiva", "cerrado", "oculto", "pendiente", "suspendido"].includes(normalized)) return false;
        }
        return null;
    }

    function firstDefined(raw, names) {
        for (const name of names) {
            if (raw && raw[name] !== undefined && raw[name] !== null && raw[name] !== "") return raw[name];
        }
        return "";
    }

    function booleanFromRaw(raw, names) {
        for (const name of names) {
            if (!raw || raw[name] === undefined || raw[name] === null || raw[name] === "") continue;
            const value = toBoolean(raw[name]);
            if (value !== null) return value;
        }
        return null;
    }

    function hasNonEmptyArray(raw, names) {
        return names.some(function (name) {
            return Array.isArray(raw?.[name]) && raw[name].length > 0;
        });
    }

    function parseNumber(value) {
        const number = Number(String(value ?? "").replace(",", ".").replace(/[^\d.-]/g, ""));
        return Number.isFinite(number) ? number : null;
    }

    function dayKeyFromDate(date) {
        return ["domingo", "lunes", "martes", "miercoles", "jueves", "viernes", "sabado"][date.getDay()];
    }

    function minutesFromTime(value) {
        const match = String(value || "").trim().match(/^(\d{1,2}):(\d{2})$/);
        if (!match) return null;
        return Number(match[1]) * 60 + Number(match[2]);
    }

    function normalizeScheduleRange(value) {
        if (Array.isArray(value)) return value.join("-");
        return String(value || "");
    }

    function isOpenBySchedule(schedule) {
        if (!schedule || typeof schedule !== "object") return false;

        const now = new Date();
        const dayKey = dayKeyFromDate(now);
        const rawRange = schedule[dayKey] || schedule[dayKey.normalize("NFD").replace(/[\u0300-\u036f]/g, "")];
        if (!rawRange || normalizeText(rawRange) === "cerrado") return false;

        const ranges = Array.isArray(rawRange) && Array.isArray(rawRange[0]) ? rawRange : [normalizeScheduleRange(rawRange)];
        const currentMinutes = now.getHours() * 60 + now.getMinutes();

        return ranges.some(function (range) {
            const parts = String(range).split("-");
            if (parts.length !== 2) return false;

            const openMinutes = minutesFromTime(parts[0]);
            const closeMinutes = minutesFromTime(parts[1]);
            if (openMinutes === null || closeMinutes === null) return false;

            if (closeMinutes < openMinutes) {
                return currentMinutes >= openMinutes || currentMinutes <= closeMinutes;
            }

            return currentMinutes >= openMinutes && currentMinutes <= closeMinutes;
        });
    }

    function isActiveBusiness(raw, estado) {
        const explicit = booleanFromRaw(raw, ["activo", "active", "publicado", "visible", "habilitado", "registrado"]);
        if (explicit === false) return false;
        if (explicit === true) return true;

        const normalizedStatus = normalizeText(estado);
        if (!normalizedStatus) return true;

        return !/(inactivo|inactiva|oculto|oculta|suspendido|suspendida|pendiente|eliminado|eliminada|borrador|cerrado permanente)/.test(normalizedStatus);
    }

    function normalizeBusiness(rawBusiness, sourceUrl, fallbackCategory) {
        const raw = Object.assign({}, rawBusiness || {});
        const estado = String(firstDefined(raw, ["estado", "status", "disponibilidad", "estadoManual"]) || "Disponible");
        const nombre = String(firstDefined(raw, ["nombre", "name", "titulo", "title"]) || cleanPathTitle(sourceUrl));
        const categoria = String(firstDefined(raw, ["categoria", "category", "rubro"]) || fallbackCategory || "Sin categoría");
        const segmento = String(firstDefined(raw, ["segmento", "tipo", "subcategoria", "category"]) || categoria);
        const descripcion = String(firstDefined(raw, ["descripcion", "description", "detalle", "resumen"]) || "");
        const rating = Number(firstDefined(raw, ["rating", "calificacion", "valoracion", "estrellas"]) || 0) || 0;
        const perfilRaw = String(firstDefined(raw, ["perfil", "url", "href", "link"]) || sourceUrl);
        const perfil = resolveProjectUrl(perfilRaw, sourceUrl);
        const latitud = parseNumber(firstDefined(raw, ["latitud", "lat", "latitude"]));
        const longitud = parseNumber(firstDefined(raw, ["longitud", "lng", "lon", "longitude"]));
        const direccion = String(firstDefined(raw, ["direccion", "address", "ubicacion", "location"]) || "");
        const zona = String(firstDefined(raw, ["zona", "sector", "barrio"]) || "");
        const horario = raw.horario || raw.schedule || null;

        const abiertoExplicit = booleanFromRaw(raw, ["abierto", "open", "isOpen", "estaAbierto"]);
        const domicilioExplicit = booleanFromRaw(raw, [
            "domicilio", "delivery", "aDomicilio", "servicioDomicilio", "entregaDomicilio", "tieneDomicilio", "envioDomicilio"
        ]);
        const ofertaExplicit = booleanFromRaw(raw, ["oferta", "tieneOferta", "promo", "promocion", "ofertasActivas", "enOferta"]);
        const cercaExplicit = booleanFromRaw(raw, ["cerca", "cercano", "cercaDeMi", "nearby"]);

        const estadoNormalizado = normalizeText(estado);
        const activo = isActiveBusiness(raw, estado);
        const abierto = abiertoExplicit === true || estadoNormalizado.includes("abierto") || isOpenBySchedule(horario);
        const domicilio = domicilioExplicit === true;
        const oferta = ofertaExplicit === true || hasNonEmptyArray(raw, ["ofertas", "promos", "promociones", "descuentos"]);
        const cercano = cercaExplicit === true || (latitud !== null && longitud !== null) || Boolean(direccion || zona || raw.distancia || raw.distance);

        return {
            nombre: nombre,
            categoria: categoria,
            segmento: segmento,
            descripcion: descripcion || "Sin descripción registrada.",
            rating: rating,
            estado: estado,
            activo: activo,
            abierto: abierto,
            domicilio: domicilio,
            oferta: oferta,
            cercano: cercano,
            perfil: perfil,
            searchable: normalizeText([nombre, categoria, segmento, descripcion, estado, direccion, zona].join(" ")),
            sourceUrl: sourceUrl
        };
    }

    function fallbackBusinessFromFinalHtml(doc, sourceUrl, fallbackCategory) {
        const body = doc.body || document.createElement("body");
        const root = doc.querySelector("[data-business], [data-empresa], article, main") || body;

        const raw = {
            nombre: getMeta(doc, "urbanex:nombre") || root.querySelector("h1, .business-title, .shop-title, [data-name]")?.textContent?.trim() || doc.title || cleanPathTitle(sourceUrl),
            categoria: getMeta(doc, "urbanex:categoria") || root.querySelector(".business-category, .category-pill, .categoria, [data-category]")?.textContent?.trim() || fallbackCategory || "Sin categoría",
            segmento: getMeta(doc, "urbanex:segmento") || root.querySelector(".business-segment, .shop-segment, .segmento, [data-segment]")?.textContent?.trim() || fallbackCategory || "Negocio",
            descripcion: getMeta(doc, "description") || root.querySelector(".business-description, .company-description, .descripcion, [data-description]")?.textContent?.trim() || "",
            estado: getMeta(doc, "urbanex:estado") || root.querySelector(".business-status, .estado, [data-status]")?.textContent?.trim() || "Disponible",
            rating: root.querySelector(".rating, .business-rating, [data-rating]")?.textContent?.replace(/[^\d.]/g, "") || 0,
            activo: getMeta(doc, "urbanex:activo") || root.getAttribute("data-activo") || root.getAttribute("data-active") || "",
            abierto: getMeta(doc, "urbanex:abierto") || root.getAttribute("data-abierto") || root.getAttribute("data-open") || "",
            domicilio: getMeta(doc, "urbanex:domicilio") || root.getAttribute("data-domicilio") || root.getAttribute("data-delivery") || "",
            oferta: getMeta(doc, "urbanex:oferta") || root.getAttribute("data-oferta") || root.getAttribute("data-promo") || "",
            cerca: getMeta(doc, "urbanex:cerca") || root.getAttribute("data-cerca") || root.getAttribute("data-nearby") || "",
            latitud: getMeta(doc, "urbanex:latitud") || root.getAttribute("data-lat") || root.getAttribute("data-latitud") || "",
            longitud: getMeta(doc, "urbanex:longitud") || root.getAttribute("data-lng") || root.getAttribute("data-longitud") || "",
            direccion: getMeta(doc, "urbanex:direccion") || root.querySelector(".direccion, .address, [data-address]")?.textContent?.trim() || "",
            perfil: sourceUrl
        };

        if (doc.querySelector("[data-oferta='true'], [data-promo='true'], .oferta-activa, .promo-activa")) raw.oferta = true;

        return [raw];
    }

    function parseBusinessDataFromFinalHtml(htmlText, sourceUrl, fallbackCategory) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, "text/html");

        const jsonData = parseJsonData(doc);
        if (jsonData && jsonData.length) {
            return jsonData.map(function (raw) { return normalizeBusiness(raw, sourceUrl, fallbackCategory); });
        }

        const scriptText = scriptTextFromDoc(doc);
        const assignedData = extractAssignedData(scriptText, [
            "URBANEX_EMPRESAS",
            "EMPRESAS",
            "EMPRESAS_ELECTRODOMESTICOS",
            "URBANEX_EMPRESA",
            "EMPRESA",
            "BUSINESS_DATA",
            "BUSINESSES"
        ]);

        if (assignedData) {
            const arrayData = Array.isArray(assignedData) ? assignedData : [assignedData];
            const objectData = arrayData.filter(function (item) { return item && typeof item === "object" && !Array.isArray(item); });
            if (objectData.length) {
                return objectData.map(function (raw) { return normalizeBusiness(raw, sourceUrl, fallbackCategory); });
            }
        }

        return fallbackBusinessFromFinalHtml(doc, sourceUrl, fallbackCategory)
            .map(function (raw) { return normalizeBusiness(raw, sourceUrl, fallbackCategory); });
    }

    function getLastEslabonSources(htmlText, pageUrl) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, "text/html");
        const scriptText = scriptTextFromDoc(doc);
        const sources = [];

        const assignedSources = extractAssignedData(scriptText, [
            "EMPRESAS_DATA_SOURCES",
            "BUSINESS_DATA_SOURCES",
            "NEGOCIOS_DATA_SOURCES",
            "URBANEX_DATA_SOURCES",
            "EMPRESAS_SOURCES",
            "BUSINESS_SOURCES"
        ]);

        if (Array.isArray(assignedSources)) {
            assignedSources.forEach(function (source) {
                if (typeof source === "string" && /\.html?(?:$|[?#])/i.test(source)) {
                    sources.push(resolveProjectUrl(source, pageUrl));
                }
            });
        }

        Array.from(doc.querySelectorAll("[data-business-src], [data-empresa-src], [data-final-src], [data-profile-src]")).forEach(function (element) {
            const source = element.getAttribute("data-business-src") ||
                element.getAttribute("data-empresa-src") ||
                element.getAttribute("data-final-src") ||
                element.getAttribute("data-profile-src");

            if (source && /\.html?(?:$|[?#])/i.test(source)) {
                sources.push(resolveProjectUrl(source, pageUrl));
            }
        });

        Array.from(doc.querySelectorAll("a[href]")).forEach(function (anchor) {
            const href = anchor.getAttribute("href") || "";
            if (/\.html?(?:$|[?#])/i.test(href) && /(^|\/)empresas\//i.test(href)) {
                sources.push(resolveProjectUrl(href, pageUrl));
            }
        });

        return Array.from(new Set(sources));
    }

    function getSubcategorySources(htmlText, pageUrl) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, "text/html");

        return Array.from(doc.querySelectorAll("[data-count-src]"))
            .map(function (element) { return element.getAttribute("data-count-src"); })
            .filter(Boolean)
            .map(function (source) { return resolveProjectUrl(source, pageUrl); });
    }

    async function loadBusinessesFromFinalSource(sourceUrl, fallbackCategory) {
        const htmlText = await fetchHtml(sourceUrl, window.location.href);
        return parseBusinessDataFromFinalHtml(htmlText, sourceUrl, fallbackCategory);
    }

    async function loadBusinessesFromPage(source, fallbackCategory, depth) {
        const pageUrl = resolveProjectUrl(source, window.location.href);
        const htmlText = await fetchHtml(pageUrl, window.location.href);

        const lastSources = getLastEslabonSources(htmlText, pageUrl);
        if (lastSources.length) {
            const finalResults = await Promise.all(lastSources.map(function (lastSource) {
                return loadBusinessesFromFinalSource(lastSource, fallbackCategory).catch(function () { return []; });
            }));
            return finalResults.flat();
        }

        if (depth > 0) {
            const childSources = getSubcategorySources(htmlText, pageUrl).filter(function (childSource) {
                return childSource !== pageUrl;
            });

            if (childSources.length) {
                const childResults = await Promise.all(childSources.map(function (childSource) {
                    return loadBusinessesFromPage(childSource, fallbackCategory, depth - 1).catch(function () { return []; });
                }));
                return childResults.flat();
            }
        }

        return parseBusinessDataFromFinalHtml(htmlText, pageUrl, fallbackCategory);
    }

    function dedupeBusinesses(businesses) {
        const map = new Map();
        businesses.forEach(function (business) {
            if (!business || !business.nombre) return;
            const key = normalizeText((business.perfil || business.sourceUrl || "") + "|" + business.nombre);
            if (!map.has(key)) map.set(key, business);
        });
        return Array.from(map.values());
    }


    let allResults = [];

    function businessMatchesFilter(business) {
        if (!business || !business.activo) return false;
        if (FILTER_TYPE === "abiertos") return business.abierto === true;
        if (FILTER_TYPE === "domicilio") return business.domicilio === true;
        if (FILTER_TYPE === "ofertas") return business.oferta === true;
        if (FILTER_TYPE === "cerca") return business.cercano === true;
        return true;
    }

    async function loadAllBusinesses() {
        const results = await Promise.all(CATEGORY_SOURCES.map(async function (category) {
            const sources = category.hijos && category.hijos.length ? category.hijos : [category.archivo];
            const categoryResults = await Promise.all(sources.map(function (source) {
                return loadBusinessesFromPage(source, category.nombre, 3).catch(function () { return []; });
            }));

            return categoryResults.flat().map(function (business) {
                business.categoria = business.categoria || category.nombre;
                return business;
            });
        }));

        return dedupeBusinesses(results.flat()).filter(businessMatchesFilter);
    }

    function populateCategoryFilter(businesses) {
        if (!categoryFilter) return;

        const categories = Array.from(new Set(businesses.map(function (business) {
            return business.categoria || "Sin categoría";
        }))).sort();

        categoryFilter.innerHTML = '<option value="todas">Todas las categorías</option>' +
            categories.map(function (category) {
                return '<option value="' + escapeHtml(category) + '">' + escapeHtml(category) + '</option>';
            }).join("");
    }

    function renderResults() {
        const query = normalizeText(searchInput ? searchInput.value : "");
        const selectedCategory = categoryFilter ? categoryFilter.value : "todas";

        const filtered = allResults.filter(function (business) {
            const matchesSearch = !query || business.searchable.includes(query);
            const matchesCategory = selectedCategory === "todas" || business.categoria === selectedCategory;
            return matchesSearch && matchesCategory;
        });

        if (totalCounter) totalCounter.textContent = filtered.length;
        if (emptyState) emptyState.style.display = "none";

        const grouped = filtered.reduce(function (accumulator, business) {
            const category = business.categoria || "Sin categoría";
            if (!accumulator[category]) accumulator[category] = [];
            accumulator[category].push(business);
            return accumulator;
        }, {});

        resultsContainer.innerHTML = Object.keys(grouped).sort().map(function (categoryName) {
            const items = grouped[categoryName].map(function (business) {
                const ratingText = business.rating > 0 ? "★ " + business.rating.toFixed(1) : "";
                return `
                    <article class="business-card">
                        <div class="business-top">
                            <h3 class="business-title">${escapeHtml(business.nombre)}</h3>
                            <span class="business-status">${escapeHtml(STATUS_LABEL)}</span>
                        </div>
                        <div class="business-segment">${escapeHtml(business.segmento)}</div>
                        <p class="business-description">${escapeHtml(business.descripcion || "Sin descripción registrada.")}</p>
                        <div class="business-footer">
                            <span class="rating">${escapeHtml(ratingText)}</span>
                            <a class="profile-link" href="${escapeHtml(business.perfil)}">Ver perfil</a>
                        </div>
                    </article>
                `;
            }).join("");

            return `
                <section class="category-section">
                    <div class="category-header">
                        <h2>${escapeHtml(categoryName)}</h2>
                        <span>${grouped[categoryName].length} resultados</span>
                    </div>
                    <div class="business-grid">${items}</div>
                </section>
            `;
        }).join("");
    }

    async function init() {
        try {
            allResults = await loadAllBusinesses();
            populateCategoryFilter(allResults);
            if (loadingState) loadingState.style.display = "none";
            renderResults();
        } catch (error) {
            console.warn(error);
            allResults = [];
            if (loadingState) loadingState.style.display = "none";
            if (totalCounter) totalCounter.textContent = "0";
            if (emptyState) emptyState.style.display = "none";
            if (resultsContainer) resultsContainer.innerHTML = "";
        }
    }

    if (searchInput) searchInput.addEventListener("input", renderResults);
    if (categoryFilter) categoryFilter.addEventListener("change", renderResults);

    init();
})();
</script>
