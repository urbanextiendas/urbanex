<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbanex - Abiertos Ahora</title>
    <link rel="icon" type="image/png" href="../imagenes/log.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://mlkynawsjqmawgxeuvks.supabase.co" crossorigin>
    <link rel="preconnect" href="https://esm.sh" crossorigin>
    <link rel="modulepreload" href="https://esm.sh/@supabase/supabase-js@2">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #020202;
            --bg-panel: rgba(8, 8, 8, 0.74);
            --bg-card: rgba(18, 18, 18, 0.76);
            --gold: #e5c158;
            --border-color: rgba(229, 193, 88, 0.22);
            --text-main: #ffffff;
            --text-muted: #d7d7d7;
            --text-soft: #9c9c9c;
            --success: #2ed573;
            --font-serif: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
            --transition: all 0.25s ease;
            --blur: blur(18px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(135deg, rgba(0,0,0,0.66), rgba(0,0,0,0.34)),
                url("../imagenes/Boulevard.png") center bottom / cover fixed no-repeat;
            color: var(--text-main);
            font-family: var(--font-sans);
            padding-bottom: 24px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .header-top {
            height: 60px;
            background: rgba(6, 6, 6, 0.45);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .brand-box img {
            height: 60px;
            width: auto;
            display: block;
        }

        .back-link {
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.42);
            color: #ffffff;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 700;
            transition: var(--transition);
        }

        .back-link:hover {
            border-color: var(--gold);
            background: rgba(229, 193, 88, 0.10);
        }

        .page-wrap {
            width: min(1180px, calc(100% - 28px));
            margin: 22px auto 36px;
        }

        .hero {
            border: 1px solid var(--border-color);
            border-radius: 22px;
            background:
                radial-gradient(circle at 16% 0%, rgba(229, 193, 88, 0.18), transparent 28%),
                rgba(6, 6, 6, 0.68);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            padding: 26px 28px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
            box-shadow: 0 24px 60px rgba(0,0,0,0.42);
        }

        .eyebrow {
            color: var(--gold);
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .hero h1 {
            font-family: var(--font-serif);
            font-size: clamp(24px, 4vw, 42px);
            letter-spacing: 3px;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 10px;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.6;
            max-width: 720px;
        }

        .total-card {
            min-width: 132px;
            border: 1px solid rgba(229,193,88,0.32);
            background: rgba(0,0,0,0.44);
            border-radius: 18px;
            padding: 14px 16px;
            text-align: center;
        }

        .total-card strong {
            display: block;
            color: var(--gold);
            font-family: var(--font-serif);
            font-size: 30px;
            line-height: 1;
        }

        .total-card span {
            color: var(--text-soft);
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toolbar {
            margin: 14px 0;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }

        .search-input,
        .category-select {
            height: 36px;
            background: rgba(0,0,0,0.56);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            color: #ffffff;
            font-family: var(--font-sans);
            font-size: 11px;
            outline: none;
        }

        .search-input {
            padding: 0 15px;
        }

        .category-select {
            padding: 0 12px;
            min-width: 210px;
            cursor: pointer;
        }

        .category-section {
            margin-top: 14px;
            border: 1px solid rgba(229,193,88,0.16);
            border-radius: 18px;
            background: rgba(5,5,5,0.52);
            overflow: hidden;
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
        }

        .category-header {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .category-header h2 {
            color: var(--gold);
            font-family: var(--font-serif);
            font-size: 13px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
        }

        .category-header span {
            color: #000000;
            background: var(--gold);
            border-radius: 999px;
            padding: 4px 9px;
            font-size: 9px;
            font-weight: 800;
            white-space: nowrap;
        }

        .business-grid {
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 10px;
        }

        .business-card {
            border: 1px solid rgba(255,255,255,0.09);
            background: var(--bg-card);
            border-radius: 14px;
            padding: 10px;
            min-height: 112px;
            transition: var(--transition);
        }

        .business-card:hover {
            border-color: rgba(229,193,88,0.50);
            background: rgba(229,193,88,0.08);
            transform: translateY(-2px);
        }

        .business-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
        }

        .business-title {
            font-size: 12px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
        }

        .business-status {
            color: var(--success);
            border: 1px solid rgba(46,213,115,0.34);
            background: rgba(46,213,115,0.10);
            border-radius: 999px;
            padding: 3px 7px;
            font-size: 7.5px;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .business-segment {
            color: var(--gold);
            font-size: 9px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .business-description {
            color: var(--text-muted);
            font-size: 9px;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .business-footer {
            margin-top: 9px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .rating {
            color: var(--gold);
            font-size: 9px;
            font-weight: 800;
        }

        .profile-link {
            border: 1px solid rgba(229,193,88,0.28);
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 8px;
            font-weight: 800;
            color: #ffffff;
        }

        .empty-state {
            margin-top: 14px;
            border: 1px dashed rgba(229,193,88,0.34);
            border-radius: 18px;
            padding: 24px;
            text-align: center;
            background: rgba(0,0,0,0.44);
            color: var(--text-muted);
            font-size: 12px;
            display: none;
        }

        .loading-state {
            margin-top: 14px;
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
        }

        .footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 24px;
            background-color: #000000;
            color: #8c8c8c;
            font-size: 11px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-top: 1px solid #1a1a1a;
            z-index: 50;
            font-family: Arial, Helvetica, sans-serif;
        }

        @media (max-width: 720px) {
            .header-top {
                height: auto;
                padding: 12px;
                gap: 10px;
                flex-direction: column;
            }

            .hero {
                grid-template-columns: 1fr;
                padding: 22px;
            }

            .total-card {
                width: 100%;
            }

            .toolbar {
                grid-template-columns: 1fr;
            }

            .category-select {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<header class="header-top">
    <a href="../boulevard.html" class="brand-box" title="Volver al Boulevard">
        <img src="../imagenes/logo.png" alt="Logo Urbanex">
    </a>

    <a class="back-link" href="../boulevard.html">Volver al Boulevard</a>
</header>

<main class="page-wrap">
    <section class="hero">
        <div>
            <div class="eyebrow">Filtro global</div>
            <h1>Abiertos Ahora</h1>
            <p>
                Locales abiertos en este momento, reunidos desde todas las categorías activas de Urbanex.
                El listado se alimenta directamente de Supabase.
            </p>
        </div>

        <div class="total-card">
            <strong id="totalOpenNow">0</strong>
            <span>Locales abiertos</span>
        </div>
    </section>

    <section class="toolbar">
        <input type="search" id="globalSearch" class="search-input" placeholder="Buscar local abierto..." autocomplete="off">

        <select id="categoryFilter" class="category-select">
            <option value="todas">Todas las categorías</option>
        </select>
    </section>

    <div id="loadingState" class="loading-state">Cargando locales abiertos...</div>
    <div id="resultsContainer"></div>
    <div id="emptyState" class="empty-state"></div>
</main>

<footer class="footer">
    <p>&copy; 2026 Urbanex. Desarrollado por NeoDat Consultores.</p>
</footer>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://mlkynawsjqmawgxeuvks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_UyYcTuSIaLDbaD73wvwOfA_TbyFlRNv';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const FILTER_TYPE = "abiertos";
const STATUS_LABEL = "Abierto";

const resultsContainer = document.getElementById("resultsContainer");
const emptyState = document.getElementById("emptyState");
const loadingState = document.getElementById("loadingState");
const totalCounter = document.getElementById("totalResults") || document.getElementById("totalOpenNow") || document.getElementById("totalBusinesses");
const searchInput = document.getElementById("globalSearch");
const categoryFilter = document.getElementById("categoryFilter");

const BUSINESS_SELECT = `
    *,
    categories!category_id(id,name,icon,parent_id),
    subcategories:categories!subcategory_id(id,name,icon,parent_id)
`;

let allResults = [];
let categories = [];
let categoryById = new Map();
let userPosition = null;

function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function normalizeText(value) {
    return String(value ?? "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9ñ\s./:_-]/gi, " ")
        .replace(/\s+/g, " ")
        .trim();
}

function toNum(value) {
    const number = Number(value);
    return Number.isFinite(number) ? number : null;
}

function relation(value) {
    if (Array.isArray(value)) return value[0] || null;
    return value || null;
}

function firstDefined(raw, names) {
    for (const name of names) {
        if (raw && raw[name] !== undefined && raw[name] !== null && raw[name] !== "") return raw[name];
    }
    return "";
}

function toBoolean(value) {
    if (typeof value === "boolean") return value;
    if (typeof value === "number") return value === 1;
    if (typeof value === "string") {
        const normalized = normalizeText(value);
        if (["si", "sí", "true", "1", "activo", "activa", "abierto", "disponible", "publicado", "habilitado"].includes(normalized)) return true;
        if (["no", "false", "0", "inactivo", "inactiva", "cerrado", "oculto", "pendiente", "suspendido"].includes(normalized)) return false;
    }
    return null;
}

function businessUrl(business) {
    if (business.slug) return `../business/?slug=${encodeURIComponent(business.slug)}`;
    if (business.id !== undefined && business.id !== null) return `../business/?id=${encodeURIComponent(business.id)}`;
    return "#";
}

function getCategoryRecord(business) {
    const direct = relation(business.categories);
    if (direct) return direct;

    const directId = toNum(business.category_id);
    if (directId !== null) return categoryById.get(directId) || null;

    return null;
}

function getSubcategoryRecord(business) {
    const direct = relation(business.subcategories);
    if (direct) return direct;

    const directId = toNum(business.subcategory_id);
    if (directId !== null) return categoryById.get(directId) || null;

    return null;
}

function getRootCategoryName(business) {
    const category = getCategoryRecord(business);
    const subcategory = getSubcategoryRecord(business);

    if (category && category.parent_id) {
        const parent = categoryById.get(toNum(category.parent_id));
        if (parent?.name) return parent.name;
    }

    if (subcategory && subcategory.parent_id) {
        const parent = categoryById.get(toNum(subcategory.parent_id));
        if (parent?.name) return parent.name;
    }

    return category?.name || subcategory?.name || "Sin categoría";
}

function getSegmentName(business) {
    const category = getCategoryRecord(business);
    const subcategory = getSubcategoryRecord(business);

    if (subcategory?.name) return subcategory.name;
    if (category?.parent_id && category?.name) return category.name;

    return category?.name || "Negocio";
}

function getApprovedReviews(business) {
    return (business.reviews || []).filter(review => review.is_approved !== false);
}

function getRating(business) {
    const reviews = getApprovedReviews(business);
    if (!reviews.length) {
        const directRating = Number(firstDefined(business, ["rating", "calificacion", "valoracion"]));
        return Number.isFinite(directRating) && directRating > 0 ? directRating : null;
    }

    return reviews.reduce((sum, review) => sum + Number(review.rating || 0), 0) / reviews.length;
}

function isOpenNow(business) {
    const explicit = toBoolean(firstDefined(business, ["is_open", "open_now", "abierto", "esta_abierto"]));
    if (explicit !== null) return explicit;

    const hours = business.business_hours || [];
    if (!hours.length) return false;

    const now = new Date();
    const today = now.getDay();
    const currentMinutes = now.getHours() * 60 + now.getMinutes();

    return hours.some(row => {
        if (Number(row.day_of_week) !== today || row.is_closed === true) return false;
        if (!row.open_time || !row.close_time) return false;

        const [openH, openM] = String(row.open_time).split(":").map(Number);
        const [closeH, closeM] = String(row.close_time).split(":").map(Number);

        if (!Number.isFinite(openH) || !Number.isFinite(closeH)) return false;

        const openMinutes = openH * 60 + (openM || 0);
        const closeMinutes = closeH * 60 + (closeM || 0);

        if (closeMinutes < openMinutes) {
            return currentMinutes >= openMinutes || currentMinutes <= closeMinutes;
        }

        return currentMinutes >= openMinutes && currentMinutes <= closeMinutes;
    });
}

function hasDelivery(business) {
    const value = firstDefined(business, [
        "delivery_available",
        "delivery",
        "domicilio",
        "a_domicilio",
        "servicio_domicilio",
        "entrega_domicilio",
        "envio_domicilio"
    ]);

    return toBoolean(value) === true;
}

function isActivePromotion(promotion) {
    if (!promotion) return false;

    const active = toBoolean(firstDefined(promotion, ["is_active", "active", "activo", "visible"]));
    if (active === false) return false;

    const now = new Date();

    const start = firstDefined(promotion, ["start_date", "starts_at", "fecha_inicio", "inicio"]);
    if (start) {
        const startDate = new Date(start);
        if (!Number.isNaN(startDate.getTime()) && startDate > now) return false;
    }

    const end = firstDefined(promotion, ["end_date", "ends_at", "fecha_fin", "fin", "valid_until"]);
    if (end) {
        const endDate = new Date(end);
        if (!Number.isNaN(endDate.getTime()) && endDate < now) return false;
    }

    return true;
}

function hasOffer(business) {
    if ((business.promotions || []).some(isActivePromotion)) return true;

    const value = firstDefined(business, [
        "has_offer",
        "has_offers",
        "offer_available",
        "oferta",
        "tiene_oferta",
        "promo",
        "promocion"
    ]);

    return toBoolean(value) === true;
}

function getLatLng(business) {
    const lat = toNum(firstDefined(business, ["latitude", "lat", "latitud"]));
    const lng = toNum(firstDefined(business, ["longitude", "lng", "lon", "longitud"]));

    if (lat === null || lng === null) return null;
    return { lat, lng };
}

function distanceKm(a, b) {
    const radius = 6371;
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLng = (b.lng - a.lng) * Math.PI / 180;
    const lat1 = a.lat * Math.PI / 180;
    const lat2 = b.lat * Math.PI / 180;

    const x = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;

    return radius * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

function canBeNear(business) {
    const coords = getLatLng(business);

    if (userPosition && coords) {
        business._distanceKm = distanceKm(userPosition, coords);
        return business._distanceKm <= 25;
    }

    return Boolean(coords || business.city || business.address);
}

function enrichBusiness(business) {
    const enriched = {
        ...business,
        _categoryName: getRootCategoryName(business),
        _segmentName: getSegmentName(business),
        _rating: null,
        _reviewCount: 0,
        _openNow: false,
        _hasDelivery: false,
        _hasOffer: false,
        _searchable: ""
    };

    enriched._rating = getRating(enriched);
    enriched._reviewCount = getApprovedReviews(enriched).length;
    enriched._openNow = isOpenNow(enriched);
    enriched._hasDelivery = hasDelivery(enriched);
    enriched._hasOffer = hasOffer(enriched);
    enriched._searchable = normalizeText([
        enriched.name,
        enriched.address,
        enriched.city,
        enriched.description,
        enriched._categoryName,
        enriched._segmentName
    ].join(" "));

    return enriched;
}

function businessMatchesFilter(business) {
    if (!business || business.is_active === false) return false;

    if (FILTER_TYPE === "abiertos") return business._openNow === true;
    if (FILTER_TYPE === "domicilio") return business._hasDelivery === true;
    if (FILTER_TYPE === "ofertas") return business._hasOffer === true;
    if (FILTER_TYPE === "cerca") return canBeNear(business);

    return true;
}

function sortBusinesses(list) {
    if (FILTER_TYPE === "cerca" && userPosition) {
        list.sort((a, b) => (a._distanceKm ?? 999999) - (b._distanceKm ?? 999999));
        return list;
    }

    if (FILTER_TYPE === "abiertos") {
        list.sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""), "es"));
        return list;
    }

    list.sort((a, b) => {
        const featuredDiff = Number(b.is_featured === true) - Number(a.is_featured === true);
        if (featuredDiff !== 0) return featuredDiff;
        return String(a.name || "").localeCompare(String(b.name || ""), "es");
    });

    return list;
}

function populateCategoryFilter(businesses) {
    if (!categoryFilter) return;

    const categoryNames = Array.from(new Set(
        businesses.map(business => business._categoryName || "Sin categoría")
    )).sort((a, b) => a.localeCompare(b, "es"));

    categoryFilter.innerHTML = '<option value="todas">Todas las categorías</option>' +
        categoryNames.map(category => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`).join("");
}

function cardDescription(business) {
    const description = business.description || business.short_description || "";
    if (description) return description;

    if (business.address || business.city) {
        return [business.address, business.city].filter(Boolean).join(" · ");
    }

    return "Información registrada en Supabase.";
}

function statusText(business) {
    if (FILTER_TYPE === "cerca" && typeof business._distanceKm === "number") {
        return `${business._distanceKm.toFixed(1)} km`;
    }

    return STATUS_LABEL;
}

function renderResults() {
    const query = normalizeText(searchInput ? searchInput.value : "");
    const selectedCategory = categoryFilter ? categoryFilter.value : "todas";

    const filtered = allResults.filter(business => {
        const matchesSearch = !query || business._searchable.includes(query);
        const matchesCategory = selectedCategory === "todas" || business._categoryName === selectedCategory;
        return matchesSearch && matchesCategory;
    });

    if (totalCounter) totalCounter.textContent = filtered.length;

    if (!filtered.length) {
        if (resultsContainer) resultsContainer.innerHTML = "";
        if (emptyState) {
            emptyState.textContent = "No hay locales abiertos registrados en este momento.";
            emptyState.style.display = "block";
        }
        return;
    }

    if (emptyState) emptyState.style.display = "none";

    const grouped = filtered.reduce((accumulator, business) => {
        const category = business._categoryName || "Sin categoría";
        if (!accumulator[category]) accumulator[category] = [];
        accumulator[category].push(business);
        return accumulator;
    }, {});

    resultsContainer.innerHTML = Object.keys(grouped).sort((a, b) => a.localeCompare(b, "es")).map(categoryName => {
        const items = grouped[categoryName].map(business => {
            const ratingText = business._rating ? `★ ${business._rating.toFixed(1)}` : "";
            return `
                <article class="business-card">
                    <div class="business-top">
                        <h3 class="business-title">${escapeHtml(business.name || "Negocio")}</h3>
                        <span class="business-status">${escapeHtml(statusText(business))}</span>
                    </div>
                    <div class="business-segment">${escapeHtml(business._segmentName || "Negocio")}</div>
                    <p class="business-description">${escapeHtml(cardDescription(business))}</p>
                    <div class="business-footer">
                        <span class="rating">${escapeHtml(ratingText)}</span>
                        <a class="profile-link" href="${escapeHtml(businessUrl(business))}">Ver perfil</a>
                    </div>
                </article>
            `;
        }).join("");

        return `
            <section class="category-section">
                <div class="category-header">
                    <h2>${escapeHtml(categoryName)}</h2>
                    <span>${grouped[categoryName].length} resultados</span>
                </div>
                <div class="business-grid">${items}</div>
            </section>
        `;
    }).join("");
}

function groupRowsByBusiness(rows) {
    const map = new Map();

    (rows || []).forEach(row => {
        if (!map.has(row.business_id)) {
            map.set(row.business_id, []);
        }

        map.get(row.business_id).push(row);
    });

    return map;
}

async function getUserPositionIfNeeded() {
    if (FILTER_TYPE !== "cerca") return null;
    if (!("geolocation" in navigator)) return null;

    return new Promise(resolve => {
        navigator.geolocation.getCurrentPosition(
            position => resolve({
                lat: position.coords.latitude,
                lng: position.coords.longitude
            }),
            () => resolve(null),
            {
                enableHighAccuracy: false,
                timeout: 3500,
                maximumAge: 600000
            }
        );
    });
}

async function loadDetailsForBusinesses(businesses) {
    const ids = businesses
        .map(business => business.id)
        .filter(id => id !== null && id !== undefined);

    if (!ids.length) return businesses;

    const [hoursResult, reviewsResult, promotionsResult] = await Promise.allSettled([
        supabase
            .from("business_hours")
            .select("business_id,day_of_week,open_time,close_time,is_closed")
            .in("business_id", ids),

        supabase
            .from("reviews")
            .select("business_id,is_approved,rating")
            .eq("is_approved", true)
            .in("business_id", ids),

        supabase
            .from("promotions")
            .select("*")
            .in("business_id", ids)
    ]);

    const hoursByBusiness = hoursResult.status === "fulfilled" && !hoursResult.value.error
        ? groupRowsByBusiness(hoursResult.value.data || [])
        : new Map();

    const reviewsByBusiness = reviewsResult.status === "fulfilled" && !reviewsResult.value.error
        ? groupRowsByBusiness(reviewsResult.value.data || [])
        : new Map();

    const promotionsByBusiness = promotionsResult.status === "fulfilled" && !promotionsResult.value.error
        ? groupRowsByBusiness(promotionsResult.value.data || [])
        : new Map();

    return businesses.map(business => ({
        ...business,
        business_hours: hoursByBusiness.get(business.id) || [],
        reviews: reviewsByBusiness.get(business.id) || [],
        promotions: promotionsByBusiness.get(business.id) || []
    }));
}

async function init() {
    try {
        const [position, categoriesResult, businessesResult] = await Promise.all([
            getUserPositionIfNeeded(),
            supabase
                .from("categories")
                .select("id,name,icon,parent_id,sort_order")
                .order("sort_order", { ascending: true })
                .order("name", { ascending: true }),

            supabase
                .from("businesses")
                .select(BUSINESS_SELECT)
                .eq("is_active", true)
                .order("name", { ascending: true })
        ]);

        userPosition = position;

        if (categoriesResult.error) throw categoriesResult.error;
        if (businessesResult.error) throw businessesResult.error;

        categories = categoriesResult.data || [];
        categoryById = new Map(categories.map(category => [toNum(category.id), category]));

        const rawBusinesses = await loadDetailsForBusinesses(businessesResult.data || []);
        allResults = sortBusinesses(rawBusinesses.map(enrichBusiness).filter(businessMatchesFilter));

        populateCategoryFilter(allResults);

        if (loadingState) loadingState.style.display = "none";

        renderResults();
    } catch (error) {
        console.warn("No se pudo cargar información desde Supabase:", error);

        allResults = [];

        if (loadingState) loadingState.style.display = "none";
        if (totalCounter) totalCounter.textContent = "0";
        if (resultsContainer) resultsContainer.innerHTML = "";

        if (emptyState) {
            emptyState.textContent = "No se pudo cargar la información desde Supabase.";
            emptyState.style.display = "block";
        }
    }
}

if (searchInput) searchInput.addEventListener("input", renderResults);
if (categoryFilter) categoryFilter.addEventListener("change", renderResults);

init();
</script>
