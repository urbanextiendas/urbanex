<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Urbanex</title>
    <link rel="icon" type="image/png" href="/imagenes/log.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #020202;
            --bg-panel: rgba(6, 6, 6, 0.65);
            --bg-cards-glass: rgba(20, 20, 20, 0.5);
            --gold: #e5c158;
            --gold-dim: #a68b44;
            --border-color: rgba(229, 193, 88, 0.15);
            --text-main: #ffffff;
            --text-muted: #cfcfcf;
            --text-dark: #999999;
            --font-serif: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --blur-effect: blur(20px);
            --green: #2ed573;
            --red: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(229, 193, 88, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        body {
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-main);
            font-family: var(--font-sans);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        a { color: inherit; text-decoration: none; }

        /* ---------------- HEADER ---------------- */
        .header-top {
            background: rgba(6, 6, 6, 0.7);
            backdrop-filter: var(--blur-effect);
            -webkit-backdrop-filter: var(--blur-effect);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 50;
            gap: 16px;
            flex-wrap: wrap;
        }

        .brand-box img { height: 50px; width: auto; display: block; }

        .breadcrumb {
            font-size: 11px;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .breadcrumb a:hover { color: var(--gold); }
        .breadcrumb .sep { opacity: 0.4; }
        .breadcrumb .current { color: var(--gold); }

        .header-search {
            flex: 1;
            max-width: 320px;
            position: relative;
        }
        .header-search input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 8px 16px;
            color: #fff;
            font-size: 12px;
            outline: none;
            font-family: var(--font-sans);
        }
        .header-search input:focus { border-color: var(--gold); }

        /* ---------------- HERO ---------------- */
        .filter-hero {
            position: relative;
            padding: 36px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, rgba(229,193,88,0.06), transparent);
        }

        .filter-icon-circle {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: rgba(229,193,88,0.12);
            border: 1px solid var(--gold);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
        }
        .filter-icon-circle svg { width: 26px; height: 26px; fill: var(--gold); }

        .filter-hero h1 {
            font-family: var(--font-serif);
            font-size: 26px;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
        }

        .filter-hero p {
            font-size: 12.5px;
            color: var(--text-dark);
            margin-top: 6px;
        }

        .location-permission-banner {
            display: none;
            max-width: 1180px;
            margin: 16px auto 0;
            padding: 12px 18px;
            background: rgba(229,193,88,0.08);
            border: 1px solid var(--gold-dim);
            border-radius: 10px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }
        .location-permission-banner button {
            margin-left: 10px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 6px 14px;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
        }

        /* ---------------- TOOLBAR ---------------- */
        .toolbar {
            max-width: 1180px;
            margin: 0 auto;
            width: 100%;
            padding: 18px 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
        }

        .results-count { font-size: 12.5px; color: var(--text-muted); }
        .results-count strong { color: var(--gold); }

        .toolbar-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .sort-select, .filter-toggle {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            font-size: 11.5px;
            outline: none;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: var(--transition-smooth);
        }
        .sort-select:focus, .filter-toggle:hover { border-color: var(--gold); }
        .filter-toggle.active { background: rgba(229,193,88,0.15); border-color: var(--gold); color: var(--gold); }

        /* ---------------- GRID ---------------- */
        .business-grid {
            max-width: 1180px;
            margin: 0 auto;
            width: 100%;
            padding: 18px 20px 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
        }

        .business-card {
            background: var(--bg-cards-glass);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .business-card:hover {
            border-color: rgba(229,193,88,0.4);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .card-thumb-wrapper { width: 100%; height: 150px; position: relative; flex-shrink: 0; }
        .card-thumb { width: 100%; height: 100%; object-fit: cover; }
        .card-thumb-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 36px; background: rgba(229,193,88,0.08); }

        .card-status {
            position: absolute; top: 10px; right: 10px;
            font-size: 10px; font-weight: 700;
            padding: 3px 9px; border-radius: 12px;
            backdrop-filter: blur(6px);
        }
        .card-status.open { background: rgba(46,213,115,0.2); color: var(--green); border: 1px solid var(--green); }
        .card-status.closed { background: rgba(255,71,87,0.2); color: var(--red); border: 1px solid var(--red); }

        .card-badge-promo {
            position: absolute; top: 10px; left: 10px;
            font-size: 10px; font-weight: 700;
            padding: 3px 9px; border-radius: 12px;
            background: rgba(229,193,88,0.9); color: #000;
        }

        .card-distance {
            position: absolute; bottom: 10px; left: 10px;
            font-size: 10px; font-weight: 700;
            padding: 3px 9px; border-radius: 12px;
            background: rgba(0,0,0,0.7); color: var(--gold);
            backdrop-filter: blur(6px);
        }

        .card-body { padding: 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; }

        .card-category-tag { font-size: 10px; color: var(--gold); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-title { font-size: 14px; font-weight: 700; color: #fff; }
        .card-desc { font-size: 11.5px; color: var(--text-dark); line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 6px; }
        .card-rating { display: flex; align-items: center; gap: 4px; font-size: 11.5px; }
        .card-rating svg { width: 12px; height: 12px; fill: var(--gold); }
        .card-rating .num { color: #fff; font-weight: 700; }
        .card-rating .count { color: var(--text-dark); }
        .card-address { font-size: 10.5px; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }

        .promo-title-line { font-size: 11px; color: var(--gold); font-weight: 600; margin-top: 2px; }

        /* ---------------- ESTADOS ---------------- */
        .skeleton-card {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            height: 250px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dark);
        }
        .empty-state h3 { font-family: var(--font-serif); color: var(--gold); font-size: 18px; margin-bottom: 8px; }
        .empty-state p { font-size: 13px; }
        .btn-back-boulevard {
            margin-top: 16px; padding: 10px 22px;
            background: var(--gold); color: #000; border: none;
            border-radius: 6px; font-weight: 600; font-size: 12px; cursor: pointer;
        }

        /* ---------------- PIE ---------------- */
        .pie-pagina {
            width: 100%; height: 24px;
            background-color: #000; color: #8c8c8c;
            font-size: 11px;
            display: flex; justify-content: center; align-items: center;
            border-top: 1px solid #1a1a1a;
            font-family: Arial, Helvetica, sans-serif;
        }

        @media (max-width: 600px) {
            .filter-hero h1 { font-size: 20px; }
            .header-search { display: none; }
        }
    </style>
</head>

<body>

<header class="header-top">
    <a href="../index.html" class="brand-box" title="Volver al Inicio">
        <img src="../imagenes/logo.png" alt="Urbanex">
    </a>

    <div class="header-search">
        <input type="text" id="quickFilter" placeholder="Filtrar resultados..." autocomplete="off">
    </div>

    <div class="breadcrumb">
        <a href="../boulevard.html">Boulevard</a>
        <span class="sep">/</span>
        <span class="current" id="breadcrumbName">Filtro</span>
    </div>
</header>

<section class="filter-hero">
    <div class="filter-icon-circle">
        <svg viewBox="0 0 24 24" id="filterIconSvg"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2z"/></svg>
    </div>
    <h1 id="filterTitle">Cargando...</h1>
    <p id="filterSubtitle"></p>
</section>

<div class="location-permission-banner" id="locationBanner">
    Necesitamos tu ubicación para mostrarte negocios cercanos.
    <button id="btnRequestLocation">Activar ubicación</button>
</div>

<div class="toolbar">
    <div class="results-count" id="resultsCount">Cargando negocios...</div>
    <div class="toolbar-controls">
        <select class="sort-select" id="sortSelect">
            <option value="rating">Mejor calificados</option>
            <option value="name">Nombre A-Z</option>
            <option value="distance">Más cercanos</option>
        </select>
    </div>
</div>

<div class="business-grid" id="businessGrid">
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
</div>

<footer class="pie-pagina">
    <p>&copy; 2026 Urbanex. Desarrollado por Neodat Consultores.</p>
</footer>


<!-- ============================================================
     SUPABASE
     Reemplaza SUPABASE_URL y SUPABASE_ANON_KEY con tus datos

     USO: informativos/index.html?filtro=abiertos
          informativos/index.html?filtro=cerca
          informativos/index.html?filtro=ofertas
     ============================================================ -->
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://mlkynawsjqmawgxeuvks.supabase.co';   // ← cambia esto
const SUPABASE_ANON_KEY = 'sb_publishable_UyYcTuSIaLDbaD73wvwOfA_TbyFlRNv';                  // ← cambia esto

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const FILTERS = {
    abiertos: {
        title: 'Abiertos Ahora',
        subtitle: 'Negocios que están atendiendo en este momento',
        icon: 'M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z',
        needsLocation: false,
        needsPromo: false,
    },
    cerca: {
        title: 'Cerca de Mí',
        subtitle: 'Negocios ordenados según tu ubicación actual',
        icon: 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
        needsLocation: true,
        needsPromo: false,
    },
    ofertas: {
        title: 'Ofertas y Promociones',
        subtitle: 'Negocios con promociones activas en este momento',
        icon: 'M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 1.9-2 3v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z',
        needsLocation: false,
        needsPromo: true,
    },
};

function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getFilterFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const f = params.get('filtro');
    return FILTERS[f] ? f : 'abiertos';
}

function isOpenNow(hours) {
    if (!hours || !hours.length) return false;
    const now = new Date();
    const todayHours = hours.find(h => h.day_of_week === now.getDay() && !h.is_closed);
    if (!todayHours) return false;
    const currentMinutes = now.getHours() * 60 + now.getMinutes();
    const [oh, om] = (todayHours.open_time || '').split(':').map(Number);
    const [ch, cm] = (todayHours.close_time || '').split(':').map(Number);
    if (isNaN(oh) || isNaN(ch)) return false;
    const openM = oh * 60 + om, closeM = ch * 60 + cm;
    return currentMinutes >= openM && currentMinutes <= closeM;
}

function haversineDistanceKm(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

const activeFilterKey = getFilterFromUrl();
const filterConfig = FILTERS[activeFilterKey];
let allBusinesses = [];
let userLocation = null;

function setupHeroAndBreadcrumb() {
    document.title = `${filterConfig.title} - Urbanex`;
    document.getElementById('pageTitle').textContent = `${filterConfig.title} - Urbanex`;
    document.getElementById('breadcrumbName').textContent = filterConfig.title;
    document.getElementById('filterTitle').textContent = filterConfig.title;
    document.getElementById('filterSubtitle').textContent = filterConfig.subtitle;
    document.getElementById('filterIconSvg').innerHTML = `<path d="${filterConfig.icon}"/>`;

    // Ajustar opciones del select según el filtro
    const sortSelect = document.getElementById('sortSelect');
    if (!filterConfig.needsLocation) {
        sortSelect.querySelector('option[value="distance"]').remove();
    } else {
        sortSelect.value = 'distance';
    }
}

function renderGrid() {
    const grid = document.getElementById('businessGrid');
    const query = document.getElementById('quickFilter').value.trim().toLowerCase();
    const sort = document.getElementById('sortSelect').value;

    let list = [...allBusinesses];

    if (query) list = list.filter(b => b.name.toLowerCase().includes(query) || (b.description || '').toLowerCase().includes(query));

    if (sort === 'rating') list.sort((a, b) => b._avgRating - a._avgRating);
    else if (sort === 'name') list.sort((a, b) => a.name.localeCompare(b.name));
    else if (sort === 'distance') list.sort((a, b) => (a._distance ?? Infinity) - (b._distance ?? Infinity));

    document.getElementById('resultsCount').innerHTML = `<strong>${list.length}</strong> negocio${list.length !== 1 ? 's' : ''} encontrado${list.length !== 1 ? 's' : ''}`;

    if (!list.length) {
        grid.innerHTML = `
            <div class="empty-state">
                <h3>Sin resultados</h3>
                <p>No hay negocios disponibles para este filtro en este momento.</p>
                <button class="btn-back-boulevard" onclick="window.location.href='../boulevard.html'">Volver al Boulevard</button>
            </div>`;
        return;
    }

    grid.innerHTML = list.map(b => {
        const thumbHtml = b.cover_image
            ? `<img src="${esc(b.cover_image)}" alt="${esc(b.name)}" class="card-thumb" loading="lazy">`
            : `<div class="card-thumb-placeholder">🏪</div>`;

        const ratingDisplay = b._avgRating ? b._avgRating.toFixed(1) : '—';
        const distanceHtml = (b._distance !== undefined && b._distance !== null)
            ? `<span class="card-distance">${b._distance < 1 ? Math.round(b._distance * 1000) + ' m' : b._distance.toFixed(1) + ' km'}</span>`
            : '';
        const promoHtml = filterConfig.needsPromo && b._promoTitle ? `<span class="card-badge-promo">OFERTA</span>` : '';

        return `
        <a class="business-card" href="../business/index.html?slug=${esc(b.slug)}">
            <div class="card-thumb-wrapper">
                ${thumbHtml}
                ${promoHtml}
                <span class="card-status ${b._open ? 'open' : 'closed'}">${b._open ? 'Abierto' : 'Cerrado'}</span>
                ${distanceHtml}
            </div>
            <div class="card-body">
                <div class="card-category-tag">${esc(b.categories?.name || '')}</div>
                <div class="card-title">${esc(b.name)}</div>
                ${filterConfig.needsPromo && b._promoTitle ? `<div class="promo-title-line">🏷️ ${esc(b._promoTitle)}</div>` : `<div class="card-desc">${esc(b.description || 'Sin descripción disponible.')}</div>`}
                <div class="card-footer">
                    <div class="card-rating">
                        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                        <span class="num">${ratingDisplay}</span>
                        <span class="count">(${b._reviewCount})</span>
                    </div>
                    <span class="card-address">${esc(b.city || '')}</span>
                </div>
            </div>
        </a>`;
    }).join('');
}

async function fetchBaseBusinesses() {
    let query = supabase
        .from('businesses')
        .select(`
            id, slug, name, description, cover_image, city, latitude, longitude,
            categories ( name ),
            business_hours ( day_of_week, open_time, close_time, is_closed ),
            reviews ( rating, is_approved )
        `)
        .eq('is_active', true);

    if (filterConfig.needsPromo) {
        // Solo negocios que tengan promociones activas
        const today = new Date().toISOString().slice(0, 10);
        const { data: activePromos } = await supabase
            .from('promotions')
            .select('business_id, title, end_date')
            .eq('is_active', true)
            .lte('start_date', today)
            .gte('end_date', today);

        const businessIdsWithPromo = [...new Set((activePromos || []).map(p => p.business_id))];
        if (!businessIdsWithPromo.length) return { data: [], promoMap: {} };

        query = query.in('id', businessIdsWithPromo);
        const { data, error } = await query;
        if (error) return { data: [], promoMap: {} };

        const promoMap = {};
        (activePromos || []).forEach(p => { if (!promoMap[p.business_id]) promoMap[p.business_id] = p.title; });

        return { data, promoMap };
    }

    const { data, error } = await query;
    if (error) return { data: [], promoMap: {} };
    return { data, promoMap: {} };
}

async function loadBusinesses() {
    const { data, promoMap } = await fetchBaseBusinesses();

    let processed = (data || []).map(b => {
        const approvedRatings = (b.reviews || []).filter(r => r.is_approved).map(r => r.rating);
        const open = isOpenNow(b.business_hours || []);

        let distance = null;
        if (userLocation && b.latitude && b.longitude) {
            distance = haversineDistanceKm(userLocation.lat, userLocation.lng, b.latitude, b.longitude);
        }

        return {
            ...b,
            _open: open,
            _avgRating: approvedRatings.length ? approvedRatings.reduce((a,v)=>a+v,0) / approvedRatings.length : 0,
            _reviewCount: approvedRatings.length,
            _distance: distance,
            _promoTitle: promoMap[b.id] || null,
        };
    });

    // Filtro específico: abiertos ahora
    if (activeFilterKey === 'abiertos') {
        processed = processed.filter(b => b._open);
    }

    // Filtro específico: cerca de mí (requiere coords y ubicación del usuario)
    if (activeFilterKey === 'cerca') {
        processed = processed.filter(b => b.latitude && b.longitude);
        if (userLocation) {
            processed = processed.filter(b => b._distance !== null && b._distance <= 10); // radio de 10km
        }
    }

    allBusinesses = processed;
    renderGrid();
}

function requestUserLocation() {
    if (!navigator.geolocation) {
        document.getElementById('locationBanner').style.display = 'none';
        loadBusinesses();
        return;
    }

    navigator.geolocation.getCurrentPosition(
        pos => {
            userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('locationBanner').style.display = 'none';
            loadBusinesses();
        },
        () => {
            document.getElementById('locationBanner').style.display = 'block';
            document.getElementById('resultsCount').textContent = 'Activa tu ubicación para ver negocios cercanos';
            document.getElementById('businessGrid').innerHTML = '';
        }
    );
}

document.getElementById('btnRequestLocation').addEventListener('click', requestUserLocation);

// ─── INIT ────────────────────────────────────────────────────────
setupHeroAndBreadcrumb();
document.getElementById('quickFilter').addEventListener('input', renderGrid);
document.getElementById('sortSelect').addEventListener('change', renderGrid);

if (filterConfig.needsLocation) {
    document.getElementById('locationBanner').style.display = 'block';
    requestUserLocation();
} else {
    loadBusinesses();
}
</script>
