<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020202">
  <meta name="description" content="Directorio Urbanex de Alojamiento en Loja, Ecuador.">
  <title>Urbanex - Alojamiento</title>
  <link rel="icon" type="image/png" href="../imagenes/log.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #020202;
      --panel: rgba(12, 12, 12, 0.82);
      --panel-2: rgba(22, 22, 22, 0.72);
      --gold: #e5c158;
      --gold-2: #a68b44;
      --white: #ffffff;
      --muted: #a9a9a9;
      --line: rgba(229, 193, 88, 0.18);
      --green: #2ed573;
      --red: #ff5b68;
      --shadow: 0 20px 55px rgba(0, 0, 0, 0.38);
      --sans: "Montserrat", sans-serif;
      --serif: "Cinzel", serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--white);
      background:
        radial-gradient(circle at 82% 8%, rgba(229, 193, 88, 0.12), transparent 28%),
        radial-gradient(circle at 10% 75%, rgba(229, 193, 88, 0.07), transparent 32%),
        var(--bg);
      font-family: var(--sans);
    }

    button, input, select { font: inherit; }
    button { color: inherit; }
    a { color: inherit; }

    .shell {
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: 0 24px 34px;
    }

    .topbar {
      min-height: 88px;
      display: grid;
      grid-template-columns: 190px minmax(240px, 1fr) auto;
      gap: 22px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(2, 2, 2, 0.9);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      min-width: 0;
    }
    .brand img {
      display: block;
      width: auto;
      max-width: 160px;
      height: 58px;
      object-fit: contain;
    }

    .search-box { position: relative; }
    .search-box input {
      width: 100%;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      color: #fff;
      padding: 0 48px 0 18px;
      outline: none;
      transition: border-color .2s ease, background .2s ease;
    }
    .search-box input:focus {
      border-color: rgba(229, 193, 88, .62);
      background: rgba(255, 255, 255, 0.075);
    }
    .search-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      fill: var(--gold);
      pointer-events: none;
    }

    .location {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #ddd;
      font-size: 12px;
      white-space: nowrap;
    }
    .location svg { width: 18px; fill: var(--gold); }

    .hero {
      margin: 26px 0 22px;
      min-height: 240px;
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 34px;
      background:
        linear-gradient(90deg, rgba(0,0,0,.93) 0%, rgba(0,0,0,.66) 52%, rgba(0,0,0,.28) 100%),
        url("../imagenes/Boulevard.png") center/cover no-repeat;
      box-shadow: var(--shadow);
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(to top, rgba(0,0,0,.35), transparent 58%);
    }
    .hero-content { position: relative; z-index: 1; max-width: 780px; }
    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2.2px;
      text-transform: uppercase;
    }
    .hero-icon { font-size: 25px; }
    .hero h1 {
      margin: 10px 0 8px;
      font-family: var(--serif);
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1.05;
      letter-spacing: 2px;
    }
    .hero p {
      margin: 0;
      color: #e5e5e5;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.4px;
      line-height: 1.7;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .sidebar, .content-panel {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 18px;
      position: sticky;
      top: 112px;
    }
    .sidebar h2, .content-title {
      margin: 0;
      font-family: var(--serif);
      color: var(--gold);
      font-size: 16px;
      letter-spacing: 1px;
    }
    .sidebar-caption {
      margin: 6px 0 15px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.5;
    }

    .subcategory-list {
      display: grid;
      gap: 7px;
    }
    .sub-btn {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      padding: 10px 11px;
      display: grid;
      grid-template-columns: 27px 1fr auto;
      gap: 9px;
      align-items: center;
      text-align: left;
      cursor: pointer;
      transition: .2s ease;
    }
    .sub-btn:hover,
    .sub-btn.active {
      border-color: rgba(229, 193, 88, .36);
      background: rgba(229, 193, 88, .09);
    }
    .sub-btn.active { color: var(--gold); }
    .sub-icon { font-size: 16px; text-align: center; }
    .sub-name { font-size: 11px; font-weight: 600; }
    .sub-count {
      min-width: 23px;
      height: 23px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.07);
      color: #ccc;
      font-size: 9px;
      font-weight: 700;
    }

    .content-panel { padding: 20px; min-height: 500px; }
    .content-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .result-count { margin-top: 5px; color: var(--muted); font-size: 10px; }
    .sort-select {
      min-width: 185px;
      height: 38px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      color: #ddd;
      background: #111;
      padding: 0 12px;
      outline: none;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }
    .filter-btn {
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      padding: 8px 12px;
      color: #cfcfcf;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }
    .filter-btn:hover,
    .filter-btn.active {
      color: #111;
      border-color: var(--gold);
      background: var(--gold);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .business-card {
      min-width: 0;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 15px;
      background: var(--panel-2);
      text-decoration: none;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }
    .business-card:hover {
      transform: translateY(-3px);
      border-color: rgba(229, 193, 88, .5);
      box-shadow: 0 15px 35px rgba(0,0,0,.3);
    }
    .card-media {
      height: 148px;
      background: linear-gradient(135deg, #101010, #1d1d1d);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      overflow: hidden;
      position: relative;
    }
    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .featured-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 5px 8px;
      border-radius: 999px;
      color: #111;
      background: var(--gold);
      font-size: 8px;
      font-weight: 800;
      letter-spacing: .5px;
    }
    .card-body { padding: 13px; }
    .card-category {
      color: var(--gold);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .35px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-title {
      margin: 7px 0 5px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
    }
    .card-address {
      min-height: 28px;
      color: #919191;
      font-size: 9.5px;
      line-height: 1.45;
    }
    .card-foot {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .rating { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #ddd; }
    .rating strong { color: #fff; }
    .star { color: var(--gold); }
    .status {
      padding: 4px 7px;
      border-radius: 999px;
      border: 1px solid;
      font-size: 8px;
      font-weight: 800;
    }
    .status.open { color: var(--green); border-color: rgba(46,213,115,.34); background: rgba(46,213,115,.08); }
    .status.closed { color: var(--red); border-color: rgba(255,91,104,.28); background: rgba(255,91,104,.07); }

    .empty, .error-box {
      grid-column: 1 / -1;
      min-height: 260px;
      border: 1px dashed rgba(229,193,88,.26);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #aaa;
    }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty strong { color: #fff; font-size: 13px; }
    .empty span, .error-box span { margin-top: 6px; font-size: 10px; line-height: 1.55; }
    .error-box { color: #ff9da5; }

    .skeleton {
      height: 250px;
      border-radius: 15px;
      background: linear-gradient(90deg, rgba(255,255,255,.04), rgba(255,255,255,.09), rgba(255,255,255,.04));
      background-size: 220% 100%;
      animation: loading 1.2s infinite linear;
    }
    @keyframes loading { to { background-position: -220% 0; } }

    .footer {
      margin-top: 24px;
      padding: 22px 0 4px;
      color: #6f6f6f;
      text-align: center;
      font-size: 10px;
      border-top: 1px solid rgba(255,255,255,.06);
    }

    @media (max-width: 900px) {
      .shell { padding: 0 14px 26px; }
      .topbar {
        grid-template-columns: 135px 1fr;
        min-height: 76px;
        gap: 12px;
      }
      .brand img { height: 45px; max-width: 125px; }
      .location { display: none; }
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .subcategory-list {
        display: flex;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      .sub-btn {
        width: auto;
        min-width: max-content;
        grid-template-columns: 22px auto auto;
      }
      .hero { min-height: 205px; padding: 25px; }
    }

    @media (max-width: 560px) {
      .topbar { grid-template-columns: 105px 1fr; }
      .brand img { max-width: 100px; height: 40px; }
      .search-box input { height: 42px; font-size: 11px; }
      .hero { margin-top: 16px; padding: 22px 18px; border-radius: 18px; }
      .hero h1 { font-size: 29px; }
      .hero p { font-size: 9px; }
      .content-panel { padding: 15px; }
      .content-head { align-items: flex-start; flex-direction: column; }
      .sort-select { width: 100%; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="../boulevard.html" aria-label="Volver al Boulevard de Urbanex">
        <img src="../imagenes/logo.png" alt="Urbanex">
      </a>

      <div class="search-box">
        <input id="searchInput" type="search" placeholder="Buscar en Alojamiento..." autocomplete="off">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 119.5 5a4.5 4.5 0 010 9z"/>
        </svg>
      </div>

      <div class="location">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1112 6a2.5 2.5 0 010 5.5z"/></svg>
        <span>Loja, Ecuador</span>
      </div>
    </header>

    <section class="hero">
      <div class="hero-content">
        <div class="hero-kicker"><span class="hero-icon">🏨</span> DIRECTORIO URBANEX</div>
        <h1>ALOJAMIENTO</h1>
        <p>HOTELES, HOSTALES Y CABAÑAS DE LOJA EN UN SOLO LUGAR</p>
      </div>
    </section>

    <main class="layout">
      <aside class="sidebar">
        <h2>Subcategorías</h2>
        <p class="sidebar-caption">Seleccione una opción para filtrar automáticamente los negocios.</p>
        <div id="subcategoryList" class="subcategory-list">
          <div class="skeleton" style="height:44px"></div>
          <div class="skeleton" style="height:44px"></div>
          <div class="skeleton" style="height:44px"></div>
        </div>
      </aside>

      <section class="content-panel">
        <div class="content-head">
          <div>
            <h2 id="contentTitle" class="content-title">Negocios de Alojamiento</h2>
            <div id="resultCount" class="result-count">Cargando negocios...</div>
          </div>
          <select id="sortSelect" class="sort-select" aria-label="Ordenar negocios">
            <option value="featured">Destacados primero</option>
            <option value="rating">Mayor calificación</option>
            <option value="name">Nombre A–Z</option>
          </select>
        </div>

        <div class="filters" aria-label="Filtros rápidos">
          <button class="filter-btn active" data-filter="all" type="button">Todos</button>
          <button class="filter-btn" data-filter="open" type="button">Abiertos ahora</button>
          <button class="filter-btn" data-filter="delivery" type="button">A domicilio</button>
          <button class="filter-btn" data-filter="promo" type="button">Con ofertas</button>
        </div>

        <div id="businessGrid" class="grid">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </section>
    </main>

    <footer class="footer">© 2026 Urbanex. Desarrollado por Neodat Consultores.</footer>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const ROOT_CATEGORY_ID = 6;
    const ROOT_CATEGORY_NAME = "Alojamiento";
    const ROOT_CATEGORY_ICON = "🏨";

    const SUPABASE_URL = "https://mlkynawsjqmawgxeuvks.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_UyYcTuSIaLDbaD73wvwOfA_TbyFlRNv";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const state = {
      subcategories: [],
      businesses: [],
      activeSubcategoryId: null,
      quickFilter: "all",
      search: "",
      sort: "featured"
    };

    const subcategoryList = document.getElementById("subcategoryList");
    const businessGrid = document.getElementById("businessGrid");
    const resultCount = document.getElementById("resultCount");
    const contentTitle = document.getElementById("contentTitle");
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    const numberOrNull = (value) => {
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    };

    function approvedReviews(reviews) {
      return (reviews || []).filter((review) => review.is_approved === true);
    }

    function averageRating(reviews) {
      const approved = approvedReviews(reviews);
      if (!approved.length) return null;
      return approved.reduce((sum, review) => sum + Number(review.rating || 0), 0) / approved.length;
    }

    function hasActivePromotion(promotions) {
      const today = new Date().toISOString().slice(0, 10);
      return (promotions || []).some((promotion) =>
        promotion.is_active === true && (!promotion.end_date || promotion.end_date >= today)
      );
    }

    function isOpenNow(hours) {
      if (!Array.isArray(hours) || !hours.length) return false;

      const now = new Date();
      const today = now.getDay();
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      const todayHours = hours.find((item) => Number(item.day_of_week) === today && item.is_closed !== true);
      if (!todayHours?.open_time || !todayHours?.close_time) return false;

      const [openHour, openMinute] = todayHours.open_time.split(":").map(Number);
      const [closeHour, closeMinute] = todayHours.close_time.split(":").map(Number);
      if (![openHour, openMinute, closeHour, closeMinute].every(Number.isFinite)) return false;

      const open = openHour * 60 + openMinute;
      const close = closeHour * 60 + closeMinute;

      if (close < open) {
        return currentMinutes >= open || currentMinutes <= close;
      }
      return currentMinutes >= open && currentMinutes <= close;
    }

    function normalizeBusiness(business) {
      const reviews = approvedReviews(business.reviews);
      return {
        ...business,
        category_id: numberOrNull(business.category_id),
        subcategory_id: numberOrNull(business.subcategory_id),
        _rating: averageRating(reviews),
        _reviewCount: reviews.length,
        _open: isOpenNow(business.business_hours),
        _promo: hasActivePromotion(business.promotions)
      };
    }

    async function loadData() {
      showLoading();

      const { data: subcategories, error: categoryError } = await supabase
        .from("categories")
        .select("id,name,icon,parent_id,sort_order,is_active")
        .eq("parent_id", ROOT_CATEGORY_ID)
        .eq("is_active", true)
        .order("sort_order", { ascending: true })
        .order("name", { ascending: true });

      if (categoryError) {
        showError(`No se pudieron cargar las subcategorías: ${categoryError.message}`);
        return;
      }

      state.subcategories = (subcategories || []).map((item) => ({
        ...item,
        id: numberOrNull(item.id),
        parent_id: numberOrNull(item.parent_id)
      }));

      const subcategoryIds = state.subcategories.map((item) => item.id).filter(Number.isFinite);
      const categoryFilter = subcategoryIds.length
        ? `category_id.eq.${ROOT_CATEGORY_ID},subcategory_id.in.(${subcategoryIds.join(",")})`
        : `category_id.eq.${ROOT_CATEGORY_ID}`;

      const { data: businesses, error: businessError } = await supabase
        .from("businesses")
        .select(`
          id,
          name,
          slug,
          city,
          address,
          cover_image,
          is_featured,
          delivery_available,
          category_id,
          subcategory_id,
          categories!category_id(name,icon),
          subcategories:categories!subcategory_id(name,icon),
          business_hours(day_of_week,open_time,close_time,is_closed),
          reviews(is_approved,rating),
          promotions(is_active,end_date)
        `)
        .eq("is_active", true)
        .or(categoryFilter);

      if (businessError) {
        showError(`No se pudieron cargar los negocios: ${businessError.message}`);
        return;
      }

      state.businesses = (businesses || []).map(normalizeBusiness);
      renderAll();
    }

    function showLoading() {
      subcategoryList.innerHTML = `
        <div class="skeleton" style="height:44px"></div>
        <div class="skeleton" style="height:44px"></div>
        <div class="skeleton" style="height:44px"></div>`;
      businessGrid.innerHTML = `
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>`;
      resultCount.textContent = "Cargando negocios...";
    }

    function showError(message) {
      subcategoryList.innerHTML = "";
      businessGrid.innerHTML = `<div class="error-box"><strong>Error de carga</strong><span>${escapeHtml(message)}</span></div>`;
      resultCount.textContent = "No se pudieron cargar los datos";
      console.error(message);
    }

    function renderAll() {
      renderSubcategories();
      renderBusinesses();
    }

    function countBySubcategory(subcategoryId) {
      return state.businesses.filter((business) => business.subcategory_id === subcategoryId).length;
    }

    function renderSubcategories() {
      const allActive = state.activeSubcategoryId === null ? "active" : "";
      const allButton = `
        <button class="sub-btn ${allActive}" type="button" data-subcategory="all">
          <span class="sub-icon">${ROOT_CATEGORY_ICON}</span>
          <span class="sub-name">Todos</span>
          <span class="sub-count">${state.businesses.length}</span>
        </button>`;

      const buttons = state.subcategories.map((subcategory) => {
        const active = state.activeSubcategoryId === subcategory.id ? "active" : "";
        return `
          <button class="sub-btn ${active}" type="button" data-subcategory="${subcategory.id}">
            <span class="sub-icon">${escapeHtml(subcategory.icon || "•")}</span>
            <span class="sub-name">${escapeHtml(subcategory.name)}</span>
            <span class="sub-count">${countBySubcategory(subcategory.id)}</span>
          </button>`;
      }).join("");

      subcategoryList.innerHTML = allButton + buttons;

      subcategoryList.querySelectorAll("[data-subcategory]").forEach((button) => {
        button.addEventListener("click", () => {
          const value = button.dataset.subcategory;
          state.activeSubcategoryId = value === "all" ? null : Number(value);
          renderAll();
        });
      });
    }

    function getFilteredBusinesses() {
      let list = [...state.businesses];

      if (state.activeSubcategoryId !== null) {
        list = list.filter((business) => business.subcategory_id === state.activeSubcategoryId);
      }

      if (state.quickFilter === "open") {
        list = list.filter((business) => business._open);
      } else if (state.quickFilter === "delivery") {
        list = list.filter((business) => business.delivery_available === true);
      } else if (state.quickFilter === "promo") {
        list = list.filter((business) => business._promo);
      }

      if (state.search) {
        const query = state.search.toLocaleLowerCase("es");
        list = list.filter((business) => {
          const text = [
            business.name,
            business.city,
            business.address,
            business.categories?.name,
            business.subcategories?.name
          ].filter(Boolean).join(" ").toLocaleLowerCase("es");
          return text.includes(query);
        });
      }

      if (state.sort === "rating") {
        list.sort((a, b) => (b._rating || 0) - (a._rating || 0));
      } else if (state.sort === "name") {
        list.sort((a, b) => String(a.name).localeCompare(String(b.name), "es"));
      } else {
        list.sort((a, b) => {
          const featuredDifference = Number(Boolean(b.is_featured)) - Number(Boolean(a.is_featured));
          if (featuredDifference !== 0) return featuredDifference;
          const ratingDifference = (b._rating || 0) - (a._rating || 0);
          if (ratingDifference !== 0) return ratingDifference;
          return String(a.name).localeCompare(String(b.name), "es");
        });
      }

      return list;
    }

    function businessCard(business) {
      const categoryName = business.subcategories?.name || business.categories?.name || ROOT_CATEGORY_NAME;
      const categoryIcon = business.subcategories?.icon || business.categories?.icon || ROOT_CATEGORY_ICON;
      const media = business.cover_image
        ? `<img src="${escapeHtml(business.cover_image)}" alt="${escapeHtml(business.name)}" loading="lazy">`
        : `<span aria-hidden="true">${escapeHtml(categoryIcon)}</span>`;
      const featured = business.is_featured
        ? `<span class="featured-badge">DESTACADO</span>`
        : "";
      const rating = business._rating !== null
        ? `<span class="star">★</span><strong>${business._rating.toFixed(1)}</strong><span>(${business._reviewCount})</span>`
        : `<span>Sin reseñas</span>`;
      const statusClass = business._open ? "open" : "closed";
      const statusText = business._open ? "Abierto" : "Cerrado";
      const businessUrl = `../business/?slug=${encodeURIComponent(business.slug || "")}`;

      return `
        <a class="business-card" href="${businessUrl}">
          <div class="card-media">${media}${featured}</div>
          <div class="card-body">
            <div class="card-category">${escapeHtml(categoryIcon)} ${escapeHtml(categoryName)}</div>
            <div class="card-title">${escapeHtml(business.name)}</div>
            <div class="card-address">${escapeHtml(business.address || business.city || "Loja, Ecuador")}</div>
            <div class="card-foot">
              <div class="rating">${rating}</div>
              <span class="status ${statusClass}">${statusText}</span>
            </div>
          </div>
        </a>`;
    }

    function renderBusinesses() {
      const list = getFilteredBusinesses();
      const activeSubcategory = state.subcategories.find((item) => item.id === state.activeSubcategoryId);
      contentTitle.textContent = activeSubcategory
        ? `${activeSubcategory.icon || ""} ${activeSubcategory.name}`
        : `Negocios de ${ROOT_CATEGORY_NAME}`;
      resultCount.textContent = `${list.length} negocio${list.length === 1 ? "" : "s"} encontrado${list.length === 1 ? "" : "s"}`;

      if (!list.length) {
        businessGrid.innerHTML = `
          <div class="empty">
            <div class="empty-icon">${activeSubcategory?.icon || ROOT_CATEGORY_ICON}</div>
            <strong>No hay negocios con estos filtros.</strong>
            <span>Cuando se registre un negocio activo en Supabase aparecerá aquí automáticamente.</span>
          </div>`;
        return;
      }

      businessGrid.innerHTML = list.map(businessCard).join("");
    }

    searchInput.addEventListener("input", (event) => {
      state.search = event.target.value.trim();
      renderBusinesses();
    });

    sortSelect.addEventListener("change", (event) => {
      state.sort = event.target.value;
      renderBusinesses();
    });

    document.querySelectorAll(".filter-btn").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        state.quickFilter = button.dataset.filter;
        renderBusinesses();
      });
    });

    let realtimeTimer = null;
    function refreshSoon() {
      clearTimeout(realtimeTimer);
      realtimeTimer = setTimeout(loadData, 350);
    }

    supabase
      .channel(`urbanex-category-${ROOT_CATEGORY_ID}`)
      .on("postgres_changes", { event: "*", schema: "public", table: "businesses" }, refreshSoon)
      .on("postgres_changes", { event: "*", schema: "public", table: "categories" }, refreshSoon)
      .on("postgres_changes", { event: "*", schema: "public", table: "business_hours" }, refreshSoon)
      .on("postgres_changes", { event: "*", schema: "public", table: "reviews" }, refreshSoon)
      .on("postgres_changes", { event: "*", schema: "public", table: "promotions" }, refreshSoon)
      .subscribe();

    loadData();
  </script>
</body>
</html>
