.header-top {

function businessMatchesSub(b, subId){ const sid = num(subId); return num(b.subcategory_id) === sid || num(b.category_id) === sid; }
function countForSub(sub){ return allBusinesses.filter(b=>businessMatchesSub(b, sub.id)).length; }
function statusText(b){ if(typeof b.is_open === 'boolean') return b.is_open ? 'Abierto' : 'Cerrado'; if(typeof b.open_now === 'boolean') return b.open_now ? 'Abierto' : 'Cerrado'; return 'Ver negocio'; }
function businessLink(b){ return '../../business/?slug=' + encodeURIComponent(b.slug || b.id || ''); }
async function boot(){
  document.documentElement.style.setProperty('--page-bg', `url("../../imagenes/${PAGE.bg}")`);
  $('pageTitle').textContent = PAGE.title;
  $('searchInput').placeholder = `Buscar en ${PAGE.name}...`; $('panelTitle').textContent = `Negocios en ${PAGE.name}`; $('backLink').href = PAGE.back; $('backLink').textContent = 'Volver a ' + PAGE.parentName;
  const [catRes, bizRes] = await Promise.all([
    supabase.from('categories').select('id,name,icon,parent_id,sort_order').order('sort_order', { ascending: true }).order('name', { ascending: true }),
    supabase.from('businesses').select('*').eq('is_active', true)
  ]);
  if(catRes.error){ console.error(catRes.error); showLoadError('No se pudieron cargar las categorías desde Supabase.'); return; }
  if(bizRes.error){ console.error(bizRes.error); showLoadError('No se pudieron cargar los negocios desde Supabase.'); return; }
  categories = catRes.data || []; allBusinesses = (bizRes.data || []).filter(b=>b.is_active !== false);
  const aliases = PAGE.aliases.map(norm);
  currentSub = categories.find(c => aliases.includes(norm(c.name)) && c.parent_id) || categories.find(c => aliases.includes(norm(c.name)));
  const parentId = currentSub ? num(currentSub.parent_id) : null;
  siblingSubs = parentId ? categories.filter(c => num(c.parent_id) === parentId) : categories.filter(c => PAGE.siblings.map(s=>norm(s.name)).includes(norm(c.name)));
  siblingSubs.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  businessesHere = currentSub ? allBusinesses.filter(b=>businessMatchesSub(b, currentSub.id)) : [];
  renderSubnav(); renderAll();
}
function showLoadError(msg){ $('businessGrid').innerHTML = `<div class="ux-empty">${esc(msg)}</div>`; $('featuredList').innerHTML = `<div class="ux-note">No hay destacados para mostrar.</div>`; }
function renderSubnav(){
  const linksByName = Object.fromEntries(PAGE.siblings.map(s=>[norm(s.name),s.file]));
  $('subNav').innerHTML = siblingSubs.map(sub=>{
    const file = linksByName[norm(sub.name)] || (norm(sub.name).replace(/[^a-z0-9]+/g,'-') + '.html');
    const active = currentSub && num(sub.id)===num(currentSub.id);
    const c = countForSub(sub);
    return `<a class="ux-subitem ${active?'active':''}" href="${esc(file)}"><span class="ux-ico">${esc(sub.icon || PAGE.siblingIcons[norm(sub.name)] || '•')}</span><span class="ux-subtxt"><strong>${esc(sub.name)}</strong><span>${c} local${c===1?'':'es'}</span></span></a>`;
  }).join('');
}
function filteredBusinesses(){
  let list = [...businessesHere];
  if(textFilter){ const t = norm(textFilter); list = list.filter(b=>norm(`${b.name||''} ${b.address||''} ${b.description||''} ${b.city||''}`).includes(t)); }
  const sort = $('sortBusiness').value;
  if(sort==='name') list.sort((a,b)=>String(a.name||'').localeCompare(String(b.name||''),'es'));
  if(sort==='featured') list.sort((a,b)=>Number(b.is_featured===true)-Number(a.is_featured===true));
  return list;
}
function renderAll(){ renderBusinesses(); renderFeatured(); }
function cardHtml(b){
  const logo = logoOf(b); const logoHtml = logo ? `<img src="${esc(logo)}" alt="${esc(b.name)}" loading="lazy">` : (PAGE.icon || '🏪');
  const featured = b.is_featured === true ? '<span class="ux-featured">Destacado</span>' : '<span></span>';
  return `<a class="ux-card" href="${esc(businessLink(b))}"><div class="ux-logo">${logoHtml}</div><div class="ux-card-body"><h3>${esc(b.name || 'Negocio')}</h3><div class="tag">${esc(PAGE.name)}</div><div class="addr">${b.address ? '📍 '+esc(b.address) : 'Dirección no registrada'}</div><div class="ux-card-bottom"><span class="ux-badge">${esc(statusText(b))}</span>${featured}</div></div></a>`;
}
function renderBusinesses(){
  const list = filteredBusinesses();
  $('businessCount').textContent = `${list.length} negocio${list.length===1?'':'s'} encontrado${list.length===1?'':'s'}`;
  if(!list.length){ $('businessGrid').innerHTML = `<div class="ux-empty">No hay empresas registradas en ${esc(PAGE.name)} por ahora.<br>Cuando se carguen en Supabase con esta subcategoría, aparecerán aquí.</div>`; return; }
  $('businessGrid').innerHTML = list.map(cardHtml).join('');
}
function renderFeatured(){
  const featured = businessesHere.filter(b=>b.is_featured === true);
  $('featuredCount').textContent = `${featured.length} destacado${featured.length===1?'':'s'} encontrado${featured.length===1?'':'s'}`;
  if(!featured.length){ $('featuredList').innerHTML = `<div class="ux-note">No hay negocios destacados en esta sección por ahora.</div>`; return; }
  $('featuredList').innerHTML = featured.map(b=>{
    const logo = logoOf(b); const logoHtml = logo ? `<img src="${esc(logo)}" alt="${esc(b.name)}" loading="lazy">` : (PAGE.icon || '🏪');
    return `<a class="ux-mini" href="${esc(businessLink(b))}"><div class="ux-mini-logo">${logoHtml}</div><div class="ux-mini-body"><strong>${esc(b.name || 'Negocio')}</strong><span>${esc(PAGE.name)} · Destacado</span><small>★ — Sin reseñas</small></div></a>`;
  }).join('');
}
$('searchInput').addEventListener('input',e=>{textFilter=e.target.value; renderBusinesses();});
$('panelSearch').addEventListener('input',e=>{textFilter=e.target.value; $('searchInput').value=e.target.value; renderBusinesses();});
$('sortBusiness').addEventListener('change',renderBusinesses);
boot();

</script>
