<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastronomía - Urbanex Loja</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #020202;
            --bg-panels-glass: rgba(6, 6, 6, 0.65);
            --gold: #e5c158;
            --text-main: #ffffff;
            --blur-effect: blur(20px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-main); font-family: 'Montserrat', sans-serif; color: var(--text-main); }

        .container { min-height: 100vh; display: grid; grid-template-rows: 80px 1fr 24px; }

        /* Header consistente */
        header { background: var(--bg-panels-glass); backdrop-filter: var(--blur-effect); border-bottom: 1px solid rgba(229, 193, 88, 0.15); display: flex; align-items: center; padding: 0 40px; }
        .logo-img { height: 45px; }

        /* Sección de Contenido */
        .main-content { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .hero-banner { width: 100%; max-width: 900px; margin-bottom: 30px; border-radius: 12px; overflow: hidden; border: 1px solid var(--gold); }
        .hero-banner img { width: 100%; height: auto; display: block; }
        
        .title-section { font-family: 'Cinzel', serif; color: var(--gold); margin-bottom: 20px; letter-spacing: 3px; }

        .grid-restaurantes { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: var(--bg-panels-glass); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        
        .pie-pagina { background: #000; color: #8c8c8c; font-size: 11px; text-align: center; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="boulevard.html"><img src="imagenes/logo.png" alt="Urbanex" class="logo-img"></a>
    </header>

    <main class="main-content">
        <div class="hero-banner">
            <img src="imagenes/Gastronomía.png" alt="Gastronomía en Loja">
        </div>
        
        <h2 class="title-section">RESTAURANTES DESTACADOS</h2>
        
        <div class="grid-restaurantes">
            <div class="card">
                <h3>Nombre del Restaurante</h3>
                <p style="color:var(--gold); font-size: 12px; margin: 10px 0;">Especialidad: Comida Típica Lojana</p>
                <p style="font-size: 12px;">Sector: Centro</p>
            </div>
            </div>
    </main>

    <footer class="pie-pagina">
        &copy; 2026 Urbanex. Todos los derechos reservados.
    </footer>
</div>

</body>
</html>
