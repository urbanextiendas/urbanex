<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastronomía - Urbanex Loja</title>

    <!-- Tipografías Premium desde Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ================================================== */
        /* VARIABLES DE DISEÑO PREMIUM (SISTEMA URBANEX)      */
        /* ================================================== */
        :root {
            --bg-main: #020202;
            --bg-panels-glass: rgba(6, 6, 6, 0.65);
            --bg-cards-glass: rgba(20, 20, 20, 0.5);
            --gold: #e5c158;
            --border-color: rgba(229, 193, 88, 0.15);
            --text-main: #ffffff;
            --text-dark: #aaaaaa;
            --blur-effect: blur(20px);
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-main); 
            font-family: 'Montserrat', sans-serif; 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Contenedor Grid Principal */
        .page-wrapper {
            display: grid;
            grid-template-rows: 60px 1fr 24px;
            grid-template-columns: 240px 1fr;
            min-height: 100vh;
        }

        /* HEADER INTEGRADO */
        .header-main {
            grid-column: 1 / span 2;
            background: var(--bg-panels-glass);
            backdrop-filter: var(--blur-effect);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 10;
        }

        /* RUTA CORREGIDA: Se usa /imagenes/ para apuntar siempre a la raíz */
        .logo-branding { height: 40px; }

        /* SIDEBAR DE CATEGORÍAS */
        .sidebar {
            background: var(--bg-panels-glass);
            backdrop-filter: var(--blur-effect);
            border-right: 1px solid var(--border-color);
            padding: 20px;
        }

        /* ÁREA CENTRAL DE CONTENIDO */
        .content-area {
            padding: 40px;
            overflow-y: auto;
        }

        .category-hero-container {
            width: 100%;
            height: 300px;
            margin-bottom: 40px;
            border-radius: 12px;
            border: 1px solid var(--gold);
            overflow: hidden;
            display: block;
        }

        /* RUTA CORREGIDA: Se asegura carga absoluta desde la raíz */
        .category-hero-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .grid-restaurantes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card-local {
            background: var(--bg-cards-glass);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        /* FOOTER */
        .footer-main {
            grid-column: 1 / span 2;
            background-color: #000;
            color: #8c8c8c;
            font-size: 11px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #1a1a1a;
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <header class="header-main">
        <a href="/index.html">
            <img src="/imagenes/logo.png" alt="Logo Urbanex" class="logo-branding">
        </a>
    </header>

    <aside class="sidebar">
        <h2 style="color: var(--gold); font-size: 10px; text-transform: uppercase; margin-bottom: 20px;">Menú</h2>
    </aside>

    <main class="content-area">
        <!-- Banner de Gastronomía con ruta absoluta -->
        <div class="category-hero-container">
            <img src="/imagenes/Gastronomía.png" alt="Categoría Gastronomía">
        </div>

        <div class="grid-restaurantes">
            <div class="card-local">
                <h3 style="font-family: 'Cinzel', serif; color: var(--gold);">Nombre del Restaurante</h3>
                <p style="font-size: 12px; margin-top: 10px;">Especialidad: Comida Típica Lojana</p>
            </div>
        </div>
    </main>

    <footer class="footer-main">
        &copy; 2026 Urbanex. Todos los derechos reservados.
    </footer>
</div>

</body>
</html>
