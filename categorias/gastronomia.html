<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastronomía - Urbanex Loja</title>

    <!-- Preconexión para fuentes optimizadas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           CONFIGURACIÓN GLOBAL Y VARIABLES DE DISEÑO (ESTILO URBANEX)
           ========================================================================== */
        :root {
            --color-bg: #000000;
            --color-gold: #e5c158;
            --color-border: #1a1a1a;
            --color-text: #ffffff;
            --color-text-dim: #8c8c8c;
            --font-primary: 'Montserrat', sans-serif;
            --font-secondary: 'Cinzel', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--color-bg); 
            color: var(--color-text); 
            font-family: var(--font-primary); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ==========================================================================
           GRID DE ESTRUCTURA: HEADER, SIDEBAR, CONTENT Y FOOTER
           ========================================================================== */
        .page-container {
            display: grid;
            grid-template-columns: 200px 1fr;
            grid-template-rows: 60px 1fr 24px;
            min-height: 100vh;
        }

        /* HEADER */
        .site-header {
            grid-column: 1 / span 2;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            padding: 0 25px;
        }
        .logo { height: 30px; }

        /* SIDEBAR (MENÚ LATERAL) */
        .site-sidebar {
            border-right: 1px solid var(--color-border);
            padding: 30px 20px;
            font-family: sans-serif;
            font-size: 11px;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            padding: 40px;
            width: 100%;
        }

        /* CONTENEDOR IMAGEN CON BORDE DORADO (REFERENCIA: {F1B6C5AA-E449-43B8-AFA1-4FFE3ED1E6E1}.jpg) */
        .hero-wrapper {
            border: 1px solid var(--color-gold);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 30px;
            background: #050505;
        }
        .hero-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        /* TARJETA DE INFORMACIÓN DEL LOCAL */
        .restaurant-card {
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 25px;
            max-width: 450px;
            background: rgba(10, 10, 10, 0.8);
        }
        .restaurant-title {
            font-family: var(--font-secondary);
            color: var(--color-gold);
            font-size: 20px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .restaurant-detail {
            font-size: 14px;
            color: var(--color-text-dim);
        }

        /* FOOTER */
        .site-footer {
            grid-column: 1 / span 2;
            height: 24px;
            background-color: #000000;
            color: var(--color-text-dim);
            font-size: 11px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid var(--color-border);
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <!-- HEADER -->
        <header class="site-header">
            <img src="imagenes/logo.png" alt="Urbanex" class="logo">
        </header>

        <!-- SIDEBAR -->
        <aside class="site-sidebar">
            <p>MENÚ</p>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content">
            
            <div class="hero-wrapper">
                <img src="imagenes/Gastronomía.png" alt="Banner Gastronomía" class="hero-img">
            </div>

            <section class="restaurant-card">
                <h2 class="restaurant-title">NOMBRE DEL RESTAURANTE</h2>
                <p class="restaurant-detail">Especialidad: Comida Típica Lojana</p>
            </section>

        </main>

        <!-- FOOTER -->
        <footer class="site-footer">
            <p>&copy; 2026 Urbanex. Todos los derechos reservados.</p>
        </footer>

    </div>

</body>
</html>
