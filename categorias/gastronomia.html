<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastronomía en Loja</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; }
        header { text-align: center; margin-bottom: 30px; }
        .filter-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { padding: 10px 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .filter-btn:hover { background: #007bff; color: #fff; border-color: #007bff; }
        .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        .card h2 { margin-top: 0; color: #333; }
        .info { margin: 10px 0; color: #666; }
        .info strong { color: #333; }
    </style>
</head>
<body>

<header>
    <h1>Gastronomía en Loja</h1>
</header>

<nav class="filter-nav">
    <button class="filter-btn">Todos</button>
    <button class="filter-btn">Restaurantes</button>
    <button class="filter-btn">Cafeterías</button>
    <button class="filter-btn">Bares y Discotecas</button>
    <button class="filter-btn">Comida Rápida</button>
    <button class="filter-btn">Comida Típica</button>
</nav>

<main>
    <div class="card">
        <h2>Nombre del Restaurante</h2>
        <p class="info"><strong>Especialidad:</strong> Comida Típica Lojana</p>
        <p class="info"><strong>Sector:</strong> Centro</p>
    </div>
</main>

</body>
</html>
