<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urbanex</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ================================================== */
/* RESETEO GLOBAL Y FUENTES BASE                      */
/* ================================================== */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100%;
    background: #000;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    flex-direction: column;
}

/* ================================================== */
/* PORTADA Y CAPAS DE ENTORNO                         */
/* ================================================== */
.portada{
    width: 100%;
    height: calc(100vh - 24px);
    height: calc(100svh - 24px); 
    position: relative;
    overflow: hidden;
    background-color: #000;
}

.portada-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill; 
    display: block;
}

/* Capa de contraste que mejora la legibilidad sin alterar el arte original */
.portada::before{
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.45) 0%,
        rgba(0,0,0,0.10) 30%,
        rgba(0,0,0,0.10) 70%,
        rgba(0,0,0,0.55) 100%
    );
    z-index: 1;
    pointer-events: none;
}

/* ================================================== */
/* COMPORTAMIENTO PARA COMPUTADORES (ESCRITORIO)     */
/* ================================================== */

/* Identidad Central Superior */
.header-branding {
    position: absolute;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    width: 40%;
    z-index: 3;
    pointer-events: none;
}

.header-branding h1 {
    font-family: 'Cinzel', 'Times New Roman', serif;
    color: #e5c158;
    font-size: 38px;
    font-weight: 600;
    letter-spacing: 7px;
    text-transform: uppercase;
    text-shadow: 0 2px 4px rgba(0,0,0,0.95), 0 4px 12px rgba(0,0,0,0.8);
    margin-bottom: 2px;
}

.header-branding p {
    font-family: 'Cinzel', 'Times New Roman', serif;
    color: #ffffff;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 2px 5px rgba(0,0,0,0.95);
}

/* Eslogan en móvil se oculta en escritorio para usar la estructura lateral */
.slogan-movil {
    display: none;
}

/* Eslogan Lateral Izquierdo (Ubicación exacta del render) */
.slogan-lateral-pc {
    position: absolute;
    top: 15%;
    left: 28%;
    width: 13%;
    text-align: center;
    z-index: 3;
    pointer-events: none;
}

.slogan-lateral-pc h2 {
    font-family: 'Cinzel', 'Times New Roman', serif;
    color: #ffffff;
    font-size: 19px;
    font-weight: 400;
    letter-spacing: 1px;
    line-height: 1.6;
    text-transform: uppercase;
    text-shadow: 0 3px 6px rgba(0,0,0,0.95);
}

.slogan-lateral-pc h2 span {
    color: #e5c158;
    font-size: 22px;
    font-weight: 700;
    display: block;
    margin: 6px 0;
}

/* Características / Beneficios Derecho (Ubicación exacta del render) */
.caracteristicas-lista {
    position: absolute;
    top: 38%;
    right: 18%;
    width: 22%;
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 3;
    pointer-events: none;
}

.item-caracteristica {
    display: flex;
    align-items: center;
    gap: 16px;
    background: linear-gradient(90deg, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.65) 20%, rgba(0,0,0,0.65) 90%, rgba(0,0,0,0.0) 100%);
    padding: 8px 12px;
    border-radius: 4px;
}

.item-caracteristica svg {
    width: 18px;
    height: 18px;
    fill: #e5c158;
    flex-shrink: 0;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8));
}

.item-caracteristica span {
    font-family: 'Cinzel', 'Times New Roman', serif;
    color: #ffffff;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
    text-shadow: 0 2px 4px rgba(0,0,0,0.95);
}

/* Barra de Registro Superior Derecha */
.registro-contenedor {
    position: absolute;
    top: 5%;
    right: 18%;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 12;
}

.registro-texto {
    color: #ffffff;
    font-size: 13px;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.95);
    font-weight: 400;
}

.btn-registro {
    display: inline-block;
    padding: 8px 18px;
    border: 1px solid #e5c158;
    color: #e5c158;
    text-decoration: none;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 4px;
    background: rgba(0, 0, 0, 0.6);
    transition: all 0.3s ease;
}

.btn-registro:hover {
    background: #e5c158;
    color: #000000;
    box-shadow: 0 0 12px rgba(229, 193, 88, 0.4);
}

/* Área Interactiva de la Puerta Central */
.puerta-link{
    position: absolute;
    top: 18%;
    left: 41%;
    width: 18%;
    height: 58%;
    z-index: 10; 
    display: block;
    cursor: pointer;
    background-color: rgba(255, 255, 255, 0);
}

.puerta-link::after {
    content: "INGRESA";
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    color: #e5c158;
    font-family: 'Cinzel', serif;
    letter-spacing: 4px;
    font-size: 13px;
    border-bottom: 1px solid #e5c158;
    padding-bottom: 4px;
    opacity: 0;
    transition: opacity 0.3s ease;
    text-shadow: 0 2px 4px #000;
}

.puerta-link:hover::after {
    opacity: 1;
}

/* ================================================== */
/* DISPOSITIVOS MÓVILES (SMARTPHONES Y TABLETS)        */
/* ================================================== */
@media(max-width:1024px){
    /* Ajustes intermedios para portátiles pequeños o tablets */
    .slogan-lateral-pc { left: 22%; width: 18%; top: 20%; }
    .caracteristicas-lista { right: 10%; width: 28%; }
    .registro-contenedor { right: 5%; }
}

@media(max-width:768px){
    /* Imagen en formato cover para pantallas verticales */
    .portada-img {
        object-fit: cover;
        object-position: center center;
    }

    /* Ocultación del módulo lateral exclusivo de PC */
    .slogan-lateral-pc {
        display: none;
    }

    /* Activación y estilizado del eslogan adaptado a móvil */
    .slogan-movil {
        display: inline-block;
        background: rgba(0, 0, 0, 0.5);
        padding: 6px 14px;
        border-radius: 20px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        border: 1px solid rgba(229, 193, 88, 0.15);
        margin-top: 6px;
        width: auto;
    }

    .slogan-movil h2 {
        font-family: 'Cinzel', 'Times New Roman', serif;
        color: #ffffff;
        font-size: 11px;
        letter-spacing: 1px;
        line-height: 1.4;
        text-transform: uppercase;
    }

    .slogan-movil h2 span {
        color: #e5c158;
        display: inline;
        font-size: 11.5px;
        font-weight: 700;
    }

    /* Ajuste del marco táctil de la puerta en pantallas táctiles */
    .puerta-link{
        top: 22%;
        left: 20%;
        width: 60%;
        height: 54%;
    }
    
    .puerta-link::after {
        content: "INGRESAR";
        opacity: 1;
        font-size: 11px;
        bottom: 2%;
    }

    /* Encabezado Superior Unificado */
    .header-branding {
        top: 4%;
        width: 90%;
    }

    .header-branding h1 {
        font-size: 24px;
        letter-spacing: 4px;
    }

    .header-branding p {
        font-size: 10.5px;
        letter-spacing: 2px;
    }

    /* Reubicación horizontal de los beneficios en la base del render */
    .caracteristicas-lista {
        top: auto;
        bottom: 11%;
        left: 5%;
        width: 90%;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
    }

    .item-caracteristica {
        padding: 5px 8px;
        border-left: none;
        border-bottom: 2px solid #e5c158;
        background: rgba(0, 0, 0, 0.75);
        border-radius: 2px;
    }

    .item-caracteristica svg {
        width: 12px;
        height: 12px;
    }

    .item-caracteristica span {
        font-size: 9px;
        letter-spacing: 1px;
    }

    /* Módulo de registro adaptado formalmente en la zona inferior */
    .registro-contenedor {
        top: auto;
        bottom: 2.5%;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 10px;
        width: 95%;
    }

    .registro-texto {
        font-size: 11px;
        letter-spacing: 0.5px;
    }

    .btn-registro {
        padding: 6px 12px;
        font-size: 10.5px;
        letter-spacing: 0.5px;
    }
}

@media(max-width:375px) {
    .header-branding h1 { font-size: 21px; }
    .slogan-movil h2 { font-size: 10px; }
    .item-caracteristica span { font-size: 8px; }
    .caracteristicas-lista { bottom: 12%; }
}

/* ================================================== */
/* PIE DE PÁGINA                                      */
/* ================================================== */
.pie-pagina {
    width: 100%;
    height: 24px;
    background-color: #000000;
    color: #8c8c8c;
    font-size: 11px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    border-top: 1px solid #1a1a1a;
    z-index: 5;
    font-family: Arial, Helvetica, sans-serif;
}

</style>

</head>

<body>

<section class="portada">
    <img src="imagenes/Portada.png" alt="Portada" class="portada-img">

    <div class="header-branding">
        <h1>Loja</h1>
        <p>Centro Comercial Digital</p>
        
        <div class="slogan-movil">
            <h2>Todos los comercios <span>de Loja</span> en un solo lugar</h2>
        </div>
    </div>

    <div class="slogan-lateral-pc">
        <h2>Todos los comercios <span>de Loja</span> en un solo lugar</h2>
    </div>

    <div class="caracteristicas-lista">
        <div class="item-caracteristica">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            <span>Cerca de ti</span>
        </div>
        <div class="item-caracteristica">
            <svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 1.9-2 3v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
            <span>Las mejores ofertas</span>
        </div>
        <div class="item-caracteristica">
            <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            <span>Negocios confiables</span>
        </div>
        <div class="item-caracteristica">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
            <span>Comunidad local</span>
        </div>
    </div>

    <div class="registro-contenedor">
        <span class="registro-texto">¿Es propietario?</span>
        <a href="registro.html" class="btn-registro">Registre su negocio</a>
    </div>

    <a href="interior.html" class="puerta-link"></a>
</section>

<footer class="pie-pagina">
    <p>&copy; 2026 Urbanex. Todos los derechos reservados.</p>
</footer>

</body>
</html>
