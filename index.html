<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

/* ================================================== */
/* RESETEO GLOBAL (HABILITA EL GESTO DE REFRESCAR)   */
/* ================================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body {
    width: 100%;
    min-height: 100%;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
}

/* ================================================== */
/* PORTADA (AJUSTE EXACTO PARA CUALQUIER PANTALLA)    */
/* ================================================== */
.portada{
    width: 100%;
    height: calc(100vh - 24px);
    height: calc(100svh - 24px); 
    position: relative;
    overflow: hidden;
    background-color: #000;
}

/* Control adaptativo de la imagen */
.portada-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Se cambia a cover para evitar el estiramiento vertical en PC */
    object-fit: cover; 
    /* Ajusta el eje vertical al 25% para BAJAR la imagen y centrar las puertas */
    object-position: center 25%;
    display: block;
}

/* CAPA OSCURA REFINADA */
.portada::before{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,.10),
        rgba(0,0,0,.25)
    );
    z-index: 1;
    pointer-events: none;
}

/* ================================================== */
/* ÁREA CLICKEABLE DE LA PUERTA (COMPUTADORA)         */
/* ================================================== */
.puerta-link{
    position:absolute;
    /* Coordenadas ajustadas para el nuevo encuadre centrado */
    top: 14%;
    left: 37.5%;
    width: 25%;
    height: 64%;
    z-index: 10; 
    display:block;
    cursor:pointer;
    background-color: rgba(255, 255, 255, 0);
}

/* ================================================== */
/* RESPONSIVE AJUSTADO PARA PANTALLAS MÓVILES         */
/* ================================================== */
@media(max-width:768px){
    .portada-img {
        /* En celulares se centra completamente la imagen */
        object-position: center center;
    }

    .puerta-link{
        /* Coordenadas adaptadas para el encuadre móvil */
        top: 22%;
        left: 25%;
        width: 50%;
        height: 56%;
    }
}

/* ================================================== */
/* PIE DE PÁGINA (FOOTER)                             */
/* ================================================== */
.pie-pagina {
    width: 100%;
    height: 24px;
    background-color: #000000;
    color: #8c8c8c;
    font-size: 11px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    border-top: 1px solid #1a1a1a;
    z-index: 5;
}

</style>

</head>

<body>

<section class="portada">
    <img src="imagenes/Portada.png" alt="Portada" class="portada-img">
    <a href="interior.html" class="puerta-link"></a>
</section>

<footer class="pie-pagina">
    <p>&copy; 2026 Urbanex. Todos los derechos reservados.</p>
</footer>

</body>
</html>
