<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

/* ========================= */
/* PORTADA */
/* ========================= */

.portada{
    width:100%;
    height:100vh;
    /* Mantiene la ruta exacta del repositorio en GitHub */
    background-image: url("https://raw.githubusercontent.com/urbanextiendas/urbanex/main/Centro%20comercial.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
}

/* CAPA OSCURA REFINADA */
.portada::before{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,.10),
        rgba(0,0,0,.25)
    );
    z-index: 1; /* Capa intermedia por encima del fondo pero por debajo del enlace */
}

/* ÁREA CLICKEABLE DE LA PUERTA (COMPUTADORA) */
.puerta-link{
    position:absolute;
    top:18%;
    left:38%;
    width:24%;
    height:58%;
    z-index:10; /* Prioridad alta para garantizar que el clic funcione siempre */
    display:block;
    cursor:pointer;
    background-color: rgba(255, 255, 255, 0); /* Totalmente transparente */
}

/* RESPONSIVE AJUSTADO PARA EL ENCUADRE EN CELULARES */
@media(max-width:768px){
    .puerta-link{
        top: 20%;
        left: 25%;
        width: 50%;
        height: 60%;
    }
}

</style>

</head>

<body>

<section class="portada">
    <a href="interior.html" class="puerta-link"></a>
</section>

</body>
</html>
