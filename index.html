<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

/* ========================= */
/* PORTADA */
/* ========================= */

.portada{
    width:100%;
    height:100vh;
    background-image: url("https://raw.githubusercontent.com/urbanextiendas/urbanex/main/Puerta%20al%20comercio.png");
    background-size:cover;
    background-position:center; /* Centrado por defecto en PC */
    background-repeat:no-repeat;
    position:relative;
}

/* CAPA OSCURA CORREGIDA */
.portada::before{
    content:"";
    position:absolute;
    inset:0;
    /* Se redujo la opacidad a .10 y .20 para que la imagen NO se vea opaca */
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,.10),
        rgba(0,0,0,.20)
    );
    z-index: 1;
}

/* ÁREA CLICKEABLE DE LA PUERTA */
.puerta-link{
    position:absolute;
    top:18%;
    left:38%;
    width:24%;
    height:58%;
    z-index:5;
    display:block;
    cursor:pointer;
    background-color: rgba(255, 255, 255, 0);
}

/* RESPONSIVE OPTIMIZADO PARA CELULARES */
@media(max-width:768px){

    .portada{
        /* Muerde los lados de la imagen pero se enfoca estrictamente 
           en el centro exacto vertical para que aparezcan las puertas */
        background-position: 50% center; 
    }

    .puerta-link{
        /* Coordenadas adaptadas para encajar con el nuevo encuadre del celular */
        top: 20%;
        left: 20%;
        width: 60%;
        height: 65%;
    }
}

</style>

</head>

<body>

<section class="portada">
    <a href="interior.html" class="puerta-link" title="Ingresar al Comercio"></a>
</section>

</body>
</html>
