<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal del Comercio Responsivo</title>
    <style>
        /* Elimina márgenes y asegura que el contenedor ocupe toda la pantalla */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        /* Contenedor principal adaptable */
        .contenedor-portal {
            position: relative;
            width: 100%;
            height: 100vh; /* Ocupa el 100% de la altura de la pantalla */
        }

        /* Control inteligente de la imagen */
        .contenedor-portal img {
            width: 100%;
            height: 100%;
            /* 'cover' mantiene la proporción exacta, recortando los lados 
               en pantallas verticales (celulares) para no deformar la imagen */
            object-fit: cover; 
            object-position: center center; /* Centra el pasillo y las puertas */
            display: block;
        }

        /* Enlace invisible posicionado sobre el pasillo de entrada */
        .enlace-acceso {
            position: absolute;
            cursor: pointer;
            outline: none;
            background-color: rgba(255, 255, 255, 0); /* Totalmente transparente */
            transition: background-color 0.3s ease;
        }

        /* --- AJUSTES POR DISPOSITIVO (MEDIA QUERIES) --- */

        /* 1. Coordenadas del enlace para Computadoras (Pantallas Anchas) */
        @media (min-width: 769px) {
            .enlace-acceso {
                top: 20%;
                left: 35%;
                width: 30%;
                height: 70%;
            }
            .enlace-acceso:hover {
                background-color: rgba(255, 215, 0, 0.05); /* Brillo dorado sutil al pasar el mouse */
            }
        }

        /* 2. Coordenadas del enlace para Celulares (Pantallas Verticales) */
        @media (max-width: 768px) {
            .enlace-acceso {
                top: 15%;
                left: 20%;
                width: 60%; /* Área táctil más amplia para facilitar la pulsación con el dedo */
                height: 80%;
            }
        }
    </style>
</head>
<body>

    <div class="contenedor-portal">
        <img src="https://raw.githubusercontent.com/urbanextiendas/urbanex/main/Puerta%20al%20comercio.png" alt="Puerta al Comercio">
        
        <a href="#" class="enlace-acceso" title="Ingresar al Comercio"></a>
    </div>

</body>
</html>
