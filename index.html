<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* ========================= */
/* CONTENEDOR */
/* ========================= */

.portada{

    position:relative;

    width:100vw;
    height:100vh;

    overflow:hidden;
}

/* ========================= */
/* IMAGEN */
/* ========================= */

.portada img{

    width:100%;
    height:100%;

    object-fit:cover;
    object-position:center;

    display:block;
}

/* ========================= */
/* ÁREA CLICKEABLE */
/* ========================= */

.puerta{

    position:absolute;

    z-index:5;

    display:block;

    /* DESKTOP */

    left:39%;
    top:14%;

    width:22%;
    height:67%;
}

/* ========================= */
/* TABLET */
/* ========================= */

@media(max-width:1024px){

    .puerta{

        left:35%;
        top:16%;

        width:30%;
        height:63%;
    }
}

/* ========================= */
/* CELULAR */
/* ========================= */

@media(max-width:768px){

    .portada img{

        object-fit:contain;
        background:#000;
    }

    .puerta{

        left:28%;
        top:22%;

        width:44%;
        height:48%;
    }
}

/* ========================= */
/* CELULARES PEQUEÑOS */
/* ========================= */

@media(max-width:480px){

    .puerta{

        left:26%;
        top:23%;

        width:48%;
        height:46%;
    }
}

</style>

</head>

<body>

<div class="portada">

    <img src="Puerta al comercio.png" alt="Portada">

    <a href="interior.html" class="puerta"></a>

</div>

</body>
</html>
