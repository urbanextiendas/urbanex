<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

/* ================================================== */
/* RESETEO GLOBAL (HABILITA EL GESTO DE REFRESCAR)   */
/* ================================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body {
    width: 100%;
    /* Se quita 'overflow: hidden' para que el navegador del celular */
    /* detecte el arrastre hacia abajo y permita refrescar la página */
    min-height: 100%;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
}

/* ================================================== */
/* PORTADA (ESTRUCTURA DE IMAGEN A PANTALLA COMPLETA) */
/* ================================================== */
.portada{
    width: 100%;
    /* Ocupa el alto disponible restando el espacio del pie de página */
    height: calc(100vh - 40px);
    height: calc(100svh - 40px); 
    position: relative;
    overflow: hidden;
}

/* Imagen nativa: soluciona el problema de invisibilidad en celulares */
.portada-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* 'cover' expande la imagen cubriendo la pantalla sin deformarla */
    object-fit: cover;
    /* Mantiene las puertas y el pasillo alineados en el centro exacto */
    object-position: center center;
    display: block;
}

/* CAPA OSCURA */
.portada::before{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,.10),
        rgba(0,0,0,.25)
    );
    z-index: 1;
    pointer-events: none; /* Evita bloquear las interacciones táctiles */
}

/* ================================================== */
/* ÁREA CLICKEABLE DE LA PUERTA (COMPUTADORA)         */
/* ================================================== */
.puerta-link{
    position:absolute;
    top:18%;
    left:38%;
    width:24%;
    height:58%;
    z-index: 10; 
    display:block;
    cursor:pointer;
    background-color: rgba(255, 255, 255, 0); /* Invisible */
}

/* RESPONSIVE AJUSTADO PARA EL ENCUADRE EN CELULARES */
@media(max-width:768px){
    .puerta-link{
        top: 22%;
        left: 25%;
        width: 50%;
        height: 56%;
    }
}

/* ================================================== */
/* PIE DE PÁGINA (FOOTER)                             */
/* ================================================== */
.pie-pagina {
    width: 100%;
    height: 40px;
    background-color: #000000;
    color: #8c8c8c;
    font-size: 13px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    border-top: 1px solid #1a1a1a;
    z-index: 5;
}

</style>

</head>

<body>

<section class="portada">
    <img src="imagenes/Portada.png" alt="Portada" class="portada-img">
    
    <a href="interior.html" class="puerta-link"></a>
</section>

<footer class="pie-pagina">
    <p>&copy; 2026 Urbanex. Todos los derechos reservados.</p>
</footer>

</body>
</html>
