<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Loja</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body, html {
    /* Asegura el correcto funcionamiento del scroll y refresco en móviles */
    width: 100%;
    height: 100%;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
    -webkit-overflow-scrolling: touch; /* Suaviza el gesto táctil en iOS */
}

/* ========================= */
/* PORTADA */
/* ========================= */

.portada{
    width: 100%;
    height: 100vh;
    position: relative;
    overflow: hidden;
}

/* Control absoluto de la imagen para evitar fallos en celulares */
.portada-img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Ajusta la imagen a pantalla completa sin deformarla */
    object-position: center center; /* Mantiene las puertas siempre visibles en el centro */
    display: block;
}

/* CAPA OSCURA REFINADA */
.portada::before{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,.10),
        rgba(0,0,0,.25)
    );
    z-index: 1;
    pointer-events: none; /* Permite que los gestos pasen a través de la capa */
}

/* ÁREA CLICKEABLE DE LA PUERTA (COMPUTADORA) */
.puerta-link{
    position:absolute;
    top:18%;
    left:38%;
    width:24%;
    height:58%;
    z-index:10; /* Prioridad por encima de la capa oscura */
    display:block;
    cursor:pointer;
    background-color: rgba(255, 255, 255, 0); /* Totalmente transparente */
}

/* RESPONSIVE AJUSTADO PARA PANTALLAS MÓVILES */
@media(max-width:768px){
    .puerta-link{
        /* Coordenadas adaptadas para el encuadre vertical del celular */
        top: 20%;
        left: 25%;
        width: 50%;
        height: 60%;
    }
}

</style>

</head>

<body>

<section class="portada">
    <img src="imagenes/Portada.png" alt="Portada" class="portada-img">
    
    <a href="interior.html" class="puerta-link"></a>
</section>

</body>
</html>
