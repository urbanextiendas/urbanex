<!-- 
ASEGÚRESE DE QUE EL ARCHIVO:
"Puerta al comercio.png"

ESTÉ EN LA MISMA CARPETA DEL HTML.
-->

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow-x:hidden;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

/* ========================= */
/* PORTADA */
/* ========================= */

.hero{

    width:100%;
    height:100vh;

    /* AQUÍ SE LEE LA IMAGEN */

    background-image:url("Puerta al comercio.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:flex-end;

    position:relative;
}

/* OSCURECER UN POCO */

.hero::before{

    content:"";
    position:absolute;
    inset:0;

    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,.15),
        rgba(0,0,0,.55)
    );
}

/* BOTÓN */

.entrar{

    position:relative;
    z-index:2;

    margin-bottom:90px;

    width:260px;
    height:80px;

    border:none;
    border-radius:60px;

    cursor:pointer;

    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;

    color:#2c1a00;

    background:
    linear-gradient(
        135deg,
        #f8d27a,
        #d39b35
    );

    box-shadow:
    0 0 20px rgba(255,196,74,.7),
    0 0 60px rgba(255,196,74,.35);

    transition:.35s;
}

.entrar:hover{

    transform:scale(1.05);

    box-shadow:
    0 0 30px rgba(255,196,74,.95),
    0 0 80px rgba(255,196,74,.45);
}

/* ========================= */
/* CONTENIDO */
/* ========================= */

.tienda{

    min-height:100vh;

    background:#0b0b0b;

    padding:100px 8%;
}

.titulo{

    text-align:center;
    color:#f2c66d;

    font-size:52px;

    margin-bottom:70px;
}

.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:35px;
}

.card{

    background:#121212;

    border-radius:20px;

    overflow:hidden;

    border:
    1px solid rgba(255,198,109,.15);

    transition:.35s;
}

.card:hover{

    transform:translateY(-10px);

    box-shadow:
    0 0 25px rgba(255,198,109,.18);
}

.card img{

    width:100%;
    height:240px;

    object-fit:cover;
}

.info{

    padding:24px;
}

.info h2{

    color:#f2c66d;

    margin-bottom:15px;
}

.info p{

    color:#cfcfcf;

    line-height:1.6;

    margin-bottom:20px;
}

.btn{

    display:inline-block;

    padding:14px 24px;

    border-radius:10px;

    text-decoration:none;

    background:#d39b35;

    color:#111;

    font-weight:bold;
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media(max-width:768px){

    .hero{

        background-position:center;
    }

    .entrar{

        width:220px;
        height:68px;

        font-size:22px;

        margin-bottom:60px;
    }

    .titulo{

        font-size:34px;
    }
}

</style>

</head>

<body>

<section class="hero">

    <button class="entrar"
    onclick="document.getElementById('comercios').scrollIntoView()">
        ENTRAR
    </button>

</section>

<section class="tienda" id="comercios">

    <h1 class="titulo">
        Comercios Disponibles
    </h1>

    <div class="grid">

        <div class="card">

            <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200&auto=format&fit=crop">

            <div class="info">

                <h2>Tienda Premium</h2>

                <p>
                    Productos exclusivos y atención personalizada.
                </p>

                <a href="#" class="btn">
                    Ver tienda
                </a>

            </div>

        </div>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1521334884684-d80222895322?q=80&w=1200&auto=format&fit=crop">

            <div class="info">

                <h2>Moda Urbana</h2>

                <p>
                    Las mejores tendencias del mercado.
                </p>

                <a href="#" class="btn">
                    Ver tienda
                </a>

            </div>

        </div>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1200&auto=format&fit=crop">

            <div class="info">

                <h2>Luxury Store</h2>

                <p>
                    Experiencia digital elegante y moderna.
                </p>

                <a href="#" class="btn">
                    Ver tienda
                </a>

            </div>

        </div>

    </div>

</section>

</body>
</html>
