<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagen Interactiva</title>
</head>
<body>

    <!-- El atributo usemap vincula la imagen con el mapa interactivo -->
    <img src="Puerta al comercio.png" alt="Puerta al comercio" usemap="#mapa-puerta">

    <!-- Definición del mapa interactivo -->
    <map name="mapa-puerta">
        <!-- 
            shape="rect" define una zona interactiva rectangular.
            coords="x1, y1, x2, y2" representa las esquinas superior-izquierda e inferior-derecha de la puerta en píxeles.
            href es la dirección de la página a la que desea redirigir.
        -->
        <area shape="rect" coords="100,150,300,450" href="https://www.enlace-de-destino.com" alt="Entrar al comercio">
    </map>

</body>
</html>
