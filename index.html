<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

/* ================================================== */
/* RESETEO GLOBAL (HABILITA EL GESTO DE REFRESCAR)   */
/* ================================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body {
    width: 100%;
    min-height: 100%;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
}

/* ================================================== */
/* PORTADA (AJUSTE EXACTO PARA CUALQUIER PANTALLA)    */
/* ================================================== */
.portada{
    width: 100%;
    /* Se recalculó el alto restando los nuevos 24px del pie de página */
    height: calc(100vh - 24px);
    height: calc(100svh - 24px); 
    position: relative;
    overflow: hidden;
    background-color: #000;
}

/* Control adaptativo de la imagen */
.portada-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill; 
    display: block;
}

/* CAPA OSCURA REFINADA */
.portada::before{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,.10),
        rgba(0,0,0,.25)
    );
    z-index: 1;
    pointer-events: none;
}

/* ================================================== */
/* ÁREA CLICKEABLE DE LA PUERTA (COMPUTADORA)         */
/* ================================================== */
.puerta-link{
    position:absolute;
    top: 18%;
    left: 38%;
    width: 24%;
    height: 58%;
    z-index: 10; 
    display:block;
    cursor:pointer;
    background-color: rgba(255, 255, 255, 0);
}

/* ================================================== */
/* RESPONSIVE AJUSTADO PARA PANTALLAS MÓVILES         */
/* ================================================== */
@media(max-width:768px){
    .portada-img {
        object-fit: cover;
        object-position: center center;
    }

    .puerta-link{
        top: 22%;
        left: 25%;
        width: 50%;
        height: 56%;
    }

    /* Ajustes optimizados para los textos en pantallas móviles */
    .texto-izquierda {
        top: 38%;
        left: 2%;
        width: 26%;
        font-size: 10px !important;
    }

    .texto-izquierda span {
        font-size: 13px !important;
        margin: 2px 0 !important;
    }

    .texto-derecha {
        top: 35%;
        right: 2%;
        width: 26%;
        font-size: 9px !important;
    }

    .texto-derecha ul li {
        margin-bottom: 12px !important;
    }

    .texto-derecha ul li svg {
        width: 12px !important;
        height: 12px !important;
        margin-right: 4px !important;
    }
}

/* ================================================== */
/* PIE DE PÁGINA (HAZLO MÁS ANGOSTO)                  */
/* ================================================== */
.pie-pagina {
    width: 100%;
    /* Se redujo la altura de 40px a 24px */
    height: 24px;
    background-color: #000000;
    color: #8c8c8c;
    /* Se ajustó el tamaño del texto para que armonice con la barra angosta */
    font-size: 11px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    border-top: 1px solid #1a1a1a;
    z-index: 5;
}

/* ================================================== */
/* NUEVOS ESTILOS PARA LOS TEXTOS SUPERPUESTOS        */
/* ================================================== */
.texto-izquierda {
    position: absolute;
    top: 40%;
    left: 4%;
    width: 22%;
    z-index: 6;
    color: #dfb66e;
    text-align: center;
    font-family: 'Times New Roman', Times, serif;
    font-size: 18px;
    line-height: 1.4;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.texto-izquierda span {
    font-size: 24px;
    display: block;
    font-weight: bold;
    margin: 5px 0;
}

.texto-derecha {
    position: absolute;
    top: 33%;
    right: 8%;
    width: 22%;
    z-index: 6;
    color: #d4b275;
    font-family: 'Times New Roman', Times, serif;
    font-size: 14px;
    letter-spacing: 1px;
}

.texto-derecha ul {
    list-style: none;
}

.texto-derecha ul li {
    display: flex;
    align-items: center;
    margin-bottom: 22px;
    text-transform: uppercase;
}

.texto-derecha ul li svg {
    margin-right: 12px;
    fill: #d4b275;
    flex-shrink: 0;
}

</style>

</head>

<body>

<section class="portada">
    <img src="imagenes/Portada.png" alt="Portada" class="portada-img">
    
    <div class="texto-izquierda">
        Todos los comercios
        <span>de Loja</span>
        en un solo lugar
    </div>

    <div class="texto-derecha">
        <ul>
            <li>
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                Cerca de ti
            </li>
            <li>
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
                Las mejores ofertas
            </li>
            <li>
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                Negocios confiables
            </li>
            <li>
                <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                Comunidad local
            </li>
        </ul>
    </div>

    <a href="interior.html" class="puerta-link"></a>
</section>

<footer class="pie-pagina">
    <p>&copy; 2026 Urbanex. Todos los derechos reservados.</p>
</footer>

</body>
</html>
