<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

/* ================================================== */
/* RESETEO GLOBAL (HABILITA EL GESTO DE REFRESCAR)   */
/* ================================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body {
    width: 100%;
    /* Libera las restricciones rígidas de altura para que el navegador 
       del celular pueda detectar el deslizamiento hacia abajo y refrescar */
    min-height: 100%;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
    /* Optimiza el comportamiento del scroll táctil en dispositivos móviles */
    -webkit-overflow-scrolling: touch;
}

/* ================================================== */
/* PORTADA (AJUSTE RESPONSIVO EN CUALQUIER PANTALLA)  */
/* ================================================== */
.portada{
    width: 100%;
    /* Usa 'svh' (alto de pantalla corto) en navegadores modernos para evitar 
       que las barras de navegación del celular corten o invisibilicen la imagen */
    height: 100vh;
    height: 100svh; 
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Imagen optimizada como objeto adaptativo */
.portada-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Obliga a la imagen a cubrir la pantalla completa sin deformar la perspectiva */
    object-fit: cover;
    /* Mantiene el pasillo central y las puertas alineadas en el centro del dispositivo */
    object-position: center center;
    display: block;
}

/* CAPA OSCURA REFINADA */
.portada::before{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,.10),
        rgba(0,0,0,.25)
    );
    z-index: 1;
    /* Permite que los gestos táctiles pasen a través de la capa sin bloquear el scroll */
    pointer-events: none; 
}

/* ================================================== */
/* ÁREA CLICKEABLE DE LA PUERTA (COMPUTADORA)         */
/* ================================================== */
.puerta-link{
    position:absolute;
    top:18%;
    left:38%;
    width:24%;
    height:58%;
    /* Se posiciona por encima de la imagen y de la capa oscura */
    z-index: 10; 
    display:block;
    cursor:pointer;
    background-color: rgba(255, 255, 255, 0); /* Invisible */
}

/* ================================================== */
/* RESPONSIVE AJUSTADO PARA PANTALLAS MÓVILES         */
/* ================================================== */
@media(max-width:768px){
    .puerta-link{
        /* Coordenadas adaptadas para el encuadre proporcional del celular */
        top: 22%;
        left: 25%;
        width: 50%;
        height: 56%;
    }
}

</style>

</head>

<body>

<section class="portada">
    <img src="imagenes/Portada.png" alt="Portada" class="portada-img">
    
    <a href="interior.html" class="puerta-link"></a>
</section>

</body>
</html>
