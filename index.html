<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Loja</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* ========================= */
/* CONTENEDOR */
/* ========================= */

.portada{

    position:relative;

    width:100vw;
    height:100vh;

    overflow:hidden;

    background:#000;
}

/* ========================= */
/* IMAGEN */
/* ========================= */

.portada img{

    width:100%;
    height:100%;

    display:block;

    object-fit:cover;

    /* IMPORTANTE */
    object-position:center center;
}

/* ========================= */
/* ÁREA CLICKEABLE */
/* ========================= */

.puerta{

    position:absolute;

    z-index:10;

    display:block;

    cursor:pointer;

    /* DESKTOP */

    left:38%;
    top:16%;

    width:24%;
    height:60%;
}

/* ========================= */
/* CELULAR */
/* ========================= */

@media (max-width:768px){

    .portada img{

        /* AQUÍ ESTÁ EL CAMBIO IMPORTANTE */

        object-fit:cover;

        /* BAJA LA IMAGEN */
        object-position:50% 50%;
    }

    .puerta{

        /* AJUSTADO AL CELULAR */

        left:20%;
        top:22%;

        width:60%;
        height:52%;
    }
}

/* ========================= */
/* CELULARES PEQUEÑOS */
/* ========================= */

@media (max-width:480px){

    .portada img{

        object-position:50% 50%;
    }

    .puerta{

        left:18%;
        top:23%;

        width:64%;
        height:50%;
    }
}

</style>

</head>

<body>

<div class="portada">

    <img src="Puerta al comercio.png" alt="Portada">

    <!-- CAMBIE interior.html -->

    <a href="interior.html" class="puerta"></a>

</div>

</body>
</html>
