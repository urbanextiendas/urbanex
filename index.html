<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

/* ========================= */
/* PORTADA */
/* ========================= */

.portada{
    width:100%;
    height:100vh;

    /* Su imagen original desde GitHub */
    background-image: url("https://raw.githubusercontent.com/urbanextiendas/urbanex/main/Puerta%20al%20comercio.png");

    /* 'contain' obliga a que la imagen se muestre completa en el celular sin cortes */
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;

    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ÁREA CLICKEABLE DE LA PUERTA (COMPUTADOR) */
.puerta-link{
    position:absolute;

    top:18%;
    left:38%;

    width:24%;
    height:58%;

    z-index:5;
    display:block;
    cursor:pointer;
    background-color: rgba(255, 255, 255, 0);
}

/* RESPONSIVE EXACTO PARA CELULARES (PANTALLAS VERTICALES) */
@media(max-width:768px){

    .puerta-link{
        /* Coordenadas recalculadas para cuando la imagen se encoge en el centro del celular */
        top: 37%;
        left: 38%;
        width: 24%;
        height: 26%;
    }
}

</style>

</head>

<body>

<section class="portada">
    <a href="interior.html" class="puerta-link" title="Ingresar al Comercio"></a>
</section>

</body>
</html>
