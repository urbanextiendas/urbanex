<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

/* ========================= */
/* PORTADA */
/* ========================= */

.portada{

    position:relative;

    width:100%;
    height:100vh;

    background-image:url("Puerta al comercio.png");

    background-size:cover;
    background-position:center center;
    background-repeat:no-repeat;
}

/* OSCURECER LIGERAMENTE */

.portada::before{

    content:"";

    position:absolute;
    inset:0;

    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,.12),
        rgba(0,0,0,.28)
    );

    pointer-events:none;
}

/* ========================= */
/* ÁREA CLICKEABLE */
/* ========================= */

.puerta-link{

    position:absolute;

    z-index:10;

    display:block;

    cursor:pointer;

    /* DESKTOP */

    top:16%;
    left:37.2%;

    width:25.5%;
    height:63%;
}

/* ========================= */
/* TABLETS */
/* ========================= */

@media (max-width:1024px){

    .puerta-link{

        top:18%;
        left:34%;

        width:32%;
        height:58%;
    }
}

/* ========================= */
/* CELULARES */
/* ========================= */

@media (max-width:768px){

    .portada{

        background-position:center center;
        background-size:cover;
    }

    .puerta-link{

        top:20%;
        left:26%;

        width:48%;
        height:52%;
    }
}

/* ========================= */
/* CELULARES PEQUEÑOS */
/* ========================= */

@media (max-width:480px){

    .puerta-link{

        top:21%;
        left:24%;

        width:52%;
        height:50%;
    }
}

</style>

</head>

<body>

<!--
CAMBIE:
interior.html

POR LA PÁGINA QUE QUIERA ABRIR
-->

<section class="portada">

    <a href="interior.html"
       class="puerta-link">
    </a>

</section>

</body>
</html>
