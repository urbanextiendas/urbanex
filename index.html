<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja - Centro Comercial Digital</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#050505;
    font-family:Arial, Helvetica, sans-serif;
    overflow-x:hidden;
}

/* ========================= */
/* PORTADA */
/* ========================= */

.hero{
    width:100%;
    height:100vh;

    /* IMPORTANTE */
    background-image:
    linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.65)),
    url('./a_wide_cinematic_ultra_realistic_night_scene_of.png');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

/* Oscurecer ligeramente */

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle, transparent 20%, rgba(0,0,0,0.55) 100%);
}

/* CONTENIDO */

.hero-content{
    position:relative;
    z-index:2;
    text-align:center;
    margin-top:340px;
}

/* BOTÓN */

.enter-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;

    width:260px;
    height:78px;

    border-radius:60px;

    text-decoration:none;

    font-size:28px;
    font-weight:700;
    letter-spacing:2px;

    color:#2b1a00;

    background:
    linear-gradient(135deg,#f7d27d,#c99737);

    box-shadow:
    0 0 20px rgba(255,196,74,.6),
    0 0 50px rgba(255,196,74,.3);

    transition:.35s;
}

.enter-btn:hover{
    transform:scale(1.06);
    box-shadow:
    0 0 25px rgba(255,196,74,.8),
    0 0 60px rgba(255,196,74,.5);
}

/* ========================= */
/* TIENDAS */
/* ========================= */

.store-section{
    padding:100px 8%;
    background:#0b0b0b;
}

.store-title{
    text-align:center;
    font-size:48px;
    color:#f2c66d;
    margin-bottom:70px;
}

.store-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:35px;
}

.card{
    background:#111;
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(255,198,109,.15);

    transition:.35s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 30px rgba(255,198,109,.18);
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;
}

.card-body{
    padding:24px;
}

.card-body h2{
    color:#f2c66d;
    margin-bottom:15px;
}

.card-body p{
    color:#cfcfcf;
    line-height:1.6;
    margin-bottom:22px;
}

.view-btn{
    display:inline-block;

    padding:14px 26px;

    border-radius:12px;

    text-decoration:none;
    font-weight:bold;

    background:#d9a84a;
    color:#111;

    transition:.3s;
}

.view-btn:hover{
    background:#f2c66d;
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media(max-width:768px){

    .hero{
        height:90vh;
        background-position:center;
    }

    .hero-content{
        margin-top:220px;
    }

    .enter-btn{
        width:220px;
        height:68px;
        font-size:22px;
    }

    .store-title{
        font-size:34px;
    }

}

</style>
</head>

<body>

<!-- ========================= -->
<!-- PORTADA -->
<!-- ========================= -->

<section class="hero">

    <div class="hero-content">
        <a href="#tiendas" class="enter-btn">
            ENTRAR
        </a>
    </div>

</section>

<!-- ========================= -->
<!-- TIENDAS -->
<!-- ========================= -->

<section id="tiendas" class="store-section">

    <h1 class="store-title">
        Comercios Disponibles
    </h1>

    <div class="store-grid">

        <div class="card">

            <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200&auto=format&fit=crop" alt="">

            <div class="card-body">

                <h2>Tienda Premium</h2>

                <p>
                    Productos exclusivos y atención personalizada.
                </p>

                <a href="#" class="view-btn">
                    Ver tienda
                </a>

            </div>

        </div>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1521334884684-d80222895322?q=80&w=1200&auto=format&fit=crop" alt="">

            <div class="card-body">

                <h2>Moda Urbana</h2>

                <p>
                    Últimas tendencias y accesorios modernos.
                </p>

                <a href="#" class="view-btn">
                    Ver tienda
                </a>

            </div>

        </div>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1200&auto=format&fit=crop" alt="">

            <div class="card-body">

                <h2>Luxury Store</h2>

                <p>
                    Experiencia digital elegante y sofisticada.
                </p>

                <a href="#" class="view-btn">
                    Ver tienda
                </a>

            </div>

        </div>

    </div>

</section>

</body>
</html>
