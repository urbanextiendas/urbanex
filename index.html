<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

/* ========================= */
/* PORTADA */
/* ========================= */

.portada{
    width:100%;
    height:100vh;
    /* Se utiliza la URL directa de GitHub con los espacios convertidos en %20 */
    background-image: url("https://raw.githubusercontent.com/urbanextiendas/urbanex/main/Puerta%20al%20comercio.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    position:relative;
}

/* CAPA OSCURA */

.portada::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,.15),
        rgba(0,0,0,.45)
    );
}

/* ÁREA CLICKEABLE DE LA PUERTA */

.puerta-link{
    position:absolute;
    top:18%;
    left:38%;
    width:24%;
    height:58%;
    z-index:5;
    display:block;
    cursor:pointer;
    /* Se asegura que no tenga estilos visuales por defecto del navegador */
    background-color: rgba(255, 255, 255, 0);
}

/* RESPONSIVE */

@media(max-width:768px){
    .puerta-link{
        top:23%;
        left:30%;
        width:40%;
        height:48%;
    }
}

</style>

</head>

<body>

<section class="portada">
    <a href="interior.html" class="puerta-link" title="Ingresar al Comercio"></a>
</section>

</body>
</html>
