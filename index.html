<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Urbanex</title>

<style>

/* ================================================== */
/* RESETEO GLOBAL (HABILITA EL GESTO DE REFRESCAR)   */
/* ================================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body {
    width: 100%;
    min-height: 100%;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
}

/* ================================================== */
/* PORTADA (AJUSTE EXACTO PARA CUALQUIER PANTALLA)    */
/* ================================================== */
.portada{
    width: 100%;
    /* Se recalculó el alto restando los nuevos 24px del pie de página */
    height: calc(100vh - 24px);
    height: calc(100svh - 24px); 
    position: relative;
    overflow: hidden;
    background-color: #000;
}

/* Control adaptativo de la imagen */
.portada-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill; 
    display: block;
}

/* CAPA OSCURA REFINADA */
.portada::before{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,.10),
        rgba(0,0,0,.25)
    );
    z-index: 1;
    pointer-events: none;
}

/* ================================================== */
/* ÁREA CLICKEABLE DE LA PUERTA (COMPUTADORA)         */
/* ================================================== */
.puerta-link{
    position:absolute;
    top: 18%;
    left: 38%;
    width: 24%;
    height: 58%;
    z-index: 10; 
    display:block;
    cursor:pointer;
    background-color: rgba(255, 255, 255, 0);
}

/* ================================================== */
/* RESPONSIVE AJUSTADO PARA PANTALLAS MÓVILES         */
/* ================================================== */
@media(max-width:768px){
    .portada-img {
        object-fit: cover;
        object-position: center center;
    }

    .puerta-link{
        top: 22%;
        left: 25%;
        width: 50%;
        height: 56%;
    }

    /* Ocultar banderines en celular para proteger el diseño */
    .banderin {
        display: none !important;
    }
}

/* ================================================== */
/* PIE DE PÁGINA (HAZLO MÁS ANGOSTO)                  */
/* ================================================== */
.pie-pagina {
    width: 100%;
    /* Se redujo la altura de 40px a 24px */
    height: 24px;
    background-color: #000000;
    color: #8c8c8c;
    /* Se ajustó el tamaño del texto para que armonice con la barra angosta */
    font-size: 11px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    border-top: 1px solid #1a1a1a;
    z-index: 5;
}

/* ================================================== */
/* BANDERINES LATERALES AGREGADOS                     */
/* ================================================== */
.banderin {
    position: absolute;
    top: 0;
    width: 80px;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 40px;
    color: #dfb15b;
    font-family: 'Times New Roman', Times, serif;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
}

.banderin-izq {
    left: 0;
    border-right: 1px solid rgba(223, 177, 91, 0.3);
}

.banderin-der {
    right: 0;
    border-left: 1px solid rgba(223, 177, 91, 0.3);
}

.banderin .titulo-loja {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
    margin-bottom: 30px;
    text-align: center;
}

.banderin .texto-vertical {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-size: 14px;
    font-weight: normal;
    letter-spacing: 0px;
    line-height: 1.8;
    text-align: center;
}

.banderin .texto-vertical span {
    display: block;
    text-transform: uppercase;
}

.banderin .texto-vertical .espacio {
    margin-bottom: 20px;
}

</style>

</head>
