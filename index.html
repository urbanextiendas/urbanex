<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Urbanex</title>

<style>

/* ================================================== */
/* RESETEO GLOBAL (HABILITA EL GESTO DE REFRESCAR)   */
/* ================================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body {
    width: 100%;
    min-height: 100%;
    background: #000;
    font-family: 'Times New Roman', Times, serif, Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

/* ================================================== */
/* CONTENEDOR OPTIMIZADO PARA RESPUESTA INSTANTÁNEA   */
/* ================================================== */
.portada{
    width: 100%;
    height: calc(100vh - 24px);
    height: calc(100svh - 24px); 
    position: relative;
    overflow: hidden;
    background-color: #000;
    /* Transición ultra veloz nativa */
    transition: transform 0.2s ease-out, opacity 0.15s ease-in-out;
    will-change: transform, opacity;
}

/* Efecto inmediato al accionar la entrada */
.transicion-activa {
    transform: scale(1.05);
    opacity: 0;
    pointer-events: none;
}

/* Control adaptativo de la imagen */
.portada-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill; 
    display: block;
}

/* CAPA OSCURA REFINADA PARA MEJORAR CONTRASTE DE TEXTOS */
.portada::before{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,.30),
        rgba(0,0,0,.50)
    );
    z-index: 1;
    pointer-events: none;
}

/* ================================================== */
/* CAPAS DE TEXTO PROFESIONAL Y LEGIBLE (ESCRITORIO)  */
/* ================================================== */

/* Encabezado Superior (Arco de la puerta) */
.header-branding {
    position: absolute;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    width: 90%;
    max-width: 600px;
    z-index: 3;
    pointer-events: none;
    transition: opacity 0.1s ease;
}

.header-branding h1 {
    color: #e5c158;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 2px 4px rgba(0,0,0,0.95), 0 4px 10px rgba(0,0,0,0.8);
    margin-bottom: 4px;
}

.header-branding p {
    color: #ffffff;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 2px 4px rgba(0,0,0,0.95);
}

/* Eslogan Lateral Izquierdo (Sobre pilar izquierdo) */
.slogan-lateral {
    position: absolute;
    top: 40%;
    left: 4%;
    width: 26%;
    z-index: 3;
    pointer-events: none;
    transition: opacity 0.1s ease;
}

.slogan-lateral h2 {
    color: #ffffff;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 1px;
    line-height: 1.4;
    text-transform: uppercase;
    text-shadow: 0 2px 6px rgba(0,0,0,0.95);
}

.slogan-lateral h2 span {
    color: #e5c158;
    display: block;
    font-size: 26px;
    font-weight: bold;
    margin: 5px 0;
}

/* Características / Beneficios (Sobre pilar derecho) */
.caracteristicas-lista {
    position: absolute;
    top: 35%;
    right: 4%;
    width: 26%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    z-index: 3;
    pointer-events: none;
    transition: opacity 0.1s ease;
}

.item-caracteristica {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0, 0, 0, 0.5);
    padding: 10px 14px;
    border-radius: 6px;
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border-left: 3px solid #e5c158;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.item-caracteristica svg {
    width: 20px;
    height: 20px;
    fill: #e5c158;
    flex-shrink: 0;
}

.item-caracteristica span {
    color: #ffffff;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: bold;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
}

/* Botón de Registro Superior Derecho */
.registro-contenedor {
    position: absolute;
    top: 4%;
    right: 4%;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 12;
    transition: opacity 0.1s ease;
}

.registro-texto {
    color: #ffffff;
    font-size: 13px;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.95);
}

.btn-registro {
    display: inline-block;
    padding: 10px 20px;
    border: 1px solid #e5c158;
    color: #e5c158;
    text-decoration: none;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-radius: 4px;
    background: rgba(0, 0, 0, 0.7);
    transition: all 0.3s ease;
}

.btn-registro:hover {
    background: #e5c158;
    color: #000000;
    box-shadow: 0 0 15px rgba(229, 193, 88, 0.5);
}

/* Desvanecimiento instantáneo de textos */
.ocultar-interfaz .header-branding,
.ocultar-interfaz .slogan-lateral,
.ocultar-interfaz .caracteristicas-lista,
.ocultar-interfaz .registro-contenedor {
    opacity: 0;
}

/* ================================================== */
/* ÁREA CLICKEABLE DE LA PUERTA                       */
/* ================================================== */
.puerta-link{
    position:absolute;
    top: 18%;
    left: 38%;
    width: 24%;
    height: 58%;
    z-index: 10; 
    display:block;
    cursor:pointer;
    background-color: rgba(255, 255, 255, 0);
}

.puerta-link::after {
    content: "ENTRAR";
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    color: #e5c158;
    letter-spacing: 4px;
    font-size: 14px;
    border-bottom: 1px solid #e5c158;
    padding-bottom: 4px;
    opacity: 0;
    transition: opacity 0.2s ease;
    text-shadow: 0 2px 4px #000;
}

.puerta-link:hover::after {
    opacity: 1;
}

/* ================================================== */
/* OPTIMIZACIÓN EXCLUSIVA PARA DISPOSITIVOS MÓVILES    */
/* ================================================== */
@media(max-width:768px){
    .portada-img {
        object-fit: cover;
        object-position: center center;
    }

    .puerta-link{
        top: 22%;
        left: 22%;
        width: 56%;
        height: 54%;
    }
    
    .puerta-link::after {
        opacity: 1; 
        font-size: 12px;
        bottom: 4%;
    }

    .header-branding {
        top: 4%;
    }

    .header-branding h1 {
        font-size: 24px;
        letter-spacing: 3px;
    }

    .header-branding p {
        font-size: 11px;
        letter-spacing: 1px;
    }

    .slogan-lateral {
        top: 14%;
        left: 5%;
        width: 90%;
        text-align: center;
    }

    .slogan-lateral h2 {
        font-size: 13px;
        letter-spacing: 1px;
    }

    .slogan-lateral h2 span {
        display: inline;
        font-size: 14px;
        margin: 0 5px;
    }

    .caracteristicas-lista {
        top: auto;
        bottom: 14%;
        left: 5%;
        width: 90%;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
    }

    .item-caracteristica {
        padding: 5px 8px;
        border-left: none;
        border-bottom: 2px solid #e5c158;
        background: rgba(0, 0, 0, 0.7);
    }

    .item-caracteristica svg {
        width: 13px;
        height: 13px;
        gap: 6px;
    }

    .item-caracteristica span {
        font-size: 9px;
        letter-spacing: 0.5px;
    }

    .registro-contenedor {
        top: auto;
        bottom: 3%;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        flex-direction: row;
        justify-content: center;
        gap: 10px;
        width: 90%;
    }

    .registro-texto {
        font-size: 11px;
    }

    .btn-registro {
        padding: 6px 14px;
        font-size: 11px;
    }
}

@media(max-width:380px){
    .caracteristicas-lista {
        bottom: 16%;
    }
    .item-caracteristica span {
        font-size: 8px;
    }
}

/* ================================================== */
/* PIE DE PÁGINA                                      */
/* ================================================== */
.pie-pagina {
    width: 100%;
    height: 24px;
    background-color: #000000;
    color: #8c8c8c;
    font-size: 11px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    border-top: 1px solid #1a1a1a;
    z-index: 5;
    font-family: Arial, Helvetica, sans-serif;
}

</style>

<!-- Pre-renderizado prioritario en segundo plano para ejecución inmediata -->
<link rel="prerender" href="boulevard.html">
<link rel="prefetch" href="boulevard.html">

</head>

<body>

<section class="portada" id="seccionPortada">
    <img src="imagenes/Portada.png" alt="Portada" class="portada-img">

    <div class="header-branding">
        <h1>Loja</h1>
        <p>Centro Comercial Digital</p>
    </div>

    <div class="slogan-lateral">
        <h2>Todos los comercios <span>de Loja</span> en un solo lugar</h2>
    </div>

    <div class="caracteristicas-lista">
        <div class="item-caracteristica">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            <span>Cerca de usted</span>
        </div>
        <div class="item-caracteristica">
            <svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 1.9-2 3v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
            <span>Las mejores ofertas</span>
        </div>
        <div class="item-caracteristica">
            <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            <span>Negocios confiables</span>
        </div>
        <div class="item-caracteristica">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
            <span>Comunidad local</span>
        </div>
    </div>

    <div class="registro-contenedor">
        <span class="registro-texto">¿Es propietario?</span>
        <a href="registro.html" class="btn-registro">Registre su negocio</a>
    </div>

    <!-- Enlace directo con acción instantánea en paralelo -->
    <a href="boulevard.html" class="puerta-link" onclick="instantePremium(event)"></a>
</section>

<footer class="pie-pagina">
    <p>&copy; 2026 Urbanex. Todos los derechos reservados.</p>
</footer>

<script>
function instantePremium(e) {
    // Dispara el efecto visual de forma inmediata en la capa actual
    document.getElementById('seccionPortada').classList.add('ocultar-interfaz', 'transicion-activa');
    
    // No detiene el enlace (preventDefault), permitiendo que el navegador cambie de página al instante
}
</script>

</body>
</html>
