<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loja</title>

<style>

/* ================================================== */
/* CONFIGURACIÓN GLOBAL Y RESETEO (PERMITE REFRESCO)  */
/* ================================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body {
    width: 100%;
    /* Se cambia 'height: 100vh' y 'overflow: hidden' por min-height. 
       Esto libera la pantalla en el celular para que funcione el gesto de refrescar */
    min-height: 100%;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
}

/* ================================================== */
/* PORTADA (AJUSTE DE IMAGEN EN CUALQUIER PANTALLA)   */
/* ================================================== */
.portada{
    width: 100%;
    /* Asegura que ocupe exactamente el alto de la pantalla del dispositivo */
    height: 100vh; 
    position: relative;
    overflow: hidden;
}

/* La etiqueta img nativa con object-fit garantiza la visibilidad en celulares */
.portada-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* 'cover' expande la imagen para llenar la pantalla sin deformar la perspectiva */
    object-fit: cover; 
    /* Centra el eje horizontal y vertical (mantiene las puertas visibles) */
    object-position: center center; 
    display: block;
}

/* CAPA OSCURA REFINADA */
.portada::before{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,.10),
        rgba(0,0,0,.25)
    );
    z-index: 1;
    pointer-events: none; /* Evita bloquear interacciones táctiles en el celular */
}

/* ================================================== */
/* ÁREA CLICKEABLE DE LA PUERTA (COMPUTADORA)         */
/* ================================================== */
.puerta-link{
    position:absolute;
    top:18%;
    left:38%;
    width:24%;
    height:58%;
    z-index:10; /* Queda por encima de la imagen y de la capa oscura */
    display:block;
    cursor:pointer;
    background-color: rgba(255, 255, 255, 0); /* Invisible */
}

/* ================================================== */
/* RESPONSIVE AJUSTADO PARA PANTALLAS MÓVILES        */
/* ================================================== */
@media(max-width:768px){
    .puerta-link{
        /* Coordenadas adaptadas para el encuadre vertical automático del celular */
        top: 20%;
        left: 25%;
        width: 50%;
        height: 60%;
    }
}

</style>

</head>

<body>

<section class="portada">
    <img src="imagenes/Portada.png" alt="Portada" class="portada-img">
    
    <a href="interior.html" class="puerta-link"></a>
</section>

</body>
</html>
