<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Negocios - Urbanex</title>
    <link rel="icon" type="image/png" href="/imagenes/log.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #020202; --bg2: rgba(6,6,6,0.65); --bg3: rgba(20,20,20,0.5);
    --gold: #e5c158; --gold2: #a68b44;
    --border: rgba(229,193,88,0.15); --border2: rgba(255,255,255,0.07);
    --text: #fff; --muted: #cfcfcf; --dark: #888;
    --green: #2ed573; --red: #ff4757;
    --serif: 'Cinzel', serif; --sans: 'Montserrat', sans-serif;
    --blur: blur(20px); --tr: all 0.22s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:rgba(229,193,88,.2); border-radius:10px; }
body { background:var(--bg); font-family:var(--sans); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
a { color:inherit; text-decoration:none; }

/* ── HEADER ── */
.header-top {
    background:rgba(6,6,6,.8); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
    border-bottom:1px solid var(--border);
    height:60px; display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; position:sticky; top:0; z-index:50; gap:16px;
}
.brand-box img { height:50px; width:auto; }
.breadcrumb { font-size:11px; color:var(--dark); display:flex; align-items:center; gap:6px; white-space:nowrap; }
.breadcrumb a:hover { color:var(--gold); }
.breadcrumb .sep { opacity:.4; }
.breadcrumb .current { color:var(--gold); }
.header-search { flex:1; max-width:360px; position:relative; }
.header-search input {
    width:100%; background:rgba(0,0,0,.4); border:1px solid var(--border2);
    border-radius:20px; padding:8px 38px 8px 16px; color:#fff; font-size:12px;
    outline:none; font-family:var(--sans);
}
.header-search input:focus { border-color:var(--gold); }
.header-search svg { position:absolute; right:13px; top:50%; transform:translateY(-50%); width:14px; height:14px; fill:var(--dark); }

/* ── HERO ── */
.dir-hero {
    padding:32px 20px 24px;
    text-align:center;
    background:linear-gradient(180deg, rgba(229,193,88,.05), transparent);
    border-bottom:1px solid var(--border);
}
.dir-hero h1 { font-family:var(--serif); font-size:24px; letter-spacing:3px; text-transform:uppercase; color:#fff; }
.dir-hero p { font-size:12px; color:var(--dark); margin-top:6px; }

/* ── LAYOUT ── */
.dir-layout {
    flex:1; display:grid;
    grid-template-columns:220px 1fr;
    max-width:1280px; margin:0 auto; width:100%;
    padding:24px 20px 50px; gap:24px;
}
@media(max-width:860px) {
    .dir-layout { grid-template-columns:1fr; }
    .dir-sidebar { display:flex; flex-wrap:wrap; gap:8px; }
    .dir-sidebar h2 { width:100%; }
    .cat-btn { flex:1; min-width:120px; }
}

/* ── SIDEBAR FILTROS ── */
.dir-sidebar { display:flex; flex-direction:column; gap:6px; }
.sidebar-title { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--gold); font-weight:700; margin-bottom:6px; padding-left:4px; }

.cat-btn {
    display:flex; align-items:center; gap:10px;
    padding:9px 12px; border-radius:10px; cursor:pointer;
    font-size:11.5px; font-weight:500; color:var(--muted);
    background:rgba(10,10,10,.6); border:1px solid rgba(255,255,255,.04);
    transition:var(--tr); text-align:left; width:100%;
}
.cat-btn:hover { border-color:rgba(229,193,88,.3); color:#fff; }
.cat-btn.active { background:rgba(229,193,88,.08); border-color:var(--gold); color:var(--gold); font-weight:600; }
.cat-btn .icon { font-size:16px; flex-shrink:0; }
.cat-btn .count { margin-left:auto; font-size:10px; color:var(--dark); flex-shrink:0; }
.cat-btn.active .count { color:var(--gold2); }

.sidebar-divider { border:none; border-top:1px solid var(--border2); margin:10px 0; }

.toggle-filter {
    display:flex; align-items:center; gap:8px;
    font-size:12px; color:var(--muted); cursor:pointer;
    padding:8px 10px; border-radius:8px; border:1px solid transparent;
    transition:var(--tr); background:none; width:100%; text-align:left;
}
.toggle-filter:hover { color:#fff; }
.toggle-filter.active { color:var(--green); border-color:rgba(46,213,115,.3); background:rgba(46,213,115,.06); }
.toggle-filter svg { width:14px; height:14px; fill:currentColor; flex-shrink:0; }

/* ── CONTENIDO PRINCIPAL ── */
.dir-main { display:flex; flex-direction:column; gap:16px; }

.toolbar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.results-count { font-size:12.5px; color:var(--muted); }
.results-count strong { color:var(--gold); }
.sort-select {
    background:rgba(0,0,0,.4); border:1px solid var(--border2);
    border-radius:8px; padding:8px 12px; color:#fff; font-size:11.5px;
    outline:none; cursor:pointer; font-family:var(--sans);
}
.sort-select:focus { border-color:var(--gold); }

/* ── GRID ── */
.biz-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(250px,1fr));
    gap:16px;
}

.biz-card {
    background:var(--bg3); border:1px solid var(--border2);
    border-radius:14px; overflow:hidden;
    display:flex; flex-direction:column;
    transition:var(--tr); cursor:pointer;
}
.biz-card:hover { border-color:rgba(229,193,88,.4); transform:translateY(-3px); box-shadow:0 10px 30px rgba(0,0,0,.4); }

.card-thumb { width:100%; height:140px; position:relative; flex-shrink:0; }
.card-thumb img { width:100%; height:100%; object-fit:cover; }
.card-thumb-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:32px; background:rgba(229,193,88,.07); }
.card-status { position:absolute; top:8px; right:8px; font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px; backdrop-filter:blur(6px); }
.card-status.open { background:rgba(46,213,115,.2); color:var(--green); border:1px solid var(--green); }
.card-status.closed { background:rgba(255,71,87,.2); color:var(--red); border:1px solid var(--red); }
.card-featured { position:absolute; top:8px; left:8px; font-size:9px; font-weight:700; padding:3px 8px; border-radius:10px; background:rgba(229,193,88,.9); color:#000; }

.card-body { padding:12px; display:flex; flex-direction:column; gap:5px; flex:1; }
.card-cat { font-size:9.5px; color:var(--gold); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.card-name { font-size:13.5px; font-weight:700; color:#fff; line-height:1.3; }
.card-desc { font-size:11px; color:var(--dark); line-height:1.5; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:6px; border-top:1px solid var(--border2); }
.card-rating { display:flex; align-items:center; gap:3px; font-size:11px; }
.card-rating svg { width:11px; height:11px; fill:var(--gold); }
.card-rating .num { color:#fff; font-weight:700; }
.card-rating .cnt { color:var(--dark); }
.card-city { font-size:10px; color:var(--dark); }

/* ── ESTADOS ── */
.skeleton { background:rgba(255,255,255,.03); border-radius:14px; height:230px; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.8} }

.empty-state { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--dark); }
.empty-state h3 { font-family:var(--serif); color:var(--gold); font-size:18px; margin-bottom:8px; }
.empty-state p { font-size:13px; }

/* ── PAGINACIÓN ── */
.pagination { display:flex; justify-content:center; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap; }
.page-btn {
    padding:7px 13px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer;
    background:rgba(0,0,0,.4); border:1px solid var(--border2); color:var(--muted);
    transition:var(--tr);
}
.page-btn:hover { border-color:var(--gold); color:var(--gold); }
.page-btn.active { background:rgba(229,193,88,.12); border-color:var(--gold); color:var(--gold); }
.page-btn:disabled { opacity:.3; cursor:not-allowed; }
.page-info { font-size:11.5px; color:var(--dark); }

/* ── PIE ── */
.pie-pagina { width:100%; height:24px; background:#000; color:#8c8c8c; font-size:11px; display:flex; justify-content:center; align-items:center; border-top:1px solid #1a1a1a; font-family:Arial,sans-serif; }
</style>
</head>
<body>

<header class="header-top">
    <a href="index.html" class="brand-box"><img src="imagenes/logo.png" alt="Urbanex"></a>
    <div class="header-search">
        <input type="text" id="searchInput" placeholder="Buscar negocio, servicio..." autocomplete="off">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </div>
    <div class="breadcrumb">
        <a href="boulevard.html">Boulevard</a>
        <span class="sep">/</span>
        <span class="current">Directorio</span>
    </div>
</header>

<section class="dir-hero">
    <h1>Directorio Completo</h1>
    <p id="heroSub">Todos los comercios de Loja en un solo lugar</p>
</section>

<div class="dir-layout">

    <!-- SIDEBAR -->
    <aside class="dir-sidebar">
        <div class="sidebar-title">Categorías</div>
        <button class="cat-btn active" data-cat="" onclick="setCategory('')">
            <span class="icon">🏙️</span>
            <span>Todos</span>
            <span class="count" id="countAll">—</span>
        </button>
        <div id="catList">
            <div class="skeleton" style="height:38px;border-radius:10px;margin-top:4px;"></div>
            <div class="skeleton" style="height:38px;border-radius:10px;margin-top:4px;"></div>
            <div class="skeleton" style="height:38px;border-radius:10px;margin-top:4px;"></div>
        </div>

        <hr class="sidebar-divider">
        <div class="sidebar-title">Filtros</div>

        <button class="toggle-filter" id="toggleOpen" onclick="toggleFilter('open')">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
            Abiertos ahora
        </button>

        <button class="toggle-filter" id="toggleFeatured" onclick="toggleFilter('featured')">
            <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            Solo destacados
        </button>

        <button class="toggle-filter" id="toggleOffers" onclick="toggleFilter('offers')">
            <svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 1.9-2 3v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
            Con promociones
        </button>
    </aside>

    <!-- MAIN -->
    <div class="dir-main">
        <div class="toolbar">
            <div class="results-count" id="resultsCount">Cargando...</div>
            <select class="sort-select" id="sortSelect">
                <option value="featured">Destacados primero</option>
                <option value="rating">Mejor calificados</option>
                <option value="name">Nombre A-Z</option>
            </select>
        </div>

        <div class="biz-grid" id="bizGrid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>
</div>

<footer class="pie-pagina">
    <p>&copy; 2026 Urbanex. Desarrollado por Neodat Consultores.</p>
</footer>


<!-- ============================================================
     SUPABASE — Reemplaza SUPABASE_URL y SUPABASE_ANON_KEY
     ============================================================ -->
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL     = 'https://mlkynawsjqmawgxeuvks.supabase.co'; // ← cambia esto
const SUPABASE_ANON_KEY = 'sb_publishable_UyYcTuSIaLDbaD73wvwOfA_TbyFlRNv';                    // ← cambia esto

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PAGE_SIZE = 12;

// ── ESTADO ──────────────────────────────────────────────────
const state = {
    all: [],           // todos los negocios cargados
    promoIds: new Set(),
    filtered: [],
    page: 1,
    category: '',
    search: '',
    filterOpen: false,
    filterFeatured: false,
    filterOffers: false,
    sort: 'featured',
};

// ── UTILS ───────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function isOpenNow(hours) {
    if (!hours?.length) return false;
    const now = new Date();
    const h = hours.find(h => h.day_of_week === now.getDay() && !h.is_closed);
    if (!h) return false;
    const cur = now.getHours()*60 + now.getMinutes();
    const [oh,om] = (h.open_time||'').split(':').map(Number);
    const [ch,cm] = (h.close_time||'').split(':').map(Number);
    if (isNaN(oh)||isNaN(ch)) return false;
    return cur >= oh*60+om && cur <= ch*60+cm;
}

// ── CARGA DE DATOS ──────────────────────────────────────────
async function loadAll() {
    const [bizRes, promoRes, catRes] = await Promise.all([
        supabase.from('businesses').select(`
            id, slug, name, description, cover_image, city,
            is_featured, category_id,
            categories(name, icon),
            business_hours(day_of_week, open_time, close_time, is_closed),
            reviews(rating, is_approved)
        `).eq('is_active', true).order('name'),

        supabase.from('promotions')
            .select('business_id')
            .eq('is_active', true)
            .lte('start_date', new Date().toISOString().slice(0,10))
            .gte('end_date', new Date().toISOString().slice(0,10)),

        supabase.from('categories').select('id, name, icon').order('name'),
    ]);

    state.promoIds = new Set((promoRes.data||[]).map(p => p.business_id));

    state.all = (bizRes.data||[]).map(b => {
        const approved = (b.reviews||[]).filter(r => r.is_approved).map(r => r.rating);
        return {
            ...b,
            _open: isOpenNow(b.business_hours||[]),
            _avgRating: approved.length ? approved.reduce((a,v)=>a+v,0)/approved.length : 0,
            _reviewCount: approved.length,
            _hasPromo: state.promoIds.has(b.id),
        };
    });

    // Categorías con conteo
    const countMap = {};
    state.all.forEach(b => { countMap[b.category_id] = (countMap[b.category_id]||0)+1; });
    document.getElementById('countAll').textContent = state.all.length;

    const cats = catRes.data || [];
    document.getElementById('catList').innerHTML = cats.map(c => `
        <button class="cat-btn" data-cat="${c.id}" onclick="setCategory('${c.id}')">
            <span class="icon">${c.icon||'🏪'}</span>
            <span>${esc(c.name)}</span>
            <span class="count">${countMap[c.id]||0}</span>
        </button>`).join('');

    document.getElementById('heroSub').textContent =
        `${state.all.length} comercios disponibles en Loja`;

    applyFilters();
}

// ── FILTROS ──────────────────────────────────────────────────
window.setCategory = cat => {
    state.category = cat;
    state.page = 1;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
    applyFilters();
};

window.toggleFilter = key => {
    state[`filter${key.charAt(0).toUpperCase()+key.slice(1)}`] ^= 1;
    document.getElementById(`toggle${key.charAt(0).toUpperCase()+key.slice(1)}`).classList.toggle('active');
    state.page = 1;
    applyFilters();
};

document.getElementById('searchInput').addEventListener('input', e => {
    state.search = e.target.value.toLowerCase().trim();
    state.page = 1;
    applyFilters();
});

document.getElementById('sortSelect').addEventListener('change', e => {
    state.sort = e.target.value;
    state.page = 1;
    applyFilters();
});

function applyFilters() {
    let list = [...state.all];

    if (state.category)      list = list.filter(b => String(b.category_id) === String(state.category));
    if (state.search)        list = list.filter(b => b.name.toLowerCase().includes(state.search) || (b.description||'').toLowerCase().includes(state.search));
    if (state.filterOpen)    list = list.filter(b => b._open);
    if (state.filterFeatured) list = list.filter(b => b.is_featured);
    if (state.filterOffers)  list = list.filter(b => b._hasPromo);

    // Ordenar
    if (state.sort === 'featured') list.sort((a,b) => (b.is_featured - a.is_featured) || b._avgRating - a._avgRating);
    else if (state.sort === 'rating') list.sort((a,b) => b._avgRating - a._avgRating);
    else list.sort((a,b) => a.name.localeCompare(b.name));

    state.filtered = list;
    renderPage();
}

// ── RENDER ───────────────────────────────────────────────────
function renderPage() {
    const total = state.filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    state.page = Math.min(state.page, totalPages);

    const start = (state.page - 1) * PAGE_SIZE;
    const page  = state.filtered.slice(start, start + PAGE_SIZE);

    document.getElementById('resultsCount').innerHTML =
        `<strong>${total}</strong> negocio${total!==1?'s':''} encontrado${total!==1?'s':''}`;

    const grid = document.getElementById('bizGrid');

    if (!page.length) {
        grid.innerHTML = `
            <div class="empty-state">
                <h3>Sin resultados</h3>
                <p>Prueba con otros filtros o busca otro término.</p>
            </div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    grid.innerHTML = page.map(b => {
        const thumb = b.cover_image
            ? `<img src="${esc(b.cover_image)}" alt="${esc(b.name)}" loading="lazy">`
            : `<div class="card-thumb-placeholder">${b.categories?.icon||'🏪'}</div>`;
        const rating = b._avgRating ? b._avgRating.toFixed(1) : '—';

        return `
        <a class="biz-card" href="business/index.html?slug=${esc(b.slug)}">
            <div class="card-thumb">
                ${thumb}
                ${b.is_featured ? '<span class="card-featured">⭐ Destacado</span>' : ''}
                <span class="card-status ${b._open?'open':'closed'}">${b._open?'Abierto':'Cerrado'}</span>
            </div>
            <div class="card-body">
                <div class="card-cat">${esc(b.categories?.name||'')}</div>
                <div class="card-name">${esc(b.name)}</div>
                <div class="card-desc">${esc(b.description||'Sin descripción.')}</div>
                <div class="card-footer">
                    <div class="card-rating">
                        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                        <span class="num">${rating}</span>
                        <span class="cnt">(${b._reviewCount})</span>
                    </div>
                    <span class="card-city">${esc(b.city||'')}</span>
                </div>
            </div>
        </a>`;
    }).join('');

    renderPagination(totalPages);
    grid.scrollIntoView({ behavior:'smooth', block:'start' });
}

function renderPagination(totalPages) {
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goPage(${state.page-1})" ${state.page===1?'disabled':''}>← Anterior</button>`;

    for (let i = 1; i <= totalPages; i++) {
        if (totalPages > 7 && Math.abs(i - state.page) > 2 && i !== 1 && i !== totalPages) {
            if (i === 2 || i === totalPages-1) html += `<span class="page-info">…</span>`;
            continue;
        }
        html += `<button class="page-btn ${i===state.page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    }

    html += `<button class="page-btn" onclick="goPage(${state.page+1})" ${state.page===totalPages?'disabled':''}>Siguiente →</button>`;
    pag.innerHTML = html;
}

window.goPage = p => { state.page = p; renderPage(); };

// ── INIT ─────────────────────────────────────────────────────
loadAll();
</script>

</body>
</html>
