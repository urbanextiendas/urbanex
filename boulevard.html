<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbanex — Boulevard</title>
    <link rel="icon" type="image/png" href="/imagenes/log.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:    #020202;
            --bg2:   rgba(8,8,8,0.7);
            --bg3:   rgba(18,18,18,0.6);
            --gold:  #e5c158;
            --gold2: #a68b44;
            --border:  rgba(229,193,88,0.15);
            --border2: rgba(255,255,255,0.07);
            --text:  #ffffff;
            --muted: #cfcfcf;
            --dark:  #888888;
            --green: #2ed573;
            --red:   #ff4757;
            --serif: 'Cinzel', serif;
            --sans:  'Montserrat', sans-serif;
            --tr:    all 0.22s cubic-bezier(0.4,0,0.2,1);
            --blur:  blur(20px);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        ::-webkit-scrollbar { width:4px; height:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(229,193,88,.2); border-radius:10px; }
        ::-webkit-scrollbar-thumb:hover { background:var(--gold); }

        body {
            background:var(--bg); font-family:var(--sans);
            color:var(--text); min-height:100vh; display:flex; flex-direction:column;
        }
        a { color:inherit; text-decoration:none; }

        /* ── HEADER ── */
        .header {
            background:rgba(6,6,6,.8); backdrop-filter:var(--blur);
            -webkit-backdrop-filter:var(--blur);
            border-bottom:1px solid var(--border);
            height:60px; display:flex; align-items:center;
            justify-content:space-between; padding:0 24px;
            position:sticky; top:0; z-index:80;
        }
        .header img { height:48px; }
        .header-city {
            font-size:11px; color:var(--dark);
            display:flex; align-items:center; gap:6px;
        }
        .header-city svg { width:13px; height:13px; fill:var(--gold); }

        /* ── HERO ── */
        .hero {
            background: linear-gradient(135deg, #0a0a0a 0%, #111 50%, #0d0d0d 100%);
            border-bottom:1px solid var(--border);
            padding:48px 24px 40px;
            text-align:center;
            position:relative;
            overflow:hidden;
        }
        .hero::before {
            content:'';
            position:absolute; inset:0;
            background: radial-gradient(ellipse at 50% 0%, rgba(229,193,88,.08) 0%, transparent 65%);
            pointer-events:none;
        }
        .hero-eyebrow {
            font-size:10px; font-weight:700; letter-spacing:3px;
            text-transform:uppercase; color:var(--gold);
            margin-bottom:12px; opacity:.8;
        }
        .hero h1 {
            font-family:var(--serif); font-size:clamp(26px,5vw,42px);
            color:#fff; margin-bottom:10px; line-height:1.15;
        }
        .hero p { font-size:13px; color:var(--dark); margin-bottom:28px; }

        /* Buscador */
        .search-wrap {
            display:flex; gap:0;
            max-width:560px; margin:0 auto;
            background:rgba(255,255,255,.05);
            border:1px solid var(--border);
            border-radius:12px; overflow:hidden;
            backdrop-filter:blur(10px);
        }
        .search-wrap input {
            flex:1; background:transparent; border:none;
            padding:13px 18px; color:#fff; font-size:13px;
            font-family:var(--sans); outline:none;
        }
        .search-wrap input::placeholder { color:var(--dark); }
        .search-wrap button {
            background:var(--gold); border:none;
            padding:0 20px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:var(--tr); flex-shrink:0;
        }
        .search-wrap button:hover { background:#f1cd6b; }
        .search-wrap button svg { width:18px; height:18px; fill:#000; }

        /* ── FILTROS RÁPIDOS ── */
        .quick-filters {
            display:flex; gap:8px; flex-wrap:wrap;
            padding:16px 24px;
            border-bottom:1px solid var(--border);
            background:rgba(4,4,4,.6); backdrop-filter:blur(10px);
            position:sticky; top:60px; z-index:70;
        }
        .qf-btn {
            display:flex; align-items:center; gap:6px;
            padding:7px 14px; border-radius:20px;
            font-size:11.5px; font-weight:600;
            border:1px solid var(--border2);
            background:transparent; color:var(--muted);
            cursor:pointer; font-family:var(--sans);
            transition:var(--tr); white-space:nowrap;
        }
        .qf-btn svg { width:13px; height:13px; fill:currentColor; flex-shrink:0; }
        .qf-btn:hover { border-color:var(--gold); color:var(--gold); }
        .qf-btn.active { background:var(--gold); border-color:var(--gold); color:#000; }
        .qf-sep { width:1px; background:var(--border2); align-self:stretch; margin:4px 2px; }

        /* ── LAYOUT PRINCIPAL ── */
        .main-layout {
            display:grid;
            grid-template-columns:260px 1fr;
            gap:0;
            flex:1;
            max-width:1400px;
            width:100%;
            margin:0 auto;
            padding:0;
        }
        @media(max-width:900px) {
            .main-layout { grid-template-columns:1fr; }
            .sidebar { display:none; }
            .sidebar.mobile-open { display:flex; }
        }

        /* ── SIDEBAR CATEGORÍAS ── */
        .sidebar {
            border-right:1px solid var(--border);
            background:rgba(4,4,4,.5);
            display:flex; flex-direction:column;
            padding:20px 12px;
            gap:4px;
            overflow-y:auto;
            position:sticky;
            top:calc(60px + 53px); /* header + filtros */
            height:calc(100vh - 60px - 53px);
        }

        .sidebar-title {
            font-size:10px; font-weight:700;
            text-transform:uppercase; letter-spacing:1.5px;
            color:var(--dark); padding:4px 10px 10px;
        }

        /* Botón "Todos" */
        .cat-all-btn {
            display:flex; align-items:center; gap:10px;
            padding:10px 12px; border-radius:10px;
            font-size:12.5px; font-weight:600;
            color:var(--muted); cursor:pointer;
            border:1px solid transparent;
            background:transparent;
            font-family:var(--sans);
            transition:var(--tr); width:100%; text-align:left;
        }
        .cat-all-btn:hover { background:rgba(255,255,255,.04); color:#fff; }
        .cat-all-btn.active { background:rgba(229,193,88,.1); border-color:var(--gold); color:var(--gold); }
        .cat-all-btn-icon { font-size:16px; width:22px; text-align:center; }

        /* Categoría raíz */
        .cat-root-btn {
            display:flex; align-items:center; gap:10px;
            padding:10px 12px; border-radius:10px;
            font-size:12.5px; font-weight:600;
            color:var(--muted); cursor:pointer;
            border:1px solid transparent;
            background:transparent; width:100%;
            font-family:var(--sans); text-align:left;
            transition:var(--tr);
        }
        .cat-root-btn:hover { background:rgba(255,255,255,.04); color:#fff; }
        .cat-root-btn.active { background:rgba(229,193,88,.1); border-color:var(--gold); color:var(--gold); }
        .cat-root-icon { font-size:17px; width:22px; text-align:center; flex-shrink:0; }
        .cat-root-label { flex:1; }
        .cat-root-count { font-size:10px; color:var(--dark); }
        .cat-root-arrow {
            font-size:10px; color:var(--dark);
            transition:transform .2s ease; flex-shrink:0;
        }
        .cat-root-btn.expanded .cat-root-arrow { transform:rotate(90deg); }

        /* Subcategorías desplegables */
        .sub-list {
            display:none; flex-direction:column; gap:2px;
            padding:4px 0 4px 32px;
        }
        .sub-list.open { display:flex; }

        .sub-btn {
            display:flex; align-items:center; gap:8px;
            padding:7px 10px; border-radius:8px;
            font-size:12px; color:var(--dark);
            cursor:pointer; border:1px solid transparent;
            background:transparent; width:100%;
            font-family:var(--sans); text-align:left;
            transition:var(--tr);
        }
        .sub-btn:hover { color:var(--muted); background:rgba(255,255,255,.03); }
        .sub-btn.active { color:var(--gold); background:rgba(229,193,88,.07); border-color:rgba(229,193,88,.2); font-weight:600; }
        .sub-icon { font-size:13px; width:18px; text-align:center; }
        .sub-count { font-size:10px; color:var(--dark); margin-left:auto; }

        /* ── CONTENIDO PRINCIPAL ── */
        .content-area { padding:24px; display:flex; flex-direction:column; gap:28px; min-width:0; }

        /* Breadcrumb de filtro activo */
        .active-filter-bar {
            display:none; align-items:center; gap:8px;
            font-size:12px; color:var(--muted);
        }
        .active-filter-bar.visible { display:flex; }
        .active-filter-tag {
            display:flex; align-items:center; gap:6px;
            background:rgba(229,193,88,.1); border:1px solid rgba(229,193,88,.3);
            border-radius:20px; padding:4px 12px;
            color:var(--gold); font-size:11.5px; font-weight:600;
        }
        .active-filter-tag button {
            background:none; border:none; color:var(--gold);
            cursor:pointer; font-size:14px; line-height:1;
            padding:0 0 0 4px;
        }

        /* ── SECCIÓN DESTACADOS ── */
        .section-heading {
            display:flex; align-items:center;
            justify-content:space-between; margin-bottom:16px;
        }
        .section-heading h2 {
            font-family:var(--serif); font-size:16px;
            color:var(--gold); letter-spacing:1px;
            text-transform:uppercase;
        }
        .section-heading span { font-size:11px; color:var(--dark); }

        /* Grid de negocios destacados — horizontal scroll en mobile */
        .featured-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
            gap:16px;
        }

        /* ── TARJETA DE NEGOCIO ── */
        .biz-card {
            background:var(--bg3); border:1px solid var(--border2);
            border-radius:14px; overflow:hidden;
            transition:var(--tr); cursor:pointer;
            display:flex; flex-direction:column;
            text-decoration:none;
        }
        .biz-card:hover {
            border-color:rgba(229,193,88,.35);
            transform:translateY(-3px);
            box-shadow:0 12px 40px rgba(0,0,0,.4);
        }
        .biz-card-img {
            width:100%; height:160px;
            object-fit:cover; display:block;
            background:#111;
        }
        .biz-card-img-placeholder {
            width:100%; height:160px;
            background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
            display:flex; align-items:center; justify-content:center;
            font-size:40px;
        }
        .biz-card-body { padding:14px; flex:1; display:flex; flex-direction:column; gap:6px; }
        .biz-card-cat {
            font-size:9.5px; font-weight:700; letter-spacing:1px;
            text-transform:uppercase; color:var(--gold); opacity:.8;
        }
        .biz-card-name {
            font-size:14px; font-weight:700; color:#fff;
            line-height:1.3;
        }
        .biz-card-address { font-size:11px; color:var(--dark); }
        .biz-card-footer {
            display:flex; align-items:center; justify-content:space-between;
            margin-top:auto; padding-top:10px;
        }
        .biz-card-rating {
            display:flex; align-items:center; gap:4px;
            font-size:11.5px; font-weight:700; color:#fff;
        }
        .biz-card-rating svg { width:12px; height:12px; fill:var(--gold); }
        .biz-card-rating span.count { color:var(--dark); font-weight:400; font-size:10px; }
        .biz-card-badge {
            font-size:9.5px; font-weight:700; padding:3px 8px;
            border-radius:10px;
        }
        .badge-open { background:rgba(46,213,115,.12); color:var(--green); border:1px solid rgba(46,213,115,.3); }
        .badge-closed { background:rgba(255,71,87,.08); color:#ff4757; border:1px solid rgba(255,71,87,.2); }
        .badge-featured { background:rgba(229,193,88,.12); color:var(--gold); border:1px solid rgba(229,193,88,.3); }

        /* ── GRID DIRECTORIO ── */
        .dir-controls {
            display:flex; align-items:center;
            justify-content:space-between; flex-wrap:wrap; gap:10px;
        }
        .dir-sort {
            background:rgba(0,0,0,.4); border:1px solid var(--border2);
            border-radius:8px; padding:7px 12px; color:var(--muted);
            font-size:12px; font-family:var(--sans); outline:none; cursor:pointer;
        }
        .dir-sort:focus { border-color:var(--gold); }
        .dir-count { font-size:12px; color:var(--dark); }

        .biz-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
            gap:14px;
        }

        /* ── SKELETON ── */
        .skeleton { background:rgba(255,255,255,.04); border-radius:10px; animation:pulse 1.4s ease infinite; }
        @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.8} }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align:center; padding:60px 20px;
            display:flex; flex-direction:column; align-items:center; gap:12px;
        }
        .empty-state svg { width:52px; height:52px; fill:rgba(229,193,88,.15); }
        .empty-state h3 { font-family:var(--serif); color:var(--gold); font-size:16px; }
        .empty-state p { font-size:13px; color:var(--dark); }

        /* ── MOBILE: botón abrir sidebar ── */
        .mobile-cat-btn {
            display:none; align-items:center; gap:8px;
            padding:7px 14px; border-radius:20px;
            font-size:11.5px; font-weight:600;
            border:1px solid var(--border2);
            background:transparent; color:var(--muted);
            cursor:pointer; font-family:var(--sans);
        }
        .mobile-cat-btn svg { width:13px; height:13px; fill:currentColor; }
        @media(max-width:900px) { .mobile-cat-btn { display:flex; } }

        /* Drawer mobile */
        .sidebar-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,.7); z-index:150;
            backdrop-filter:blur(4px);
        }
        .sidebar-overlay.open { display:block; }
        @media(max-width:900px) {
            .sidebar {
                position:fixed; top:0; left:0; bottom:0;
                width:280px; z-index:160;
                transform:translateX(-100%);
                transition:transform .28s cubic-bezier(.4,0,.2,1);
                height:100vh;
                border-right:1px solid var(--border);
            }
            .sidebar.mobile-open { transform:translateX(0); display:flex; }
        }

        /* ── PIE ── */
        .footer {
            border-top:1px solid #111;
            background:#000; color:#555;
            font-size:11px; text-align:center;
            padding:14px; font-family:Arial,sans-serif;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <a href="index.html">
        <img src="imagenes/logo.png" alt="Urbanex">
    </a>
    <div class="header-city">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        Loja, Ecuador
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-eyebrow">Directorio Comercial</div>
    <h1>Todos los comercios<br>de Loja en un solo lugar</h1>
    <p>Descubre, compara y contacta los mejores negocios de tu ciudad</p>
    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Buscar negocio, producto o servicio...">
        <button id="btnSearch">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
    </div>
</section>

<!-- FILTROS RÁPIDOS -->
<div class="quick-filters" id="quickFilters">
    <button class="mobile-cat-btn" id="btnMobileCat" onclick="toggleMobileSidebar()">
        <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        Categorías
    </button>
    <div class="qf-sep"></div>
    <button class="qf-btn active" data-filter="all" onclick="setQuickFilter('all', this)">
        Todos
    </button>
    <button class="qf-btn" data-filter="open" onclick="setQuickFilter('open', this)">
        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
        Abiertos ahora
    </button>
    <button class="qf-btn" data-filter="featured" onclick="setQuickFilter('featured', this)">
        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        Destacados
    </button>
    <button class="qf-btn" data-filter="delivery" onclick="setQuickFilter('delivery', this)">
        <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        A domicilio
    </button>
    <button class="qf-btn" data-filter="promo" onclick="setQuickFilter('promo', this)">
        <svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
        Con ofertas
    </button>
</div>

<!-- SIDEBAR OVERLAY (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>

<!-- LAYOUT -->
<div class="main-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-title">Categorías</div>

        <button class="cat-all-btn active" id="catAllBtn" onclick="selectCategory(null, null, this)">
            <span class="cat-all-btn-icon">🏙</span>
            <span>Todos los negocios</span>
        </button>

        <div id="catTree">
            <!-- generado dinámicamente -->
            <div class="skeleton" style="height:42px;border-radius:10px;margin:2px 0;"></div>
            <div class="skeleton" style="height:42px;border-radius:10px;margin:2px 0;"></div>
            <div class="skeleton" style="height:42px;border-radius:10px;margin:2px 0;"></div>
            <div class="skeleton" style="height:42px;border-radius:10px;margin:2px 0;"></div>
            <div class="skeleton" style="height:42px;border-radius:10px;margin:2px 0;"></div>
        </div>
    </aside>

    <!-- CONTENIDO -->
    <div class="content-area">

        <!-- Etiqueta de filtro activo -->
        <div class="active-filter-bar" id="activeFilterBar">
            <span style="color:var(--dark);">Filtrando por:</span>
            <div class="active-filter-tag" id="activeFilterTag">
                <span id="activeFilterLabel"></span>
                <button onclick="selectCategory(null,null,document.getElementById('catAllBtn'))">✕</button>
            </div>
        </div>

        <!-- DESTACADOS -->
        <div id="featuredSection">
            <div class="section-heading">
                <h2>⭐ Destacados</h2>
                <span id="featuredCount"></span>
            </div>
            <div class="featured-grid" id="featuredGrid">
                <div class="skeleton" style="height:220px;"></div>
                <div class="skeleton" style="height:220px;"></div>
                <div class="skeleton" style="height:220px;"></div>
            </div>
        </div>

        <!-- DIRECTORIO -->
        <div>
            <div class="section-heading">
                <h2>📋 Directorio</h2>
                <div class="dir-controls">
                    <span class="dir-count" id="dirCount"></span>
                    <select class="dir-sort" id="dirSort" onchange="renderDirectory()">
                        <option value="name">Nombre A–Z</option>
                        <option value="rating">Mayor calificación</option>
                    </select>
                </div>
            </div>
            <div class="biz-grid" id="bizGrid">
                <div class="skeleton" style="height:200px;"></div>
                <div class="skeleton" style="height:200px;"></div>
                <div class="skeleton" style="height:200px;"></div>
                <div class="skeleton" style="height:200px;"></div>
                <div class="skeleton" style="height:200px;"></div>
                <div class="skeleton" style="height:200px;"></div>
            </div>
        </div>

    </div>
</div>

<footer class="footer">
    &copy; 2026 Urbanex. Desarrollado por Neodat Consultores.
</footer>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL      = 'https://mlkynawsjqmawgxeuvks.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_UyYcTuSIaLDbaD73wvwOfA_TbyFlRNv';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Estado ────────────────────────────────────────────────────
let allBusinesses  = [];
let rootCategories = [];
let subMap         = {};           // { parentId: [subcat,...] }
let activeCatId    = null;         // id de categoría raíz seleccionada
let activeSubId    = null;         // id de subcategoría seleccionada
let activeQuick    = 'all';        // filtro rápido
let searchQuery    = '';

// ── Helpers ───────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function isOpenNow(hours) {
    if (!hours?.length) return false;
    const now = new Date();
    const h = hours.find(h => h.day_of_week === now.getDay() && !h.is_closed);
    if (!h) return false;
    const cur = now.getHours()*60 + now.getMinutes();
    const [oh,om] = (h.open_time||'').split(':').map(Number);
    const [ch,cm] = (h.close_time||'').split(':').map(Number);
    if (isNaN(oh)||isNaN(ch)) return false;
    return cur >= oh*60+om && cur <= ch*60+cm;
}

function avgRating(reviews) {
    const approved = (reviews||[]).filter(r=>r.is_approved);
    if (!approved.length) return null;
    return approved.reduce((s,r)=>s+r.rating,0) / approved.length;
}

function hasPromo(promos) {
    const today = new Date().toISOString().slice(0,10);
    return (promos||[]).some(p => p.is_active && (!p.end_date || p.end_date >= today));
}

function formatTime(t) {
    if (!t) return '';
    const [h,m] = t.split(':').map(Number);
    const pd = h>=12?'PM':'AM';
    const h12 = h%12===0?12:h%12;
    return `${h12}:${String(m).padStart(2,'0')} ${pd}`;
}

// ── Carga datos ───────────────────────────────────────────────
async function boot() {
    const [catsRes, bizRes] = await Promise.all([
        supabase.from('categories').select('id,name,icon,parent_id,sort_order').order('sort_order').order('name'),
        supabase.from('businesses').select(`
            id, name, slug, city, address, cover_image,
            is_featured, delivery_available, category_id, subcategory_id,
            categories!category_id(name, icon),
            subcategories:categories!subcategory_id(name, icon),
            business_hours(day_of_week, open_time, close_time, is_closed),
            reviews(is_approved, rating),
            promotions(is_active, end_date)
        `).eq('is_active', true)
    ]);

    // Árbol de categorías
    const cats = catsRes.data || [];
    rootCategories = cats.filter(c => !c.parent_id);
    subMap = {};
    cats.filter(c => c.parent_id).forEach(c => {
        if (!subMap[c.parent_id]) subMap[c.parent_id] = [];
        subMap[c.parent_id].push(c);
    });

    allBusinesses = (bizRes.data || []).map(b => ({
        ...b,
        _open:   isOpenNow(b.business_hours),
        _rating: avgRating(b.reviews),
        _promo:  hasPromo(b.promotions),
        _reviewCount: (b.reviews||[]).filter(r=>r.is_approved).length,
    }));

    renderCatTree();
    renderFeatured();
    renderDirectory();
}

// ── Árbol lateral ─────────────────────────────────────────────
function renderCatTree() {
    const tree = document.getElementById('catTree');

    // Contar negocios por categoría raíz y subcategoría
    const countByRoot = {};
    const countBySub  = {};
    allBusinesses.forEach(b => {
        // cuenta por subcategoría
        if (b.subcategory_id) countBySub[b.subcategory_id] = (countBySub[b.subcategory_id]||0)+1;
        // cuenta por raíz: sumar si category_id coincide O si su subcategoría pertenece a la raíz
        const subObj = b.subcategory_id ? Object.values(subMap).flat().find(s=>s.id==b.subcategory_id) : null;
        const rootId = b.category_id || (subObj?.parent_id);
        if (rootId) countByRoot[rootId] = (countByRoot[rootId]||0)+1;
    });

    tree.innerHTML = rootCategories.map(root => {
        const subs  = subMap[root.id] || [];
        const total = countByRoot[root.id] || 0;
        return `
        <div class="cat-root-wrap">
            <button class="cat-root-btn" id="catRoot_${root.id}"
                    onclick="toggleCatExpand(${root.id}, this)">
                <span class="cat-root-icon">${root.icon||'📁'}</span>
                <span class="cat-root-label">${esc(root.name)}</span>
                ${total ? `<span class="cat-root-count">${total}</span>` : ''}
                ${subs.length ? `<span class="cat-root-arrow">▶</span>` : ''}
            </button>
            ${subs.length ? `
            <div class="sub-list" id="subList_${root.id}">
                ${subs.map(sub => `
                <button class="sub-btn" id="sub_${sub.id}"
                        onclick="selectCategory(${root.id}, ${sub.id}, null)">
                    <span class="sub-icon">${sub.icon||'•'}</span>
                    <span>${esc(sub.name)}</span>
                    ${countBySub[sub.id] ? `<span class="sub-count">${countBySub[sub.id]}</span>` : ''}
                </button>`).join('')}
            </div>` : ''}
        </div>`;
    }).join('');
}

// Expandir/colapsar categoría raíz
window.toggleCatExpand = (rootId, btn) => {
    const subList = document.getElementById(`subList_${rootId}`);
    const isOpen  = subList?.classList.contains('open');

    // Si hacemos click en la raíz sin subcategorías, filtramos por ella
    const subs = subMap[rootId] || [];

    if (!subs.length) {
        // Sin subcategorías: filtrar directo
        selectCategory(rootId, null, btn);
        return;
    }

    // Con subcategorías: expandir/colapsar Y filtrar por raíz
    if (isOpen) {
        subList.classList.remove('open');
        btn.classList.remove('expanded');
        // si estaba activa esta raíz, limpiar filtro
        if (activeCatId === rootId) selectCategory(null, null, document.getElementById('catAllBtn'));
    } else {
        // Cerrar otros
        document.querySelectorAll('.sub-list').forEach(el => el.classList.remove('open'));
        document.querySelectorAll('.cat-root-btn').forEach(b => b.classList.remove('expanded'));
        subList.classList.add('open');
        btn.classList.add('expanded');
        // Filtrar por categoría raíz
        selectCategory(rootId, null, btn);
    }
};

// Seleccionar categoría o subcategoría
window.selectCategory = (rootId, subId, btnEl) => {
    activeCatId = rootId;
    activeSubId = subId;

    // Limpiar estilos activos
    document.querySelectorAll('.cat-root-btn, .sub-btn, .cat-all-btn').forEach(b => b.classList.remove('active'));

    if (btnEl) btnEl.classList.add('active');

    // Si seleccionamos subcategoría, marcar también la raíz
    if (subId) {
        const rootBtn = document.getElementById(`catRoot_${rootId}`);
        if (rootBtn) rootBtn.classList.add('active');
    }

    // Si limpiar todo
    if (!rootId && !subId) {
        document.getElementById('catAllBtn').classList.add('active');
        // Cerrar todos los acordeones
        document.querySelectorAll('.sub-list').forEach(el => el.classList.remove('open'));
        document.querySelectorAll('.cat-root-btn').forEach(b => b.classList.remove('expanded'));
    }

    // Etiqueta de filtro activo
    updateActiveFilterLabel(rootId, subId);

    // Cerrar sidebar mobile
    const sidebar = document.getElementById('sidebar');
    if (sidebar.classList.contains('mobile-open')) toggleMobileSidebar();

    renderFeatured();
    renderDirectory();
};

function updateActiveFilterLabel(rootId, subId) {
    const bar   = document.getElementById('activeFilterBar');
    const label = document.getElementById('activeFilterLabel');

    if (!rootId && !subId) { bar.classList.remove('visible'); return; }

    let text = '';
    if (subId) {
        const sub  = Object.values(subMap).flat().find(s => s.id == subId);
        const root = rootCategories.find(r => r.id == rootId);
        text = `${root?.icon||''} ${root?.name||''} › ${sub?.icon||''} ${sub?.name||''}`;
    } else {
        const root = rootCategories.find(r => r.id == rootId);
        text = `${root?.icon||''} ${root?.name||''}`;
    }
    label.textContent = text;
    bar.classList.add('visible');
}

// ── Filtro rápido ─────────────────────────────────────────────
window.setQuickFilter = (filter, btn) => {
    activeQuick = filter;
    document.querySelectorAll('.qf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFeatured();
    renderDirectory();
};

// ── Búsqueda ──────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase().trim();
    renderFeatured();
    renderDirectory();
});
document.getElementById('btnSearch').addEventListener('click', () => {
    searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
    renderFeatured();
    renderDirectory();
});
document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnSearch').click();
});

// ── Filtrar lista ─────────────────────────────────────────────
function filtered() {
    return allBusinesses.filter(b => {
        // Categoría / subcategoría
        if (activeSubId) {
            if (b.subcategory_id != activeSubId) return false;
        } else if (activeCatId) {
            // Incluir si category_id coincide O si su subcategoría pertenece a la raíz
            const subObj = b.subcategory_id
                ? Object.values(subMap).flat().find(s => s.id == b.subcategory_id)
                : null;
            const matchRoot = b.category_id == activeCatId;
            const matchSub  = subObj?.parent_id == activeCatId;
            if (!matchRoot && !matchSub) return false;
        }

        // Filtro rápido
        if (activeQuick === 'open'     && !b._open)     return false;
        if (activeQuick === 'featured' && !b.is_featured) return false;
        if (activeQuick === 'delivery' && !b.delivery_available) return false;
        if (activeQuick === 'promo'    && !b._promo)    return false;

        // Búsqueda
        if (searchQuery) {
            const hay = `${b.name} ${b.address||''} ${b.city||''} ${b.categories?.name||''} ${b.subcategories?.name||''}`.toLowerCase();
            if (!hay.includes(searchQuery)) return false;
        }

        return true;
    });
}

// ── Render: tarjeta ───────────────────────────────────────────
function bizCardHtml(b, large = false) {
    const imgEl = b.cover_image
        ? `<img class="biz-card-img" src="${esc(b.cover_image)}" alt="${esc(b.name)}" loading="lazy">`
        : `<div class="biz-card-img-placeholder">${b.subcategories?.icon || b.categories?.icon || '🏪'}</div>`;

    const catLabel = b.subcategories?.name
        ? `${b.categories?.icon||''} ${b.categories?.name||''} › ${b.subcategories.icon||''} ${b.subcategories.name}`
        : `${b.categories?.icon||''} ${b.categories?.name||''}`;

    const rating = b._rating
        ? `<div class="biz-card-rating">
               <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
               ${b._rating.toFixed(1)}
               <span class="count">(${b._reviewCount})</span>
           </div>`
        : `<span style="font-size:10px;color:var(--dark);">Sin reseñas</span>`;

    const badges = [];
    if (b._open)      badges.push(`<span class="biz-card-badge badge-open">Abierto</span>`);
    else              badges.push(`<span class="biz-card-badge badge-closed">Cerrado</span>`);
    if (b.is_featured) badges.push(`<span class="biz-card-badge badge-featured">⭐ Destacado</span>`);
    if (b._promo)     badges.push(`<span class="biz-card-badge" style="background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.3);">🏷 Oferta</span>`);

    return `
    <a class="biz-card" href="business/index.html?slug=${esc(b.slug)}">
        ${imgEl}
        <div class="biz-card-body">
            <div class="biz-card-cat">${catLabel}</div>
            <div class="biz-card-name">${esc(b.name)}</div>
            ${b.address ? `<div class="biz-card-address">📍 ${esc(b.address)}</div>` : ''}
            <div class="biz-card-footer">
                ${rating}
                <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;">
                    ${badges.join('')}
                </div>
            </div>
        </div>
    </a>`;
}

// ── Render: destacados ────────────────────────────────────────
function renderFeatured() {
    const list = filtered().filter(b => b.is_featured);
    const section = document.getElementById('featuredSection');
    const grid    = document.getElementById('featuredGrid');
    const count   = document.getElementById('featuredCount');

    if (!list.length) {
        section.style.display = 'none';
        return;
    }
    section.style.display = 'block';
    count.textContent = `${list.length} negocio${list.length!==1?'s':''}`;
    grid.innerHTML = list.map(b => bizCardHtml(b, true)).join('');
}

// ── Render: directorio ────────────────────────────────────────
function renderDirectory() {
    const sort = document.getElementById('dirSort').value;
    let list = filtered().filter(b => !b.is_featured);

    // También incluir destacados en el directorio si hay filtros activos de quick
    if (activeQuick !== 'all') list = filtered();

    if (sort === 'rating') {
        list = [...list].sort((a,b) => (b._rating||0) - (a._rating||0));
    } else {
        list = [...list].sort((a,b) => a.name.localeCompare(b.name, 'es'));
    }

    const grid  = document.getElementById('bizGrid');
    const count = document.getElementById('dirCount');
    count.textContent = `${list.length} resultado${list.length!==1?'s':''}`;

    if (!list.length) {
        grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
            <svg viewBox="0 0 24 24"><path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/></svg>
            <h3>Sin resultados</h3>
            <p>No encontramos negocios con estos filtros.<br>Prueba con otra categoría o búsqueda.</p>
        </div>`;
        return;
    }
    grid.innerHTML = list.map(b => bizCardHtml(b)).join('');
}

// ── Mobile sidebar ────────────────────────────────────────────
window.toggleMobileSidebar = () => {
    const sidebar  = document.getElementById('sidebar');
    const overlay  = document.getElementById('sidebarOverlay');
    const isOpen   = sidebar.classList.contains('mobile-open');
    sidebar.classList.toggle('mobile-open', !isOpen);
    overlay.classList.toggle('open', !isOpen);
    document.body.style.overflow = isOpen ? '' : 'hidden';
};

boot();
</script>
